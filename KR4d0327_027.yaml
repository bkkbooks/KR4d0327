body:
  text: 鐵菴集卷二十七宋方大琮撰䇿問漢官制問西漢近古創制立法必能參稽古意似無可議者今考之官制未免有疑試與諸君論之太師太傅太保曰三公視周制也漢則以丞相太尉御史大夫為三公視周制孰是然高后時復設太傅以王陵審食其為之哀帝時復置太師太傅以孔光王舜為之既有丞相太尉御史大夫又立太師太傅太保則漢之公不止于三耶三少謂之孤卿與六卿為九卿周制也漢則以奉常郎中令衛尉太僕廷尉典客宗正治粟內史少府為九卿視周制孰是然毋將隆為執金吾制詔稱隆位九卿王尊為京兆尹御史奏尊不宜備位九卿執金吾京兆尹皆稱卿則漢之卿不止于九耶加官之領表謂所加或列侯將軍卿大夫騎都尉尚書太醫太官令至郎中或博士議郎則二府不兼加官明矣然魏相為御史大夫詔相給事中何以兼領加官朝分中外孟康謂大司馬左右前後將軍侍中中常侍散騎諸吏為中朝丞相以下至六百石為外朝則九卿不預中朝明矣然劉輔之獄中朝左將軍辛慶忌右將軍兼褒光祿勳師丹大中大夫谷永俱上書救輔光祿勳位九卿大中大夫又光祿之屬何以俱稱中朝丞相御史對稱兩府顔氏之説然也如四府舉辛慶忌五府舉湯何以有四府五府之别郡守秩二千石表之説然也如馮野王以中二千石秩守上郡黃霸以八百石居潁川何以有中二千石八百石之異大將軍兼録尚書而丞相徒取充位不幾于重將而輕相乎仕于侯國者下從左官之律不幾于重內而輕外乎天下郡國百有三置都尉九十西自隴西至五原凡十三郡置都尉二十有八北自雲中至遼東凡九郡置都尉二十其餘郡國八十有一置郡尉止四十有二則又置立之或異多寡之不等何也諸君淹貫史學稽之審矣必有崇論宏議幸明以告漢賦法問漢之取民其色目至多而掌之則有大農少府其後又有水衡都尉大農之官始為治粟內史不知是官之改與夫水衡之設其皆始于何時耶三者雖均理財職掌必異不知當時民所輸者孰為大農又孰為少府及水衡耶考之于史司農屬官有均輸水衡復有均輸之官何也少府為天子掌財文翁在蜀亦有少府何也所謂色目之多者田租之外有算賦口賦算賦口賦之外有踐更過更凡是數者取之于民為泉幾何輸之于官其將何用髙帝五年之詔又賦民泉六十三以給獻費將别設科而取之歟抑亦算賦而為之也至于有市籍者有租無市籍者則以律占租侯國則有酎金佩將軍都尉二千石印則給軍費其取之也亦悉矣抑不知內史之有廪犧錢如蕭望之之在馮翊放散百餘萬又有北軍錢如公孫敬聲之在征和中擅用千九百萬則當時為是二者之錢其孰輸之耶鹽鐵𣙜酤之入其屬之大農耶少府耶昭帝時賢良文學之議願罷鹽鐵酒𣙜均輸官當其時從其議否耶其條陳之以觀所藴本朝諸儒之學問學有師承而聖門之教立聖人之道散見于諸儒答問語言之間傳得其宗者惟孟子輿氏及韓文公而止耳荀與楊則大醇而小疵者也國朝道統一正師儒輩出視昔為盛粵自栁仲塗以先秦之文倡天下尹公繼之歐文忠公又繼之而古作大振陳圖南以先天之學授种明逸一傳而穆伯長再傳而李挺之又再傳而邵康節學始有源伯長又以太極圖授周濂溪二程子師之楊謝尹遊輩其流也性理之學廣矣安定之門如劉彞以善水利稱其他如錢如孫如范間以淵篤純明直溫簡亮名世率皆發明體用之極致眉山之學雄偉博洽門人如六君子者從而光大之卓卓為一時冠橫渠張氏徂徠石氏泰山孫氏與司馬氏劉或崇經學或闡理窟或以力行篤實為之倡承學者和之翕然丕變矣夷而考之自大道既隱扶持羽翼之功齊驅並駕誠未易窺涯涘然傳道者必著書或形于已見之自陳或見于門人之紀録其詳可得聞歟伊川與康節極論天地萬物之理至以數學授之則却而不從二程學太極圖于濂溪所以啓門人者略不及太極圖一語康節謂我能物之則我為物之人蓋得于李挺之而程子深不然其説橫渠西銘之作伊川謂理一而分殊而楊龜山深辨其兼愛之患歐公論性非聖人所先而世謂其性分之內全無見處坡公權書衡論之作或謂戰國縱橫之書或黨其師之學或叛其師之説脈絡貫穿孰異孰同立朝行已之端正心治國之要精粗本末孰先孰後門人之所得何者為優宗派之所傳何者為正考先儒之緒言印胸中之定見願相與折衷之以觀諸君子淵源之學經疑問昔夫子自衛反魯刪詩定書繫周易作春秋習禮正樂又與羣弟子質疑答問輯其言之善號曰論語後世學者宗之以為五經之管鑰六藝之喉襟欲進道者不可不以為階也近世名公巨儒則或不然掇其篇章以為非聖人之書撮其語句以為非聖人之言參以臆見竊有疑焉試一詳之蓋大易之書歷三世更三聖孔子從而繫之廣大悉備矣或者又謂周易非聖人之全書文言一篇其文斷而不屬乃漢世講師自為之言其果然乎周官之書制封建立井田法天地四時而備之規模宏逺矣或又謂周禮非周公之全書有不可信者三皆秦漢諸儒之所損益又果然乎書有洪範洛之所出也箕子陳之使彞倫攸敘明矣或有謂河圖洛書怪妄不經非有龜書出洛之事何也記之有儒行述孔子之言行家語亦載之所以示後世明矣或有謂戰國時豪士髙世之語多自誇大以炫世又何也至于魯論一書門人記夫子之嘉言彰彰可誦有紛更其説者則以誠不以富亦祗以異之言以為當在齊景公有馬千駟之上可乎有變易其語者以子在齊聞韶三月不知肉味之言以為子在齊聞韶音子在回何敢死之言以為子在回何敢先是乎非乎夫以二禮之書出于漢代謂其雜于漢儒猶之可也書易二經乃先秦古書一以卜筮顯一以口傳授而論語又羣弟子之所親記者豈容有可指之疑而欺世惑衆者哉而近世名公乃亦有是之者何也幸詳陳以袪所惑什一之法問什一天下之中正百王不易之通法也三代之君所以隨時損益因世變通雖有不同而中正之法則相承而世守之初不可以一毫加損自春秋以來去古未逺初稅畝作丘甲用田賦荐書于經蓋譏其始變法也然嘗試考之杜氏于初稅畝則釋之曰公田之法十取其一今又履其餘畝復十取其一是以二倍取其民也至于作丘甲則又釋之曰九家為井四井為邑四邑為丘四丘為甸出甲士三人步卒七十二人此甸所賦而魯以丘出之是魯以四倍取于民也至于田賦之用則釋之者又云丘賦之法因其田財通出馬一匹牛三頭今别其田及家財各出此賦是又增其一也然魯之復增其一即于作丘甲之外而復增之耶抑舍丘甲而復增之也若舍丘甲而增之春秋作中軍舍中軍皆明書之而丘甲之舍何為略哉謂作丘甲之外而復增其一是魯以五倍取民矣曽謂聖人之後秉禮之邦而肯為是耶設曰古人之法不可行之于後世其制愈壞其變愈亟其斂于民者愈重而不可復返也然漢自髙帝矯秦人之弊什五而稅一至景帝之世復三十而稅一又何其益輕耶夫什一之法輕之則為貉重之則為桀魯之變法自什而二也又什而四也又什而五也而尚有年飢不足之嘆未見其有餘漢之矯弊自十五而一也又三十而一也而海內富庶粟紅貫朽未見其不足則什一之法又何取哉夫可以行于三代者不可行之于春秋不可施之于春秋乃可施之于漢何耶不然則春秋之所書杜氏之所釋與夫班孟堅之所紀其輕重異同如此豈無至當之説試詳言之詩問古詩三千餘篇仲尼取而被之絃歌以求合乎韶武之音去其不合者所存者三百五篇而已此司馬遷之説也孔穎達乃以為傳記所舉逸詩絶少史記所言蓋遷之謬歐陽氏又謂以圖考之宜不啻三千篇夫詩孔子之所刪也三儒異同如此孰是孰非風雅頌一定之體也今降王為風則王之號若何而可黜進魯于頌則魯之僭若何而可忽也弼鄘衛一國之音也而系于三國七月公劉一時之事也而裂之于風雅或分或合何者為宜如切如磋如琢如磨何以與于貧而樂富而好禮巧笑倩兮美目盼兮素以為絢兮又何預于禮後曽子作孝經及于詩者十戰戰兢兢如臨深淵啓手足之際不忘也子思中庸一篇傳道之命脈也及于詩者亦十有五且以德輶如毛無聲無臭等語形容中庸之妙下至春秋之世列國相與聘享又多詠詩取義詩出于小夫賤𨽻之言而後之明道習禮者率于此悟啓發之機然則篇目之多寡辭章之次第播之聲歌形之感慨抑可得而悉歟敢問律吕問律吕之興尚矣自黃帝命伶倫取嶰谷之竹斫而吹之以為律本起于黃鍾終于中吕而十有二律定矣後世取相生之法為六十律又有因而六之為三百六十何其煩也且求聲者以律造律者以黍纍黍成尺達于權量四者既同而後聲必至聲至而後樂可作然尺管之數寖失故制而知求尺管者復不以權量參校何其戾也有作凖以定數者有聚灰以候氣者有更為之通制為十二律者其祖襲果有人乎有以玉為之者有以竹為之者有以銅為之者其創制亦有人乎陽六為律陰六為吕六律或謂之六始六吕亦謂之六同六間或以函鍾為林鍾或以環鍾為夾鍾以小吕為仲吕又總謂之十二律其立名為孰善均黃鍾也宣養六氣與氣潛于子者有異旨均大吕也助陽宣物與未發萬物者有異論以至餘律亦皆抵牾不合其取義孰為當自黃鍾至無射陽下生陰自林鍾至中吕陰上生陽班史載之詳矣鄭氏以蕤賔三律為上生以大吕三律為下生其相生之法亦可推乎黃鍾建子而辰在星紀大吕建丑而辰在無枵既已配十二辰矣復以六律配乾六爻以六吕配坤六爻其相配之法亦可參乎以至用之聽軍聲則何以察吉凶用之格神明則何以取三宫夫一物不知君子恥之矧聲律之道所以占盛衰理亂之大者顧可略而弗講歟願條陳之以昭其義荆襄兩淮問據中興之正統用天下之偏勢天運地氣抑遏不遂識者病此久矣歷稽往牒極論形勝河南不為晉土則典午之形削淮北盡撤戍備則南唐之勢孤古之英雄豈不知善守者不當拘限閾之內歟蓋欲之而不能也非不欲也後世言孫氏者曰保有江左矣而築塢濡須未嘗不備于江之外言孔明者曰保有隴蜀矣而雜耕渭南曷嘗不用意于關之外不如是非特無以取其所可取而亦無以守其所當守矣然繼之者屢屯淮南而吳以困遣戍隴西而蜀亦疲豈守之得失不專在是歟今天道好還迅掃中原眷焉南顧非全付有家之時乎東取齊西捲秦北收燕以控天下之大勢雖未可輕論扼長河四鎮守潼藍二關以盡河南之守備亦未敢遽論理唐鄧以壯荆襄之籬落葺漣泗蔡夀等處以固兩淮之門戶昔豪用江左所睨視而不可得者今既已入版圖矣邊閫之臣又能慨任其責矣而中外之論若未能皆同何歟愛惜根本者曰備多則力分守散則形渙紹興間嘗盡得河南不旋踵而敵至其往轍可按也奮發事功者曰藩籬不全無以護堂奧襟袪不密無以燠肩背隆興初既割唐鄧淮泗四郡任事者旋復悔之失䇿可鑒也今新復州郡借曰唐鄧家計漸有其緒而淮北十餘州在漢河包裹之內殆天之所豫而人之所憑以為守者也土荒民殘倍勞區畫少運東南之力以佐其始亟圖耕屯之利以實其後果計算之無遺雖暫費而奚害或謂邊氓未蘇也曷不分其力以經理淮襄乎或謂邊為今裏地也經理新復者非為護內計乎二説將孰從畫舊境而守量吾力所能辦善矣然新附之豪擁衆錯居驅而絶之寧保無他將如昔人之得地不取而拔其民以歸歟抑羈縻其豪傑使之自為守歟界分定則規模立議論一則心力協宏展拓之勢而毋局小試審利害之實而毋慕虛名此今之關係最大者願聞萬全之䇿用兵問兵以不用為強財以不積為富先儒論本朝之治體然矣中興後諸儒奏疏乃曰名勝相望而幹略未優文治可觀而武功未振指為治體之未備又曰有弱勢無戰績豈更涉變故而後知乎嘗因其言而細考之矣南征北伐所向無前而太原黑子之地曷留不取混一區宇悉歸職方而幽州破竹之勢曷為不進景德極盛之時也澶淵一警諸人奚遽有江蜀之請有進尺無退寸廟議賢于長城矣自愧却敵竊笑賦詩請守衝要不願探籌非無守將何莫收邀擊之功慶厯太平之世也夏悍遼傲或者何乃有城汴京之請胸中百萬甲兵重臣隱若一敵國矣詩書宿將既入三川鐵面相公常控邊塞非無良帥何莫奏一捷之功所謂功者洮河之開偉矣其視建朔方置玉門何如鬼章之擒壯矣其視翦樓蘭縛頡利者何如文雅逺軼于三代事功不及于漢唐或曰柄權歸一邊方數易伸縮不自由治國之法度太密也宜其弱然曩收諸鎮極費斡運若之何復縱或曰山前久陷長城藩籬與敵共之立國之形勢未全也宜其弱然後來復燕遂成大悔若之何輕議故雖以全盛昌熾之時恆凛然有戎馬在郊之慮有利必有害事固有當權輕重者儒者太息以為中國之患必出二敵而其所以失者乃東北之小夷耳事固有難料度者炎興間關造國甚著有十三戰功殆迫而後見乎畫吳楚蜀之外不敢望中原一塊土稍越繩墨者名曰開邊寧貽豪傑千載之笑不敢使金甌欠缺之處開禧輕舉其收拾者非督府得人乎金吾亡無可報之怨敵虐將自絶于天三陲生聚曷堪斯擾向之守蜀在三關今縮而至興沔極矣若又縮而入如屏障太薄何向之制閫在江陵而襄州副之今大閫不容不還舊矣而襄費葺復何向之兩淮聚重兵于要地今列郡皆築城矣設有緩急如備多力分何先朝舊規豈不當講或有錯處之北軍然有宗公澤則盜賊皆可用否或有揚去之北將然有告以劉昭榮之語我燕人也棄敵歸朝豈忍復背則其心可回否其大者則在將帥之得人使邊閫自守其地自為家計自李公綱有此請范公宗尹繼之雖未敢盡倣藩鎮而前此分畫委任時出應變亦粗見效其説當討論否事迫矣非國人雍容緩帶之時乾淳崇奬武科用矯儒緩教育相承必有深識治勢者若有司以空談問諸君以空談對今世所少非文也請推我朝所以有弱勢無戰功者何故與今日所以投實劑者救急證者何先其盡言毋略鐵菴集卷二十七
