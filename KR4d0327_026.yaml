body:
  text: 鐵菴集巻二十六宋方大琮撰䇿問延平人材問延平山川秀超七閩其英偉雄傑之氣物之所不能得者而人才産焉寶氣之精盤礴于此區儲英毓靈盖千百年而稽之前史未見有一姓名通上國者以為逺而不克自達耶則曲江九齡日南公輔不加近也史稱閩越地肥衍有山泉禽魚之勝雖有長才秀士不肯北宦豈其懷才抱畧沈伏而不出耶常衮使閩延見諸生課書作文閩士有相踵擢第者而此邦無聞五季間有號唐五經者始教授其徒人知向學以知此邦民風之朴乆矣國家詩書之教洋溢海圻矧衣冠禮樂稱為中州此固逢掖章甫之士洗濯試用之秋雖欲勿用明時其舍諸再考圖志自太平興國以迄于今垂三百年矣才傑士磊落層出援引傳說取重淳夫王端字道源學師荀孟見知圖南廖執象則講學中未常無人也古文二軸古靈珍賞危迪簡即迪道試䇿翰苑東坡擊節廖正一則文章中未常無人也有耿介自守不肯訪金陵于私舍者林積有調官闕下嘗被趙清獻之薦不輕一謁危迪簡其靜退為何如有抱忠履正不登蔡氏之門者廖刚有不竄章表寜咈章子厚之意者鄧棐字元孚其志向為何如茂才異等再詔應選龔懋君美詞學兼茂棣蕚相輝曽輔字載徳曽中力學屬文以賢良舉張哿字安時博學養髙以隠逸徴吳儀字國華臚傳首唱盛事也出冕旈之親擢為尤榮黄裳舍選賜第常格也膺殿陛之宣諭者未易得唐稷進詩規諷召對便殿鄧来非出自布衣乎正色言路詆誹王氏陳淵非拔于特科乎又况倫亞相望于百餘年間異才輩出方興而未艾也夫向者皆安在而今乃傾囊倒囷羅列而並進耶其顯伏盛衰亦自有時耶其間優劣醇疵亦可議乎否也雖然有一國之善士有天下之善士猶未以為足也則奮乎百世之上而百世之下聞者興起獨無若人乎龜山先生以道學名發明洛之藴抽闗啟鑰為世指南了翁先生以氣節著指斥奸臣之惡流離困窮濵死不屈夷聞其名不獨中國也千古慕其風不獨當時也蕞爾山郡而百世師出焉不知天地之間氣沈積勃鬱者㡬百年而後生斯人也視前諸公殆如繁星麗天而芒寒色正五行之精也山川猶昔風景不殊龜山之道傳之豫章再傳李氏今則屬之誰歟了翁之節墜于其子今則有其志者誰歟峩冠員領誾然庠序源流相接不可輕誣以無人將涵養之深歟或韜藏而自修歟否則窮遯于嵁岩丘壑之中而不肯輕見于城闕歟然二先生亦自科舉中來學校豈不足以凂之歟將廣捜博訪而求之以所聞知歟嘗怪了翁責沈一篇以不識明道為寡陋之愧猶有可原與龜山生同時居同郡流謫合浦始通書問至晩而相知竊意人物參錯雖其徒不能盡知而使其入境問賢者又何從而悉之元祐間了翁里居薦二吴于郡侯境内有二賢士吴熈字季明吴儀字國華郡侯釋菜之餘邀請講經諸生列聼美以詩歌㧞以遺逸真一時偉事也今賢侯崇重學校捜訪人才時無了翁其薦達亦可信乎既得其人亦可延置學校以為諸生勸乎亦可以舉于朝乎諸子有志前修素矣將何說焉毋荒于嬉毋毁于隨挺挺然自拔于流俗者則學校之光也晏元獻出判西京范文正攝教西監晏公問以人物范公以二舉子對則富文忠張文定也問答之頃四相萃焉猗歟盛哉賢侯將有以問焉則何以對諸君其勉之武舉問國家武舉之科視前世為尤備竊嘗疑之文武並用文武相配漢之政也今三年大比㑹試天府而登名仕版僅及文科十之一殆輕之歟武貢與明經同飲賔興舉送于部唐之制也今惟文士鄉舉計偕而武舉經造兵部﨑嶇跋涉殆艱之歟其試之也先觀騎射後考文義則于武畧也似所先其等之也智畧為上勇力次之則于文藝也又非所緩其先後之序安在絶倫者豈非取其力之過人歟而文不及格輒又不録既責之以膂力又使俛首習為舉子業何也平等者豈非以力之不足而兼採其謀畧歟而文采稍劣雖智無取縱横變幻之文而律之以程式何也昔人有能挽二石弓而目不識丁字今之力能挽弓而不􅈺文字可以收用否昔人有通古今書而不跨馬不穿札今之曉兵書者不穿札跨馬可以預選否老蘇又謂弓馬不過麄力試䇿亦覺無用是二者俱可廢歟國初名將散出多途是猶曰科目未備也中世削平冦盜中興恢復之業名臣宿將勲業赫奕或出于將家者有之或拔于行伍者有之其自武舉中出者㡬人比年武舉之議諭風采大勝于前頃者羽檄交馳真才錯落其出于武科者誰歟豈非科目殆為平世美觀而臨變制敵則别有人歟然觀唐㑹要以軍謀之逺為制科而控捍全蜀崔員出焉以長垜善射為平進而再造王室子儀出焉前世武舉不可謂無其人而謂今無之可乎諸君抱負韜畧非徒曰學校教養姑應故事而已將以試于有用盍各言爾志宗室廩禄問國家親睦九族超越前世逺甚彼其親之也則連城跨邑㡬半天下而奢僭生焉我朝分封諸王未嘗據有其地使之淬志勵行自効于一官一職之間彼其抑之也則在官附益之律設甚者至乗牛馬而窮悴有之我朝屬無親疏悉廪之官使不至如子弟匹夫而已其䖏之得其法愛之盡其恩盖兩得之帝王示天下以公不欲厚私其親使之不得多殖田宅以自豐而公族之賢亦皆恪守家法清修自好惟仰給公家顧尤有可念者孤遺之請所以示優恤也今諸州支給多不按月貧者至有指未領之俸而出息稱貸焉養㢘之俸所以為需次計也今諸郡拘以定額有戍期已踰竟不霑請者岳祠之廪隨請隨給今也授缺之後動三四年不免起俟河之嘆宗女出適例有資給今居在外者年才及笄慮其糜蠧逼之使出其資給得所者有㡬郡州豈欲以刻核之故而施天潢之親哉國初支派未繁悉聚京師熈寜以來分處州縣駸駸至今枝葉繁茂以千萬計亦可謂盛矣困于供億在在皆然亦可謂難矣後將有倍于此者何以支吾欲使宗室無匱乏之嗟而州郡不見供餽之勞權二者之中夫豈無說諸君世廪縣官亦當合彼此而參論毋曰郡計之贏縮非所知也兵書問自孫吳著書而後世之言兵者宗焉竒正分合之情開闔翕張之變盡備于書觀之者惟恐其不能用用之者未必其皆有合合之者未必其皆有騐即深信之孫吳者不能不自疑也其言曰動之以義大足以戰然三軍縞素之舉以義動矣而大困于睢水又曰四隣之助避之勿疑然六國百萬之師仰闗攻秦其助多矣秦不避而取勝曰歸師勿遏也然殽陵之戰匹馬不返非遏其歸路而勝之乎曰窮冦勿追也然垓下之圍追騎深入非迫其窮而敗之乎曰兵聞拙速未聞巧持乆乆則挫銳然吳楚挑戰堅壁不出進兵討羌踰年不動倘以持乆挫銳為戒則條侯何以破七國營平何以剪先零曰百里趨利必蹶上將然夜半入蔡馳三百里當陽長坂馳二百里倘以趨利蹶將為疑則李愬何以得蔡城孟徳何以據荆州欲戰近客無附于水視生處高無迎水流苻堅用此䇿命鐵騎引退而陣胡為而有淝水之奔視卒如兒可赴深溪視卒如子可以共死李廣得此意食與士卒共而終身不得取勝于匈奴凡此皆孫吳之神機秘畫而軍中之勝負或與相反豈其書可觀而不可用歟然闔廬之敗武在其中九國之困起不能兵豈臨機制變雖二子亦不克自用其書歟諸君胸中甲兵將有得于筌蹄之外者試詳言之毋隠錢幣鹽法漢唐有可論者規模制度也曰錢幣曰鹽法尤闗國計之虛實民生之休戚大抵變更多自輕而重自寛而宻浸淫濫觴莫知所終矣漢去秦苛錢重難用更鑄于興元又更于文帝至建元元狩而其法不一賈誼言縱鑄之弊賈山亦言之而吳鄧之錢布滿天下不可得而抑也何耶唐除隋亂錢鑄輕小更鑄于武徳申禁于顯慶至乾封乾元而其論不一陸贄言錢重之弊齊抗亦論之而物價無常人力愈竭不可得而救也又何耶漢初山海之利未歸于司農自咸陽孔僅桑𢎞羊斡鹽鐵而利析秋毫官與牢盆其直靡定販鹽私鑄犯者日蕃矣何賢良文學之議不克勝𢎞羊安邊足用之言唐初鹽課之入皆𨽻于度支自第五琦劉晏李㢲權鹽鐵而其法盡變鹽價一増十倍于昔逮及三變民不堪命矣何韋䖏厚韓愈之說猶可屈張平叔鬻鹽富國之請是非可否抑又可得而論耶雖然錢重鹽貴漢唐之通病也斂散之權猶在官而不在民操縱之術猶在上而不在下且令告緡錢在一切之政耳而豪强匿財不敢慢武帝之令禁錢出境亦甚迫之事也而州縣奉行不敢玩徳宗之禁法甚嚴矣然公家雖澹而人心不可收商賈皆絶而錢禁不可恃其于利害孰緩孰急天下鹽貴宣帝減其價而民間之困少舒江淮河中鹽貴順宗貶其直而閭里之乏少裕意固善矣然終漢之世鹽鐵不能罷終唐之世鹽法不能寛其于本末孰得孰失願明言之周禮疑周禮周之舊典禮經也其疑比他經特甚鄭衆按書序成王既革殷命還歸在豐作周官謂為此官賈公彦以五年營成周六年制禮作樂謂為此禮所作果何時公豈不能身致太平何為自苦思慮憂及來世作為此書以貽後世紛紛之論耶孟氏謂公思兼三王有不合者仰而思之坐以待旦其精神思念盡在是歟諸侯惡其害已而去其籍一厄也秦始絶滅詩書而搜索其籍燒之使盡再厄也至漢而其書始出武帝不之信不以置之學宫又一厄也三厄之餘所謂缺文者往往于是失之歟所幸者未盡亡于此而疑信者半也何休六國陰謀之詆林孝存凟亂不騐之排所非果何見唐太宗讀之則曰真聖典也王通讚制作之備則曰千載之上未有如周公者所是果何據折以吾從周之言孔子豈欺我哉王莽常從之矣而有列肆井區之擾荆公嘗從之矣而有青苗保甲之害豈煩宻瑣屑必有公而後能行而後世不可一嘗試歟姑舍是而論尤有可疑者什一定賦古制也而或十而一十而三二十而五用民不過三日古制也而豐年旬用三日殆十倍于前古不足遵歟周之興也闗市譏而不征而㕓夫有五布之斂澤梁無禁而王府入漁人之稅文王不足法歟酒誥之戒商民也曰勿庸殺之而掌刑則有摶僇之政無逸之戒成王也曰無淫于田而司馬有致禽饁獸之法豈書與禮經有異歟夫家之征所以重閒民之禁也而轉移執事又以一職任焉偽飾有禁所以杜侈靡也而王之金玉玩好則有掌焉一經亦不必同㫖歟噫公之書能信于孔孟文中子而不能信于何休林孝存之流能行于周之世而不能行于王莽荆公之時能使太宗歎服而不能釋武帝之疑何歟疑之而輕議者行之而背馳者其為不知則一也于公何損本朝名儒不為不知公者復讐之事伊川疑之盟詛之說横渠疑之歐陽公疑征役蘇黄門疑封建胡五峯疑宫閫豈其非公全書或有雜之者歟諸公之疑其非者乃所以深信其是歟然則公之心其能安于千古之下歟此其說皆難通也試討論之詩書疑孟子通經詩書尤長武城取二三䇿他則不足取歟雲漢不盡信其言推此容猶有不足信者歟盡信書不如如無書其所長殆在是歟于此有疑焉夫子定書斷自唐虞以帝王以前無經可考歟則三皇之書周外史掌之三墳五典楚左史讀之何置而不載夫子删詩獨始二南以夏商以前嗇于歌詠歟則康衢有謡載賡有歌九叙五子迭歌于夏其可見者何畧而不收詩書述唐虞之際今于詩不多見而盡述于書何也成康没而頌聲寖且康王之時無頌何也百篇之序無異論以作于孔子也而詩序之論至今異同果誰為之也漢儒摭書以言曰立功立事可以永年曰白魚入王舟周公曰復哉今書無其辭而地平天成明徳維馨等語書文具存趙岐杜預以為逸何也春秋時舉碩人之詩而素以為絢之句不存舉棠棣之詩而偏其反而之語不載曰趨以采薺曰狸首為節而二詩之辭又未之見何也虞典可謂之書而堯典亦繫之虞者何謂節南山等詩可謂變雅而鴻㕍庭燎之美者亦謂之變者何意詩書雅言講論乆矣幸詳言之以釋所疑鐵菴集巻二十六
