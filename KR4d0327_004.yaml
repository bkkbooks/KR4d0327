body:
  text: 鐵菴集卷四宋方大琮撰進故事端平三年十月上進端拱元年三月上謂户部使李惟清曰朕讀漢書賈誼傳夜分不知其倦誼當漢文時天下始平指論時事尤為激切至云長太息堪痛哭者蓋欲感動人主不避觸鱗是真忠臣明國體者也今廷臣有似此人者否乎乾道三年九月吏部尚書陳俊卿進對奏自古惟唐太宗能導人使諫所以致貞觀之治上曰朕每讀太宗事未嘗不慕之若德宗之忌克不樂人言未嘗不鄙之退御經筵命講讀官稍前曰朕雖無大過豈無小失自卿等不聞有所規諫若只備位此非所以望於卿等直言非人臣之利也其拳拳忠君愛國之意實發焉和悅以受之猶恐其有所畏況可拒之乎委曲以來之猶懼其有所隱況可疑之乎我太宗皇帝讀賈誼傳取其太息痛哭之忠進户部使而語之曰今廷臣有似此人者乎孝宗皇帝讀唐太宗事慕其導人使諫之風命講讀官稍前曰卿等不聞有所規諫何也讀前史而感慨呼臣下而叮嚀嘆其無此人其愧恥之者深矣責其無所諫其激發之者至矣故端拱咸平間田錫之輩出乾道淳熙間王十朋之輩出如錫十朋輩忠愛根於所性固不待於愧恥激發中人之性則不能無待也自夫進諫者之不力始而鋭中而疑徐而婉逮其怯也以激為諱矣自夫受諫者之不樂始而聽中而容徐而玩逮其厭也有拒焉而已矣其臣得無愧於賈誼其君得無愧於太宗乎然則為人臣者當竭其忠愛之實而毋以陰拱默視為便為人君者當察其忠愛之實而毋以取名賣直為疑主聖臣直此治世事也此祖宗家法也故臣恭陳二宗寶訓以禆明目達聰之萬一十一月上進前漢元鼎五年丞相趙周坐酎金免詔以御史大夫石慶為丞相時南誅兩越東擊朝鮮北逐胸奴西伐大宛中國多事公家用少桑𢎞羊等致利王溫舒之屬峻法倪寬等推文學九卿更進用事事不關於慶慶醇謹而已唐武宗立李德裕為門下侍郎同中書門下平章既入謝即進戒帝辨邪正專委任而後朝廷治夫輔相有欺罔不忠者當亟免忠而材者屬任之政無他門天下安有不治開元初輔相率三考輒去雖姚崇宋璟不能踰至李林甫秉權十九年遂乃禍敗是知亟進罷宰相使政在中書誠治本也李德裕傳熙帝載而宅百揆詔王柄而馭羣臣此古大臣事也後世以中書為政本所自出之地謂之禮絶百僚也任之專信之篤非固假之柄以寵其人也所以尊朝廷嚴治本也非其人則去之亟而位則不可虛也故未有其位虛與夫非其人而充位亦無仁賢則國空虛之謂元氣虛則外邪乘之國虛之時此識者之所驚而憂而羣邪之所喜而舞也漢武帝中年相趙周免石慶代之慶不能關決而事多出於九卿唐武祖初年李珏貶李德裕代之德裕謂政無他門而治必本於中書蓋周之免可也而九卿則不可雜進以用事珏之貶可也而中書政本則不可以不專大臣者宗子之家相也宗子不能以獨治其家必委之家相相之權不專而豪奴悍婢皆捷出以投其罅則家政弛矣人主之任相亦然雖然擇相誠難也亦不可厚誣天下以無人武帝名相慶而實任九卿慶誠不足任然帝之時猶有可議者仲舒不相天下至今以為恨使其舍慶而相舒豈復有九卿用事之失德裕謂開元輔相率三考輒易而治及用林甫十九載而亂然德裕之語猶有可議者斥九齡相林甫天下至今以為惜使其以林甫之嵗月為九齡之任用豈復有政出多門之憂此擇相不審任相不專之明驗也然則天下之權付之一相而聽其所為乎曰事正不必從中出宰相行之其失則臺諫議之給舍執之此本朝家法視歷代為最善當其治則宰相賢而給諫亦皆得人相猶不得行其私況他岐乎故政出於中書而旁蹊盡塞世以重臣目之其不賢則給諫相與攻而去之又其甚不賢而給諫皆其私人矣故政雖猶在中書而公私雜行世以權臣目之蘇轍曰重臣與權臣權臣不可有重臣不可無以此觀之相賢則給諫必賢而百官莫不趨於賢故曰人主之職論一相嘉熙元年正月上進景德元年契丹入冦上既定議北征羣臣有以幸金陵之謀告者冦準曰羣臣怯懦無知今虜冦迫近四方危心陛下惟可進尺不可退寸河北諸軍日夜望鑾輿至士氣當百倍若回輦數步則萬衆瓦解虜乘其勢雖金陵亦不得至矣上意遂決虜衆抵澶州其統軍撻覽將精鋭為先鋒我軍以牀子弩射達蘭中額死虜大挫衄退却不敢動紹興三十一年金主亮恃其強暴欲渝盟犯塞至是遣其臣來賀天申節因求淮漢之地又指取將相近臣議事時朝論洶湧人情皇惑上意雅欲視師於是宰執奏曰敵國敗盟天人共憤今日之事有進無退若聖意堅決則將士之氣自倍願分三衙禁旅助襄漢兵力待其先發然後應之上深以為然冬十月下詔親征時待制曽幾病聞或者欲遣使詣敵以緩其來即上疏曰遣使請和終無小益而有大害為朝廷計皆當嘗膽枕戈專務節儉經武整軍之外一切置之如是雖北取中原可也是月亮敗於采石竟被殺之並見國史兵凶戰危挑異類以輕重者非也國不競亦陵買強敵以求靜者亦非也昔者之輕動國人自非之冒其非而用之其悔不可追也今退而守吾圉而猶敢於亂常干紀逼我太甚則國人交怒之矣乘其怒而用之則吾之弱有可使強之理靜而可買何憚不為彼狡焉叵測突如其來獨不可於危中求存死中求生乎昔景德中契丹入冦國中大震羣臣有以幸吳行蜀之説進者獨一冦準建有進尺無退寸之議而真宗之意遂決我是以有澶淵之捷當紹興末金國敗盟朝論洶湧或者有以遣使欵敵之説進者獨一二宰執倡有進無退之議而髙宗之志遂定是以有采石之捷使真宗而信避敵者之議則欽若等為愛君而冦準為幸勝矣使髙宗而從欵敵者之議則或者為得計而宰執為輕舉矣蓋人生不可無憤怒自強之志也立志之不強而反譽敵之強則和之説得以自詭矣雖然和豈易成哉不能戰而能和前未之有聞也達蘭之死而後有景德之和金主之死而後有隆興之和不然敵果何所創而甘心言和哉若夫金甌之缺未還赤子之痛未定乃欲忍恥以事仇敵此蓋亦立志之不勇也準之言曰六軍心膽在陛下身上紹興間馮時行亦曰自古未有人主退而能使天下進人主怯而能使天下勇然則國人之心膽與其進退勇怯皆在人君之身非特國人也三百年宗社命脈之存亡絶續亦在焉其可不強於立志哉三月上進魏主丕遣太常邢正勑權為吳王吳人以為宜稱上將軍九州伯不當受魏封正入門不下車張昭曰君敢自尊大豈以江南寡弱無方寸之刃乎正即下車中郎將徐盛憤忿謂同列曰盛等不能奮身出命為國家并許洛吞巴蜀而令吾君與正盟不亦辱乎因涕泣橫流正聞之謂其徒曰江東將相如此非久下人者也云云吳遣使如魏云云魏怒吳任子不至欲伐之劉曄曰彼上下齊心阻帶江湖不可制也通鑑王猛寢疾秦王堅訪以後事猛曰晉僻處江南然正朔相承上下安和願勿以晉為圖堅將伐晉會羣臣議左僕射權翼議曰晉雖微弱謝安元沖皆江表偉人君臣輯睦內外同心未可圖也通鑑國於天地必有與立善覘人國者不觀其形而觀其所立何以立亦曰人而已矣國無人焉亡也春秋書梁亡梁自亡也有人焉不能用又自為乖異亦亡也傳載虞不信宫之奇而亡之類是也國於江南自吳始東晉繼之孫權﨑嶇一隅之地當曹瞞父子百萬之衆而能虎視中原者其君臣以明鋭俊快自立雖曰根本淺陋而臨朝斫案論事上倡下隨如戰赤壁塢濡須爭荆州瑜肅驅於外昭雍綜於內精采百倍非以人立國乎中迫於蜀名與魏和邢正奉魏命至張昭折之曰豈以江南寡弱無方寸之刃乎徐盛忿之曰不能出身為國并許洛而使吾君與正盟不亦辱乎故魏之邢正有江東將相非久下人之語劉曄亦有上下齊心不可卒制之語可謂善覘吳者矣東晉間關匹馬之資當敵氛四起迭仆之中而基本不搖者其君臣以器局風流自命雖曰宴安江沱而猝遇緩急雖綺褲子弟亦能臨戎如屯雍丘至灞上入關中導支撑於前安鎮定於後堅忍自存非以人立國乎焚幣却使終不言和符秦鋭於飲江其臣王猛曰晉上下安和願勿以為圖權翼曰晉雖微弱謝安元沖江表偉人君臣輯睦內外同心未可圖也符氏犯之果有淮淝之敗可謂善覘晉者矣以勢言之則吳之小不足當魏之大晉之弱不足敵秦之強而所以能張其小而抗其弱者則吳之君臣常有忿憤之志其詭和者暫耳而曷嘗以畏魏自沮哉晉之君臣猶有輯睦之志終世不言和而曷嘗以畏秦自怯哉後之立國者亦可以見也今戎禍慘矣所謂江東將相者誰歟江表偉人者誰歟上下之心齊歟內外之心同歟西風無數月之期遊魂有薦食之意要必吾國之君臣上下其心齊同如吳之忿憤如晉之輯睦是當怒敵而人交奮毋譽敵而內自攻則雖弱必強雖危必安者願相與汲汲圖之四月上進晉泰始八年晉主與羊祜謀伐吳祜以為宜藉上流之勢密表留王濬監梁益軍大作舟艦於是作大艦長百二十步受二千餘人以木為城起樓櫓開四出門其上可馳馬往來時作船木梯蔽江而下吳建平太守吾彥取以白吳主曰晉必有攻吳之計宜增建平兵以塞其衝吳主不從隋開皇七年陳受蕭巖等降隋主益忿命大作戰船人請密之隋主曰何密之有使投其木梯於江曰若彼懼而能改吾復何求也楊素在永安造五牙大艦起樓五層髙有百餘尺置六拍竿髙五十餘尺容戰士八百人其次黃龍平乘舴艦大小有差陳主不為深備並通鑑國有險而存有備而固恃險而無備猶無險也曹丕嘆息於廣陵佛貍倣徨於瓜步蓋立國於東南所以懾敵人之心者其險必以江也然而國以江為險江以舟楫為備晉之伐吳必造舟於上流隋之伐陳必造舟於永安彼將用東南之所長以攻東南之所恃也然當木柿蔽江之時而吳人急為之謀投柿於江之時而陳人早為之備晉隋雖弱長江豈能飛渡哉奈何吳以暴鷙之資行虐政逆諫口陳以荒淫之行溺嬖寵戮言臣是皆與亂同事者也豈暇為國家慮哉乃者敵為不道遊魂近鄙而我朝廷之間君臣上下危言苦語更相警懼惟恐其有一毫獲戾於天也天豈使封虺巨蛇以長薦食我赤子哉必也怠荒之戒申訓於其內憂辱之言申警於其外則國其庶幾乎敵方奪我舟募吾匠童吾山造船編筏於樊襄間斧斤之聲不絶不待西風之起嘗懷北顧之憂毋使賊智與夏水俱生則江面雖震而吾固有所恃矣昔三國瑜肅以三萬逆擊老瞞四十萬之師我中興王權以七萬迎擊金人百萬之衆赤壁之勝蓋蒙衝戰艦之力采石之捷亦海鰍船之功操之舟可燒而走亮之舟可陷而溺宜也然則常德武事內外交修用吾之技伐彼之計此今日所當寢薪嘗膽而汲汲為之圖也七月三日上進景祐二年六月以宗室寧江節度使第十三子養於宫中時年四嵗寶元二年始出還第時年八嵗上及皇后鞠視如子嘉祐六年詔嶽州團練使某為泰州防禦使知大宗正寺先是韓琦曰此事當出自聖擇上曰宫中嘗養子二人小者甚絶然不慧大者是可也琦請其名上曰名宗實者今三十許嵗矣琦曰此事若行不可中止宜斷以不疑乞從內批出上曰此豈可使婦人知之只中書可行也遂降詔是年以諸王宫侍講王獵為宗寺伴讀獵為宫僚凡十三年有輔導功故首用之時吳奎薦其可任經筵文學之選韓琦言其不通私謁足見有守故也先是至和末文彥博等勸早立嗣既而范鎮司馬光等相繼言之如是五六年琦獨嘗請建學內中擇宗室之謹厚好學者升於內學冀得親賢可屬大事欲以此感動上意嘉祐七年立為皇子上指心曰此決自朕懷非由大臣之言也紹興元年上諭大臣曰昨命令懬選藝祖後二三嵗者且俾廣求當自選擇富直柔曰宫中有可付託者否上曰朕已得之矣若不選擇宫嬪則可慮之事更多二年令懬選宗子普安郡王及伯浩入禁中伯浩豐而澤普安清而癯上初愛伯浩忽曰更子細觀乃令二人並立有貓過伯浩以足蹴之普安拱立如故上曰此兒輕易安能任重乃賜伯浩白金三百兩罷之而育普安於張婕妤所時年六嵗矣二年令懬自左中大夫特轉行左大中大夫後省以轉官非法封還録黃遂寢其命四年令懬復得伯玖年五嵗上以其聰慧可愛令吳才人毋之其後張婉儀卒即妤婕命吳婉儀併視普安與伯玖同處雖一食必均焉吳婉儀後為憲聖慈烈皇后上謂張浚曰宫中見養藝祖之後二人長者年九嵗不久當令就學又謂趙鼎曰此子天資儼若成人朕自教之讀書性極強記鼎先得旨於行宫門內造書堂屋一區欲令就學至是成上曰便以為資善堂遂降制封建國公以范沖兼翊善朱震兼贊讀上命見沖震皆設拜二人皆一時名德老成每因箋疏導以經術仁義之言輒標軸藏之時一展玩十二年封普安郡王時年十五十六年加璩即伯玖封恩平郡王出外第號東西府初命館職二員並兼二王府教授三十年上知普安甚賢欲稍差别謂宰相湯思退曰此事出自朕意非因臣下建明立為皇子聖人以仁天下為心必有紹續於其後聖人以公天下為心必當計慮於其早生靈之寄甚重宗祧之付不輕茍得所託仁也亦公也唐宣宗諱言繼嗣事言者不怒則斥後唐明宗尤諱其事羣臣無敢正言者二唐祚脈之不延也宜哉我祖宗以至仁大公循天而行何心之有真宗皇帝之選宗室子也髙禖未卜則育之禁中甲觀既生則歸之藩邸其宏度偉識超然前世逺甚景祐二年仁宗皇帝年甫二十八而養四嵗之宗子於宫中紹興二年髙宗皇帝年甫二十七而養藝祖七世孫二人其一六嵗也自古人主誰能於春秋鼎盛之時而建此議乎然非徒選也仁宗語韓琦曰宫中嘗養子二人小者甚絶不慧大者可也髙宗命近屬令懬選二人一豐而澤一清而癯初喜豐澤者既而細觀以輕易出之後二年又得五嵗者遂為普安恩平其精於選擇也如此亦既得之矣而又思所以拊視之其未齠齔之年為保慶后所養其八嵗未還第之前皇后鞠視如子而後仁宗之心以安大臣以宫中有可付託為請則語之曰若不先擇宫嬪則可慮之事更多故普安育於張婕妤恩平育於吳才人婕妤沒才人併毋之而後髙宗之心以安其謹於保護也如此而最所加意者少成之教也韓琦嘗請建學內中擇宗室之謹厚好學者升於內學冀得親賢可屬者其後雖還第而諸王宫侍講王獵為宫僚最久琦薦其不通私謁以輔導功升為伴讀則仁宗之謹東宫僚可見普安年九嵗既令就學又語趙鼎曰此子天資特異儼若成人朕自教之讀書性極強記命鼎於行宫門內造書院一區而以一時名德范沖朱震兼翊善贊讀又命館職二員兼二王府教授則髙宗之謹簡宫僚可見其篤於教導也如此擇之審天命之公也護之謹人事之盡也而教之尤不可不篤者蓋天資雖髙而左右必正人與居必善士學術乖僻者不與焉心術回邪者不與焉教學相半習慣自然是又欲以人而輔成其天也祖宗得人之仁至矣哉處心之公大矣哉乃者季夏甲戌親灑一札欲於內中建小學令宗司擇宗子資質之美者二三人置師而教之大哉王言所以慰祖宗之靈所以繫生民之望所以對越上天之心者他日皆有望焉故臣輒采先朝已行之典思衍今日無疆之休然猶有獻焉祖宗謂此事至重至大其為計至嚴至密慮夫婦寺之得以竊弄其間也故厚陵之自團鍊升防禦如宗正寺時韓琦乞從內批出仁宗曰此豈可使婦人知之只中書可行此語可以深味又慮夫奉命者之得以邀勞無已也故阜陵被選令懬實預焉既而以殿撰左中大夫特轉行大中大夫未為甚過後省以轉官非法封還録黃其命遂寢此事亦自足法尤慮夫外廷他日之得以藉口貪天也仁宗曰此決自朕懷非由大臣之言也髙宗曰此出自朕意非由臣下建明詞嚴義白可為萬世法故臣復表出先朝正大之訓永杜後世貪覬之萌蓋有久大之慮不可無密察之功先儒謂百金之産猶能定謀豫計況於有天下者乎信哉其不可不謹也聖慮髙逺願留神三思七月二十三日上進漢宣帝即位魏相入為大司農四年大將軍光囊上以其子為右將軍兄子山復領尚書事相因平恩侯許伯奏封事言宜有以損奪其權復因許伯白去副封以防壅蔽韋賢免相遂代為丞相元康中胸奴遣兵入冦上與趙充國等議欲出兵相上書諫難以兵動曰願陛下與平昌侯王無故樂昌侯王武並帝舅平恩侯許伯及有識者詳議上從相言而止唐貞元末柳宗元為監察御史裏行善王叔文韋執誼二人者得政引內禁近與計事欲大進用俄而叔文敗貶邵州刺史不半道貶永州司馬既竄斥貽書京兆尹許孟容曰宗元早嵗與負罪者親善始奇其能謂可以共立仁義禆教化以忠正信義為志興堯舜孔子道不知愚陋不可以強其素意如此也甚矣細人憸夫之不可與共事也大臣欲行其道不可則止士大夫欲行其志不合則去豈必委蛇婉孌於左右親密之間而曰姑因人以濟事哉大臣而有此見不足為古大臣士大夫而立此論不足為賢士大夫觀魏相柳宗元之事可見矣以相之嚴毅豈不能自結主知而奏封事去副封一則曰許伯二則曰許伯諫止用兵自是正論乃勸帝與三侯有識者議之且三侯貴戚之庸人耳其於識見為何有而相待之過矣業之陋正坐此以宗元之才俊豈不能自為時用而所善王伾叔文相與計議逮彼負罪奚能掩覆乃猶曰初謂可以共立仁義可以共被教化可以共興堯舜孔子道且二子依乘之小人耳其識堯孔為何如而宗元期之過矣名節之喪有由也士君子急於救時而患其君之不吾聽也顧欲因左右之親信者以投其機其説曰權以濟事耳幸而濟不過為相之陋而外戚之禍已貽於此不濟則宗元輩一失其身萬有餘罪可勝悔恨哉雖然此亦人主之責也天下之大當與天下之賢士大夫共之豈必與一二親信者為密哉自人主之意向有所偏而君子之欲為善者無所依茍足挾以有為不暇擇也然附之為善者艱難委折未必有成而附之為惡者呼儔引類誰能遏之況安保此身之能自立其間不反為所噬乎又安保其不宛轉以同入於惡乎縉紳之禍輕國家之禍重矣故為人主者不可專聽昵比者之言而輕疑君子之未必集事為士大夫者當常持正大之論而毋謂小人之或可共事上見之審下守之固國與身其庶幾乎臣竊聽近日一種議論而於漢唐二臣之事者重有感焉輒推其説以獻舉浦城北尉林贑孫奏狀臣非才將指職在觀風雖懷利人澤物之心常恐州縣間壅底扞格聖朝寬大好生之意無以宣於下下民沉抑不白之寃無以聞於上今有一尉之微平反美譽縉紳士大夫交口誦之其可稽於徹聞乎臣竊見迪功郎建寧府浦城縣北尉林贑孫膠庠之英才識老練其未至官也邑有黃氏女嫁祖氏不宜於姑暮夜與女奴負篋以逃旦則見其尸在坎水中痕傷遍體官則追其姑及其夫鞫之已誣服矣獨篋中衣未得耳贑孫始至而疑自出賞募告者又禱之神未數日獲一姓周者脫衣則篋中物也問之乃言丙夜至山中與一二惡少劫與汚焉復殺二婦以滅其口遂以舊所繫者盡釋之一邑驚服考之國史與錢若水同州事頗相類沉在底僚未有表而出者欲望聖慈特賜旌擢以為雪寃直枉者之勸亦是國家重惜人命之本意也按通判興化軍江叔豫通判福州陳過知同安縣謝奕恭臣澄察一道首欲以廉化士大夫不敢輕以贓和罪加人其間有習與性成屢跌不改於訓化乎何有直當去其太甚者臣未離里門時固知朝奉郎通判興化軍事江叔豫之為人昨攝郡事補刺軍籍更易僧剎具有定價子婦女壻政出多門打造器皿更無虛日銀匠以不給工直訟之遇事納賄商量書判惟詞人所欲專任客將林某書司陳某為爪牙其始聞羣議輒止稍定則故態又作近者舊守將去猶懇易院猶攔截客人油麻船苛取於十里外廉恥喪盡對人可羞此以頑而行貪者也臣行部至福清縣則見邑人能言朝奉郎通判福州事陳過之謬政詰其故則漕司委追縣典吏株連前界各納漆數百緡得免既而聞每差人下縣托其買物無不白納終嵗造剔紅髹器所用朱黃率是苛取分差公吏窠座引問𣙜契吏貼非財不行兩造在庭鞭撻示威交通賄賂專信宅庫陳某廳司胡某為心腹董試秋闈痛削事例非獨簾內外官以至吏卒亦然厨典有斃於笞者兩司在前鐫戒不改此以刻而行貪者也此二人者皆小有才使以廉潔行之豈不為州縣能吏而物欲深痼欲拔不能連汗白簡至於再至於三皆以不善丞郡去每試滋甚真負丞矣當攝郡時猶制於職官佐嶽時猶壓於上官説僥幸脫去他日得肆其毒於千里之上為其民者何辜焉臣愚欲望聖慈將叔豫過並賜罷斥以為稔惡不悛者之戒貼黃臣聞莫難於今之縣上扼於州郡下脅於豪強多不得自展布若夫有可以行志而反以行私如承議郎知泉州同安縣謝奕恭者豈不可惜以貴胄來試邑上下所共觀望豈非力行好事之時而乃玩視州家期會不報輕視百姓縱吏誅求州委尉拘催零米縣以奪其常利文帖十下不肯從州委官權稅務縣日索常堂食錢至手揮權官於公廳殊駭觀聽使上下敢怒而不敢言臣愚欲望聖慈將奕恭免所居官俾之稍知循省是乃所以為保全之道取進止廣帥舉刺舉知潮州劉克遜知循州趙彥珽知梅州楊應已知肇慶府林士燮奏狀照對臣分閫嶠東祇事四月庾漕擇使越俎暫司才短責叢莫知報稱深惟撫安逺氓之道惟以精别郡守為先聰察之吏患在鍥薄慈惠之長或不事事求其寬和而能舉職治辦而不病民者實難其人幸而有焉敢干蔽賢之罰竊見朝奉大夫知潮州軍州劉克遜從臣之子服襲義方以廉飭身以儒飭吏曩由班列出守樵川當冦攘蹂躪之餘行勞徠安集之政流離復業頑暴革心公朝疇其治行召丞外府力丐外補逺牧於潮抵郡之初鄰有嘯聚直逼近境克遜申嚴保障開諭禍福不畏怯而弛備不忿激而貪功賊知難犯逡巡退遁又能蠲月解無名之賦以寬縣計復丁錢自輸之規以惠户長千里懷仁已騰來暮之謡朝奉大夫知循州軍州趙彥珽公族之英更練世故端方有守悃愊無華策名幾四十年外庸甘於平進宰邑丞郡所至可稱循陽如斗之州前守竭澤之後彥珽樽節冗費而官用無乏省除橫斂而民瘼以紓綏集保伍而境絶篁竹之虞率厲官僚而吏知簡書之畏庭無留訟圄無宿囚再期報政綽有去思之愛臣所謂寬和而能舉職者也奉議郎知梅州軍州楊應已西州勝流嘗官學省器能宏逺操尚潔修程江僻陋之邦素號狼頑之俗繹騷末已拊御良難冬春之間監丁為暴應已厲兵屯而震以威通鹺禁而開以信冦不侵軼民以安全惜其長才局於斗壘使臨繁劇式究所長朝奉大夫知肇慶軍府林士燮東嘉名閥早著吏能有敏決之長無操切之過端守數更昏繆重以攝事致紛財竭不支民疲已甚士燮剔蠧縮浮而帑庾自足洗寃直枉而詞訴得平戢姦禁暴而閭閻無警曽未期月百廢具舉究其施設必大可觀臣所謂治辦而不病民者也是四人者所臨有劇易所尚有寬嚴所歷有久近而察其治狀俱有一日之長謹以名聞伏望睿慈特加甄録使遐陬逺郡知有理效靡不上徹天聽其於奬勸吏治實非小補舉知博羅縣王旦奏狀照對廣南管下州十有四地多深阻邑寄尤難辦治者或不能無擾廉謹者或不見集事求其賦輸足乎上撫字行乎下二字並舉官民相安已足為賢令矣若乃平居而條教足以揉其俗有事而智略可以衛其人則絶無而僅有者也竊見惠州諸邑博羅素號難治頃經兵火之殘燬繼苦鹽冦之出沒户口蕭條財賦失陷蓋難之而又難者也承直郎知惠州博羅縣事王旦適承其弊奮然語人天下豈有不可為之邑顧懦者不曉曉者不顓此民隱所以不通而姦吏易於為欺也於是苦心勞力如立家計廳事之後置一榻焉治事於斯寢食於斯有赴訴者相與唯諾有輸送者且納且銷村民既得直達猾吏不敢為姦剔去宿蠧時出新例既為前官補久欠又積醋錢例卷七百緡代納五等丁將滿又以其纂剩五千二百餘緡代納明年夏稅他如增置學田整治橋道百廢俱舉一邑大治州家愛之如幹蠱子弟部民賴之如在堂父兄同官憚之如法家拂士盜賊避之如敵國長城至邑之初適值嵗荒飢民羣嘯揭竿借食旦以身彈壓極力救療治其渠數人反側者旋定上司得其條具亟借義倉大家感其恩信爭發私廪活邑民數千口至今遂為樂土每嵗之冬例有鹽子入境小抄掠大焚蕩旦擇豪民之可用者授以方略責之把守乘而為擾者必治勇於任責者有賞扼險阻置寨柵鹽子不敢過其境至迂路以出師邑其部勒隅總練閲保丁皆可推為他處永法非特一邑保障而已旦蓋習聞家世頗負勳業之傳不為腐儒口耳之學精神強可以效驅策幹略優可以當事任而又廉介不茍取靜重不茍進試令蠻瘴之鄉能自植立其身功之所及雖有限惠之所留已不小入粗入細有用之材也當此時事之孔殷誠宜奬拔以待用臣等輒以其試邑治狀上聞伏望聖慈特賜升擢差遣庶幾逺方小吏皆有不自棄夷之意非止為人材計亦足為國家用材計也舉連州教授周梅叟乞旌擢奏狀臣竊惟國朝人物輩出品樣俱髙然在前代亦有之軻死千五六百年間斯文之脈若存若亡漢舒唐愈不足以當而創明理學上接統緒世運會通始有伊洛之學出則歷代所未有而本朝之所獨有者孰啓其祕授之二程氏則舂陵周敦頤也不由師傅自得於天濂溪千古風月如存封域之名廣矣繇唐以來道之一字獨以名州至是而斯人生焉端豈偶然節惠之名多矣凡諡儒臣者元之一字擬議不到獨若留以待斯人焉又豈偶然可謂吾道之中興元氣之資始天勱相我國家於此時此地見之來為守者既崇其祠又即其地為書院選其族諸孫之有學行者以長斯堂吏部侍郎李韶比以太學博士至郡采諸旦評得今迪功郎連州州學教授周梅叟而以書院事付之梅叟闡明家學以淑其鄉人皆曰周氏有人矣對策大廷陛下拔之稠中置之甲科又皆曰周氏復興矣蓋自敦頤二子壽燾好學承家相繼登元豐元祐進士第一為郎曹一升法從其後浸微梅叟乃能續響於百五六十年之後不以髙科自居汲汲焉惟學不足是憂惟羞先世是恐掌泮連山得熙寧中行部過郡之大雲留題既刻於巖又取太極圖通書大成集刋於學宫進諸生而語之此先元公之所以抽關啓鑰者朱文公熹解説條分縷析殆無餘藴真知實踐則在乎人每講義出聽者咸有感發校士羊城衡鑒尤精臣與之語其踐修醖藉議論風旨不忝厥宗今儒先之家其存而能自立者絶鮮嘉定中嘗訪求程氏後而官之識者疑於遺其師自言偃以吳人從食先聖庭東南儒者得俎豆其後自我朝舂陵周敦頤始先一年其族人有夢其故居光熖上屬元公冕服東嚮立移書至連與梅叟言之梅叟又與郡士言之皆曰此何祥既而為祀典之應事雖近迂然升堂聞絲竹聲孔氏子孫亦自載之乃知其精神之在天者未嘗不在其故鄉然則家於其地而不肯去世於其學而不使墜如梅叟者可不因其能自立而遂褒表之乎臣愚欲望聖慈特賜甄擢或稍進之師儒之列使四方學者知焉非徒為科目得人之驗亦見聖朝扶植先賢故家之盛美實儒道幸甚舉知河源縣夙子與狀臣等竊謂莫難於今之令有撫字焉有催科焉為嶺南之令尤難撫字催科之外有弭盜焉臣等所部四十縣於惠之屬邑得二人王旦之於博羅既以其治狀上聞夙子與之於河源垂滿矣邑人攀戀不忍其去相率以告於諸司者纍不絶儻不以聞是蔽賢也惠為邑四其壤地濶其生齒繁其版帳夥莫河源若從政郎特差知惠州河源縣主管勸農公事兼弓手寨兵軍正夙子與持學愛之心行愷悌之政聽訟平允兩造莫欺賦租有期輸者自至諭上户以和糴而擾不及衆課諸生以義理而學有所本皆書生本分事最是迫近贑之諸邑山徑深阻盜賊出沒亦莫河源若子與合邑之人士與其父老講求備禦設寨柵結保伍明賞罰極有條理雖外之鹽徒每嵗假道殺傷相當卒不得志以去雖內之藍口客主相攻幾成大閧竟以撫捕而定非徒書生也而有仁者之勇焉三年勤勞邑人德之既能不逺千里相率來告臣等廉得其實用敢合祠聞奏欲望睿慈將子與特賜旌擢非特為今日有民有社之勸亦將備他日有德有才之選鐵菴集卷四
