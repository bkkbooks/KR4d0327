body:
  text: 鐵菴集卷十宋方大琮撰啓將樂回交代曾宰被毳田間焉知美製鳴琴堂上遽辱好音恍將入於迷塗幸有導夫先路問期雖邈報賜敢稽恭惟交代某官南豐太史氏之家嘉定名貳卿之子生長聞見逈與人殊問學文章多得天分裏以冠裳而不住直於韋布以爭驅恬然算鞭漫爾哦竹盍趨玉筍屈試鏞川綰墨綬以臨民妙齡難及擁黄袖而出令老吏皆驚如偃愛人如由治賦不聞孔門此風久矣乃於龜山寓邑見之側聽郵傳新求縣最鄭人歌僑之政不待三年建武召密之封正當初載某懶逐時好閒居日多掌泮佐臺當謬參於賓客趨庭斂板乃下列於子男苟可親民不妨還俗㓜知有絃歌之訓近駭聞湯鑊之言博採旁詢審是邦之利病轉難為易經執事之整齊有坦然之規足以遵則冒焉而往有所恃為五斗米竊自憐其塵容持一瓣香預有請於忠告占酬語短締好意長通劍守傅寺丞名門雅望鎮龍化之奥區隣壤小生忝龜山之鄉邑携扶祗戍熏祓䞇名恭惟某官挺特南土之奇源流北方之學自忠肅不與賊俱活而樂齋又抱志未申英氣鬱盤鍾作貳卿之傑諸賢凋落獨留一老之尊上欲起而相之公曰吾有子矣歴稽賢業超出輩流面命家庭尚古人鯁亮之節氣呑塲屋陋進士軟熟之風自奏中牟入陞左帑容臺議禮農扈宣勞孤忠敷陳親結知於帝幄衆目側視覺突立於班心掉臂不留把麾徑去七閩皆鄉國易報平安兩境爭使君各如愿欲肅軍心於鋤驕之頃寒吏膽於束濕之中撫柔此民愛䕶如子休聲熾甚識者憂焉初政圖回之方新善類離合之可畏盍歸大老更起名流並為司徒舉周家之令典親攬庶政翊漢室之中興伏念某自審迂愚不堪馳騖僅常掌泮亦漫佐臺癖雅慣於田廬居閒最久出祗宜於州縣須入何辭㓜知有絃歌愛人之言與習聞撫字催科之說以鹽為命則譜所無驚局面之生疎况心機之短拙包茅不貢則闕賦繭絲太甚則厲民斟酌圖惟厥中伸縮全繫乎上聞賢牧隆寛之易事白大人俱往而有辭敢借潤於脂膏輕犯名教願少寛其轡勒勉竭疲駑皈倚意長編摩字短趙撫幹企首藩垣雅宜上客折腰巖邑謬號長官疇昔楚東之識賢為今閩裏之依芘僣陳短淺仰凟高眀恭惟某官禮樂宗英詩書帝冑好文博學如元祐之德麐對策鯁言如乾道之忠定未弱歲而自拔又前人之所無久已策掌泮之勲徐乃入佐戎之幕甌號奥壤海無驚波近交馳練士之文殆預為戍邉之備無事揮翰文章動摇於湖山有懐憂時念慮周匝於河洛入膺借筯益狀維城伏念某執别周星荒嬉送日骨凡如許敢作粗官之嫌材拙非長不堪劇邑之試山僻而習尚獷賦夥而供億艱綿薄自疑錦傷是懼天下之難唯縣為甚乃今知幕中之辨其意已傳庶知免矣所為皈嚮未易剡裁李運管星軺賛饋亶資上客之賢雷土附庸謬竊長官之號僣陳短淺仰凟髙明恭惟某官秀孕嘉禾根蟠仙李少年科第直大呼以成盧壯歲宦途覺徐行之有味跨飛鳬而直上睨振鷺以不留為漕元僚愛閩佳地咄嗟餉辦談笑誦清列叢桂於臺前行吟香裏嗅新芽於堂上細品貢餘人疑其淹吾有以樂入備一歲錢榖之問匪但十年旌麾之持伏念某牢落地寒陸沉歲久固嘗倚席僅祖常談豈不佐軺了微奇畫不能自振毋怪徒勞幼知有學愛絃歌之言與習聞撫字催科之說以鹽為命在譜則無所闗下邑之慘舒全在上臺之操縱幸逢臭味敢吐依歸幕中之辨其意已傳毋庸可說天下之難唯縣為甚諒亦動心芘而全之深所望也永福學職永福寄居得地一同葢古子男之國去家三舍猶吾父母之邦愿友其士之仁曰師則吾豈敢伏惟某人先輩鄉閭之望學校之英筆挫風霜富胸襟之萬卷名髙月旦宜領袖於諸生試評三山莫盛一永十家而九書室七年而三掄魁俄焉甲子之周行矣壬辰之值當仁母遜嗣響奚疑某久矣杜門兹焉入境聽誦聲之盈耳覺喜色之上眉遊鄭校之鄉不妨議政接臨邛之客敢謬為恭率爾占酬幸甚垂照鐵菴集卷十
