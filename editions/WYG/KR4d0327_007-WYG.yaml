  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0327_WYG_007-1a, image: WYG1178/WYG1178-0188a.png}
body:
  text: 鐵菴集巻七宋方大琮撰表謝秘撰福建運判到任表四年去國徒抱畆忠一節起家就將漕指靡覺周原之逺具宣漢詔之温竊以瓘出諫墀責監楊帑綱奪柱史黜掌沙征蓋好計者罪當誅妄言者法無赦若夫改遷已寵汰出仍輕曾流落之未幾又光華之狎至視往哲僥踰之太甚信我朝忠厚之相承臣某中謝伏念臣起自單寒素稱拙訥逢時清之更瑟偕髦士以彈冠先後無容分踵常途之役推遷偶及驟叨𦂳地之除非不願於得君亦深期於寤主方思陳善之謂敬敢曰言人之所難不自意全喘息以俟常立上側恩遇更親以見有聖人之容本無罪言者之意讒夫規進飛語横興巧援前代之深文欲中㣲臣以奇禍僅延孱弱盡出生成拜散吏於鏡湖時時仰祝縶幽人於槃澗念念不忘敢謂陸沉終蒙簡在寵以木天之論撰畀之枌部之將輸若蔡襄仕慶厯之時以氣節選至林枅在淳熙之世有廉介聲皆出臣鄉見稱記壁況事力已大殊於曩日而技能又莫並於前修控免弗俞感恩至泣兹蓋恭遇皇帝陛下思治如渴聽言若流兢兢世道之安危了了人才之邪正察臣雖嬰龍頷亦安有於他腸念臣久侍螭頭非不識其何狀責其驅馳之來效贖其狂瞽之往愆臣敢不肅戢吏饕講求俗蠧正身率下少新一道之精神悉意寛民庸䕶七閩之氣脉漕使謝到任表支壘承流蔑聞善狀計軺乏使就拜除書不煩跋履之勞如被光華之選具宣隆㫖深激丹襟中謝臣譾焉書生懵於世故起家射策甫歴泮芹徒步登朝寢躋卿棘慙無補報自跪撫摩所領雙符袁視當塗為褊既逾兩載臣與斯民甚安將去如初曰節與愛才僅堪於小試夢不到於陞遷維江以西緜延至廣聨絡十有一郡舳艫百餘萬艘糴糓湟中克佐馬牛之運埋輪道上欲空豺虎之羣退惟何人當此隆委伏遇皇帝陛下厲精庶政申飭羣工知臣綴班於庭備體九重之仁儉謂臣叨試此土熟諸一道之戚休付以將輸責其課効臣敢不究心飛輓悉意咨諏稽財貨之源流務公取予察官吏之能否冀盡澄清賀皇帝表立皇子祈國公統紹鴻圖有永在躬之厯慮深燕翼迄成立子之謀典禮舉行人祇胥慶中賀伏以繼承有國所重明斷惟聖乃能稽嘉祐之舊章暨紹興之近轍選賢而長既愛且親播告四方翕然度越前代逺甚恭惟皇帝陛下儉慈守位剛健體天克勤於邦謹一祖六宗之託啓祐厥後邁三代千嵗之安蔽自宸衷誕登哲嗣丕建齋壇之節聿新公衮之華喜溢宫庭休綿社稷臣甫將隆指阻覿盛儀載驗震爻雷已開於一索仰觀乾象星預卜於重輝賀皇后牋國重貽謀慮尤闗於坤毋恩隆立愛索允協於震男茅土疏封椒塗溢慶中賀恭惟皇后殿下徽音濬發柔徳夙全輔佐為心廣二南之風化贊成翼子衍百世之本支雖熙朝寵數之肇新然睿慈保育之惟舊邦基用壯壼範彌尊臣跡繫轉輸耳聽播告奉牋稱賀阻趨鴛序之班作頌對揚願繼螽斯之詠慰皇帝表景憲太子薨天低儲禁方嚴鶴駕之朝雲黲層霄忽報鳯笙之逺望乖寓内思切淵衷中慰伏以皇太子秉性川冲賦姿玉裕早親敎諭茂潛徳以夙成豫建治安卜慶基之未艾世偶無於盧扁人共惜於昭明恭惟皇帝陛下丕紹鴻圖永惟燕翼念蒼旻之降割慨少海之揚塵臣久玷皇華阻趨青殿承祧雖重願少抑於聖懷有道惟長宜益培於國本景憲太子牋春宫定位罄中外以屬心宵駕凌空悵仙凡之異路臨淒風而攀遡涓柔日以追嚴恭惟皇太子仁孝著聞春秋鼎盛賔僚故在忍疎園綺之遊天意斯何靡念商周之繼望瑶山而雪涕即寶宇以繙經伏願登衆妙門主大乘器與道俱化吹笙竹於洛濵同佛往生涌寶蓮於地上謝封爵邑表圜丘展采禮舉三年方國䝉恩爵開五等望楓宸而被寵執蒲璧以懷慚中謝欽惟熙朝最重禋事皇儀蒐舉大光前振後之圖祭澤周流無泄邇忘逺之意而臣久縻閫寄僻墮嶺陬既虛玷於筆槖供奉之聮又莫陪於籩豆奔走之列逮至宸廷之大賚亦叨井邑之光榮視伯視侯葢方五十里者不稼不穡胡取三百㕓兮兹蓋恭遇皇帝陛下道格顯幽仁周品物謂王者之尊必有父故陟配天而率土之濵莫非臣未嘗擇地肆推餘餕加賁遐蹤臣仰戴龍光俯殫駑鈍末繇奉職篚東國之𤣥黄或可歸鄉班莆田之朱紫謝賜衣帶表侯蕃進職叨蒙命數之新宸闕頒恩爰賁身章之美瞻天感泣跼地凌兢中謝伏念臣拱北一心落南五載方叔甚慙於命服來試師干顓孫賴有於書紳可行蠻貊老欲愆於膂力病已減於腰圍何意洊領邃儲驟當異眷雙袖龍鍾而曵紫萬釘錯落以纒黄豈曰無衣不若吾君之賜可使束帶立於近侍之聮兹蓋恭遇皇帝陛下垂裳無為鳴佩中節謂設官分任有以功有以庸而制禮異宜昭其度昭其數既俾參於邇列則當辱於殊恩臣惟守治條莫禆衮線觀書有得思陳在笥之言讀易知非力鑒錫鞶之義鐵菴集巻七
