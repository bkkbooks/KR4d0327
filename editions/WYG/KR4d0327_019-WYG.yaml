body:
  text: 鐵菴集卷十九宋方大琮撰書吳侍郎濳恭拜槧翰諭以陳制議之材愛惜人物不害其為公方朝廷大開使過之門又兩閫交上羅致之請區區者不復有疑即書行矣屋子之諭尤稔委曲諸公既以留蒙齋共請于朝則借其居亦非便特以一時未有棲寄耳雖得天府貼占一聞使㕔之榜不復作念兹荷推遜然亦須班堂先得所安乃可過而問焉不然終未敢也又未知劉郎中之榜如何一身一家自謀之難如此則一城三十萬口將奈何祝融之為禍慘矣侍郎救焚之功甚偉能全人之居法當得美居之報則某之轉徒靡定固其所也都人日傳下兼大尹事必沐賜念然頑鈍無恥之蹤當去久矣旦夕上祠請惟侍郎賛成之因謝控禀筆汗俱下倪寺丞祖常某愚不肖亦先正文昌先生閩中棠隂一士也起敬大節間得遺文一二讀之欲多求未易得適因侍坐知有所謂齊齋録與論說者輒敢以請特僅染翰出以為賜斂衽開卷皆闗涉國家大體使先生之言行於嘉定更化之初何待今日之再更歎息久之言言藥石今猶可用也某伏拜劄汙頒賜先正文昌齊齋先生行實巨編此十四五年前諸賢相顧不敢下筆者西山欲誌墓不果今蔣左史既表其行而誌則非鶴山誰屬世謂乾坤清明而後大賢之節白然當昏塞晦昧時舉世皆知瞻仰人心公論何時不存而一晦一明則於世道不能無傷焉此向來柄國者之罪所以不可贖有能用先生之言者不足為今日扶世之良劑乎某伏讀累日既掩復舒且歎且慕顧生晩不及事先生何幸監簿郎中以好修博記為今賢所稱將得以親炙而歴扣焉某伏拜劄汙寵示先正文節隧碑此鶴山先生之筆也哭鶴山甫旬餘掩巻感歎久之曩見執事以不得西山銘為恨猶幸其有鶴山焉自今觀之此銘豈易得哉孝子可以無恨矣傳筆良史事也某非其人不敢不勉遺奏跋語併容續呈趙國器某於先生循陽史君四十年交遊辱愛如兄弟諸郎以銘墓請幾於至哀不能文然知史君為最深幼受母教如陶君身自教兒如謝公有相如不言人過之厚有王肅不阿上官之介至必興學校則文翁之風志在䕶貧弱則次山其人此猶人所知者至於論時事愛宗國懇切惻怛中壘輩流則某所謂深知者在此平生無㸃瑕蚤受西山先生之知特注浦城往依且學焉御史李知孝不樂西山遏之不使上端平初知孝逐西山召曰國器方了邑債耶將相料理而西山不起觀其所與者世之大賢其所不與者世之大姦可以斷使君之終身矣葢其學自敬自實入常以浦城失一行為恨得讀書記誦之忘老曰吾師在是或謂當東淮奏縣最時肯上邊從大幕入豈不方面乎又謂當朝家嘉康功時肯上京從漕僚入豈不班行乎然皆非使君所恨也苟不失其身有以全其歸則為循陽逺守為武夷散吏以老奚害使君之志逺矣可以傳矣某名為首藩不知前賢有帥臣體重之說日閱案牘實與州縣吏坐曹者無以異筆硯雖存塵埃可厭今歸閒有日容澡雪神思以表墓可乎遣惠十六尊者皆奇怪相使君所愛玩者殆自此果中來敢不受藏時展以寓見先友之思輒易水沈十兩旃檀各三十兩持為家廟一炷以白此情白金四笏四十七兩或可相菴宇犒匠之需沐視至幸甚陳教伯圭舊秋鄉友逺來者以得賢師儒為誇僕亦以舊識誇之鼎來藻染詞㫖渠渠誦之欣感莆褊小名不掛農工商之版者為多每得明師則其一時所接引奬拔者可供數舉之用少聞長上說有三山楊永嘉鮑非徒為詞藻之學猶及見黄子野以善考校稱及能操筆時見任驤卿其後有黄景夷所稱亦考校也近有泉之蘇能浹洽朱門之說時復齋正里居故從遊者多可觀今何幸執事以理義之學根本之以法度之文發揮之感化之下將必有心恱誠服者豈徒以法為師生官府為學校哉了此則訪璧水之舊遊此其張本也某涉筆列寺書鈔手耳每見以學官稱者未嘗不自厭其塵俗不足玷兹選而知其為公等設也望家山二千里時入清夢曷日晤語願言珍重以昌斯文范卿守鎔某伏拜賜書兩事之教端誦數四體國愛民之意藹然於言辭之表其所闗繫非獨莆郡而已近得逺處書皆言官司造舟之擾秤楮之擾保社市井苦之而勇於奉行者不自知某則謂此正先儒寛一分之時莆民拜君之賜非此時乎戰艦援福漳減半已得之命今所請者見造四隻不失為真實減四從三尚存其一况給降有本可勉為之此子文都承之言也然陪貼猶可或恐多於大郡之數則成例又加以並緣之胥保則重擾尚可苦辭再請否秤楮照閩中諸郡之例出官鏹分卓鋪鄰邦所共行者烏得獨異始建劒之價頗昂下四郡次之纔及衢界則不然今所在多不知初令弟殿講左史自謂於書言之然權衡劑量在仁人必有處此嘉定行令初潘文叔攝漕事自出巡㸃邦人荷賢守之賜甚多父老猶有記其事者否雖然兩事與國脉相闗寧能相顧忌而不敢言乎蒙古造舟筏於上流意將何為而吾江防舟楫靡一足恃議者日苦口而行之輒擾金末持楮數十千博一椀麫竟坐此斃而吾中國皆紙鏹世界議者日寒心而行之又益擾不講求禦敵之實力而欲以和買靜有是理否一介使遣矣能保秋風之不動否不推考救楮之病源而欲以威刼勝有是理否四郡賞而一令罰矣能保威令之必行否今之患曰外敵曰内楮耳而𦕈然深逺之慮則有出於二者之外姑以粗言之曰敵與楮二而一也必敵無動兵無用而後邊可寧費可省邊寧則裏民之科甫可輕科自輕而至於無然後可以固根本費省則楮數之印造可少造自少而至於住然後可以議秤提不然兵未息楮未易言也何以息兵禍曰在天何以感天心曰在人此其事尤未易言也日立坳下無一語補報視令弟左螭有愧色將歸體為㕓下一氓帥子弟奉陽公教令以老以生下情惟有感愧之至某惶恐申禀艾軒先生文集二十卷近方編就此乃鄉邦闕典若有待於賢侯今距造朝不逺雖鋟梓非旬月可就然閣下試開端於前則後之君子必且緒而成之其書僣申呈儻蒙電覽發下郡庠置局仍委先生外孫新尤溪尉方之泰國子進士方涓孫監視刋本庶幾精實無誤斯文幸甚後學幸甚趙宰㻀夫某自著攝郎自郎登坡凡三遷皆沐貽書相慶皆於中秋一月得之詞㫖皆勤勤懇懇非愛厚不及此顧撰局微有刪改銓曹猶可殫勞若歐公所謂不繫一職一司者百世之譏猶在後四方之誚立至前今内而廟堂謀國則疎而相軋之謀則密以至倖門浸啟欲盡言之則内庭有非所樂聞者外而諸閫抗朝則强而抗敵之實則弱以至和戰互異欲盡言之則邊方事有非所悉知者此言責所以為難亦安敢以難為避哉葢論人猶易論事而合宜為難事莫急於邊而生長偏方仕宦内地甚哉書生之不武也來翰所述兩淮利病與録示上廟堂十策無非切中事機凡此皆所欲知者繼是無惜疏示姜倅惟明某屏逐東歸非不知遵陸之安其乘桴者非得已也望使郡五里許幾為大郎灘所厄當急流中維斷底漏差尺寸則魚腹矣亟依沙磧已沒膝及腰幸月明雨霽有小舟可呼遂獲全活人厭神怒之餘所過收聲匿影以有换舟之懇不容不掣鈴齋一見蒙賜之饋借之館命之舟然猶有禀者今早得一舟五十料又損漏衆謂其難於上灘不若更賜指揮差下二十料者兩隻以無損漏為上大凡浙江雇舟欲其大而此欲其小茍幸而濟雖跧伏篷下亦不暇計也因笑京城寓廨為鬱攸所驅擕家僑寄農寺者兩月又求言紛紛竟以一逐結局而鄉之朋友併及焉非池魚乎既去矣幾為江神所溺今歲火水見厄如此水厄其身幸脫矣火之禍甚廣必都人皆得所居而後去者之心始安此固吾輩凡為臣子之心也然水不厄則不應有賢使君之遇是亦一幸敢併以謝董侍郎某甚幸獲同朝路雖聚首日淺而心之敬嚮者甚至得之諸公謂深醇之學當在經惟古雅之文當在詞苑等而上之則經綸之手也始所期者在此秋風漸髙上流最急見大夫無可使者上顧廷臣獨曰卿可於是以王人持使節賜之對而遣之閣下慨然無辭難片語在廷有愧色皆曰令通材也先儒所謂入麤入細者耶某嘗至北闕外餞兩使星入楚皆不遇而反未數日而孤蹟逐深伏閩底自是了不聞近事或傳西淮小衂則益蹙額荆湖得捷則又稍伸眉或又傳非北兵又謂來遲而數少目前尚可支柱要之勿恃彼之不來恃吾之所以自立者何如人之家有垣牆有門户而後堂奥可以安今歲有破缺豈能髙枕然則葺理自何始捍守自何先在提刑胸中必有全撫區畫布置一面事定使人謀無遺憾則天意有悔時還報天子坐運籌帷則前之所望經綸一世者展矣某懦不足用且閩人不盡識當世豪傑頃試邑福之永福識其邑人鄭君宅心者汀宼迫邑與之共議備守知其非近世科舉士葢奇材也今為常德推官欲望台慈進而和擊之察其果有足取則收拾薦進之他日有以自見於世則門牆士也本軍張守友某北聆郡齋刋先正傃齋文集方謀有請迺䝉真札與巨編俱賜剔燈開卷不勝大嚼之快疇昔所聞价菴薦其文誠齋賞其詩若四六則誠齋竊取而用之梁叔子辭魁柄除醴泉侍讀其麻制云珍臺閒館冠臯伊之倫魁廣厦細旃論唐虞之盛際聽麻日朝士皆服洪之精切葢二事皆西漢全語而不知洪召至都未入翰苑前先奉内祠兼經幄此一聨皆尚書賀啟中語也未兩月洪用之王言其捷如此使尚書用南澗諸公故事居文字之官又不當止此方淳熈文物最盛時雖前輩不免相資取今行世既廣其膏馥後輩又可知某比嘗拜先正文靖史傳之賜兹又併誌銘諡議合刻以為賜誌乃張魏公筆豈容不廣其傳觀其始末以知檜不早悔恨不已而嘆服文靖之先見甚矣知人之難也此一事最可觀而傳與議不收而紹興正論特載之然則併刻之其有益於互考者大矣昨得後村逓至使君所和讀邸報詩足見嫉惡之意賢士大夫所同後村與蔣同宗寺同郎省而不知悟且薦之西山而西山亦喜之檜之背魏公與文靖亦有蔣之背後村併及西山之子孫也後村今詩之悟晩矣要之賢者待人之意常厚而小人之自枉其身則可憐也鐵菴集卷十九
