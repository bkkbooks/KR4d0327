body:
  text: 鐵菴集卷十四宋方大琮撰書劉吏部克莊悼亡屬爾有類鰥氓待老蕭然方營狐首但覺餘生之多感安知初度之來臨敢謂謙厪特加軫記帖朌吉語猶未能免俗之言詞寫壯懐葢以德愛人之意難勝期待徒有兢慚顧永廢蓼莪思親之淚濕而愧懸弧矢報國之志荒幸明時搜攬之甚寛則孤跡湮沉而奚欠蚤知世味豈必掛神武之門所願身强常得侍耆英之社回王正字邁老我羈游已斷六弧之夢故人逺訪先馳雙鯉之書跫然空谷之足音折了過門之屐齒良鄭重甚如悚愧何恭惟某官李白謫仙徐邈清聖五湖三江之氣落落不衰萬馬千兵之文凛凛可畏雖筆端之清麗尤交誼之歲寒每逢賤生輒贈好語政切彼美一方之望乃煩不逺千里而來水沉似盈尺之苓地栗當如𤓰之棗復奏一闋直成三奇某愧無雪兒可歌留與雲孫為寳清興不淺幸勿回子猷之舟濁世可憐安得從王喬之履亟兹馳候畧敘謝悰鐵菴集卷十四
  hash: sha256:2aad0234fa9c3688f8bdb49b44341098b19b34cadb0d4edbeb3b0900c8c7533e
