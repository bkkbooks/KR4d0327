body:
  text: 鐵菴集卷二十一宋方大琮撰書王提刑潭某蚤上伏蒙賜之顧論國事邊事無凝滯又謂以武臣乘障及緩急處反不如書生死封彊之義如浮光之董降而趙死者皆是必復舊乃可此論則前所未聞者識見竒偉如此既而知為簡肅端明之文孫信源委有所自來方切敬嘆珍翰墜臨示以奏議臣編與考亭志自念生晚不獲如昔賢之拜床下讀其書論其世殆若親見然拜賜多荷項卿守博文某冒領鄉部受責於鄉人最多方去秋試者閧懦者不能壓則曰此使者之責也既長官缺攝者不肯來則又曰此使者之責也入春饑者閧而責愈甚而友之深者為尤甚其望賢太守之來何如上已前一日以開郡告而後某之責始釋其喜不在于父老後方閧時家家皆有不自保之憂得陳尉權縣而定鍾權軍至而又定乘人家欲糶之時勸之不甚難稍定則稍難愈定則愈難委官登門人人而求之其不難色者幾希賢侯與春腳俱來二麥大稔被野如雲海鄉流移悉歸食新其接濟多少人其消弭多少事天之賜也侯之賜也今自四月半盡五月尚有四十餘日亦未易過有不容不求之人者既藉官司之力以鎮壓細民矣不體官司之命以糶濟閭里可乎去嵗非歉而失租也今非捐以與人也石糶三貫有何不足而猶閉吝乎猶求多乎人生五馬貴乃使吾邦君下車來不得一日伸眉既以軍食為憂復以民食為念亦緣土狹民稠雖豐年無半嵗糧全仰廣舟外之來者既稀少內所有者又搬泄又緣措大家谷食不多非如江浙家以萬計以千計者皆米也今家有二三百石甚可數且半是糠粃而小産尤可憐憫又緣士大夫家當收租時多折價至春夏間無以為富室倡交相議何益城郭猶可村鄉最難信救荒之無良䇿然亦當盡其心建劒間計鄉都人家皆産户抱認分糶其來已久福城計坊巷人家亦寄居上户或出米或出錢認糶已一兩年如此皆視以為當然莆人最窶别無利源苟幸價長鮮深長思其于勸分認糶之事誠未慣習始有以官司為玩者今亦漸知畏矣賢侯又以惻怛之意行之當必有感懼者今嵗春事蚤若五月末六月初早米當有入市者則所謂四十餘日其實難過者一月日耳詎早食漸近人家蓋藏不患其不出猶有靳者苟得其實則須借其僕以警其衆非獨得罪于官亦使之知得罪于鄉井之為辱也水南有新惠安余令薦鶚者收甲其鄉嵗嵗平糶而宗族鄰里之價不敢甚高今春諸處微警而此境帖然者余力也城之內外有及其數或亞或半其數者對人費分疏有不知分疏者士大夫亦或各有見也今且相扶持到早熟則稍寬正恐早榖其價猶高或不下三貫奈何灣澳去處且防搬泄或又謂境內山窟海濱有仰二洋之早谷者一放過則去而之福清之泉城者不可遏矣遞年搬泄逺處者何限才說官收入平糶倉則曰新熟能幾何其貴自此始士之不考本末者倡此論而五廂居民嵗沾其利者亦從之近連年此食何嘗收得早穀而穀之貴更甚未易與俗人言也故防搬泄其一也向來仰南北舟既北久不至又南來絶少招誘之䇿既不可恃只得就裡靣商量閩上四州産米最多猶禁種秫禁造麯禁植柑橘鑿池養魚蓋欲無寸地不可耕無粒不可食以産米有餘之邦而防慮至此况嵗無半糧乎今興化縣田耗于秫糯嵗肩入城者不知其幾千萬仙遊縣田耗于蔗糖嵗運入浙淮者不知其幾萬億蔗之妨田固矣可一年不飲不可一日不食上四郡士民之論皆同而莆有不盡同者豈非其饑在小民而不在士大夫耶故禁雜種其一也惟賢侯留意若時和嵗稔南北流通則無此矣要之今嵗雖熟而糶價未必能遂平却當告諭産户隨高下認糶則至期有不得辭者今兹麥熟匪獨吾閩各路皆然又一晴一雨所在皆同立夏日太史占風主豐年分野在吳楊天相東南處處皆稔非特民命蘇國計亦無虞矣或傳維揚獻瑞木有天下太平字却不受蓋豐年為上瑞何必此林沙宰圭某舊冬拜答後固知盤根錯節乃賢者之所以自見也以所賜書觀之其辨可喜其勞亦甚矣固州家之所宜假借扶植以助其立者也今之邑莫難于辨賦若撫字則固本心剖决則特餘事耳非吾輩所患也治吏之舉甚壯况承郡命其敢于報復郡所當察不折其萌反令生事此賢尹之所以不能堪也吸三斗醋乃可為宰相况縣令乎故必更州縣者為監司乃知州縣之痛癢更縣者為郡乃知縣之痛癢史君妙年高科未四十專城未必知邑之難獨賴其高明終必察此縣與民最親更事最多雖志或有格于上者而澤亦有可行于下者吾輩作邑切須分明可以質之天而無愧可以布之人而無怍終身受用自邑始某向在將樂日賣鹽須三百餘千少不及數則岌岌乎未嘗識郡中專人亦未嘗輕刺一犯鹽人其時猶幸上供銀折會而郡猶未見寬假得與百姓相安及再試永福可以卧治無所謂一永之說兩邑皆僅年餘不得究其及物之志自以為惜今老矣不復有斯世之志矣今春左揆拈出猶欲以民社見委知臣莫若君其獲生全已幸蓋畏威敬怒者此心猶前日也來翰亦以為言豈亦見邸報耶一春頗費酬答今幸此話漸冷或可稍安矣鐵菴集卷二十一
