body:
  text: 鐵菴集巻八宋方大琮撰啓計幕諸司通漕使鞏吏部刺史察六條傃英纒於天上崇臺非一幹容下士於幕中仕焉得其所依榮也祇以為懼攜扶迫戍熏祓通忱某官名壓儒先道窮聖處載北方之學典刑來自於中原登東萊之門伯仲迭推於巨擘自聲華一振擺脫科舉之外以文章三昧鏗鏘政事之間最聲響撼於一同峻武晉儀於列院楷模黌舍誨諸生以性命之㣲筆削丹書引大義於章程之外所挾者大其進甚難輪兩朱轓二邦襦袴駕一封傳九路布泉方星輝白粉之圍已地偪紅雲之座議論竟以孤髙而去聲色不動喜愠之交剖漢郡之竹遂行問謝池之草亡恙覲圭甫滌濡轡載馳得非邊頭四郊多壘之秋全賴裏地萬舵千艘之饋遲之以久而後召意者將多於前功金榖幾何上欲問江西之事玉階敷對公併輸幄内之籌某鈍不可磨弱惟自植奏賦偶先於餘子竊恥雕蟲讀書欲見於古人苦為汗蠧十五年昨夢二三考冷官投之於課試虀鹽猶是書生之故習問所謂笑談畫諾不知幕辯之謂何親友勉行庭闈告詔曷事而長自忖汝心忠所主如立父師之前一於順是或妾婦之道聞已趣還勞之命或庶幾末至之賔蕭何入守闗中奚欠鮑生之末論裴腆亟投門下敢期劉晏之深知載激懦忠難容吝腑江西憲留郎中按刑劇部逖瞻郎宿之輝列屬計臺均席使天之芘積平日依歸之素如以身趨走其前潛以身聲見之眉目某官胎光相閥㰱血文盟議論鄙西漢之賢成將焉用彼節義愛我朝之吕范是以似之謙冲宛一癯儒器械直參諸老初亦相忘於琳館迫斯漫試於緹屏自詭循良遺跡不妨招屈雅避聲譽所願則在封留不容列院之逡巡旋復大農之佐貳銜君命出使絶域虜在目中與宰相分領度支泉流地上相傳對篇之露奏亦太冷語之冰人收身表著之上頭持節江湖者兩路惟三百年立國培祖宗欽恤之仁故一再命明刑賴風采激揚之使寃消叢棘種滿甘棠珥筆帖然可續太史江西道院之賦驅車至止閒賡東坡塵外山亭之詩意者將多於前功遲之以久而後召家氊亡恙矧隂積於于門鋒驛趣還定有光於蕭葉某鈍未聞道貧坐為儒較藝先登可鄙原夫之句敎人未既其如笑者之嘲荒嬉為學之工夫輕擲居閒之嵗月出償親釡愓念民脂懷一分及物之心有官箴在欠三寸飜瀾之舌如幕辨何雖贊籌算鞭之中與受察繡斧則一況大父綴相榜之榮耀而舊莆本泉山之附庸望以邑子憐之庶乎吏議免矣茍虧行檢何以對西山之靈尚丐恩波其有如贑江之水心旌所向舌筆奚殫本司官運管李通直燕臺上客領袖一幕之尊閩嶠孤生俎豆羣公之後其不遐棄必矣請以先施卜之事大彌恭通名愧緩某官鴈峯氣結駥槖家傳灑落謫仙真太白後身之出鄙笑進士有贊皇乃祖之風錚出鐵中平反筆下手種黄崗之桃李眼看赤壁之波濤芻粟幾何黙動邊需之念芙蓉笑入不妨上介之遊四牡咨焉一夔足矣却於吾屬以加愛靡以已長而絶人解組朝天衆恐失依憑之重拔茅征彚公欲引黨類而升某其來獨遲所向輒左嗟校官閒散了此已十五年與幕長從容又不如二三子既而復自解釋愈於全不遭逢少留數旬或尚陪座中客安知一日不盡畀肘後方難以言傳進而面請帥司官帥參錢朝奉戎閫元僚矧得三達尊之重計臺列屬妄容一男子其間庀職雖異攸司執禮如事其長某官髙名照世穹閥倚天思昔先王保忠勲於吳越于時信誓指帶礪於山河矧移錢塘之都慨念錦軍之裔自嘉定之相去國而忠懿之門有公雅不擇官喜於論事宻禆宣幕出舌底之平章靜捲堂簾寓琴中之撫字屬湖未靖奉命促行翩然分刺於栁城至則就頒於竹使建議弭賊全軀保妻子者忌之有詔起家為帥之賔客則可矣葢許國之心如日而談兵之鬢未霜凝然贊輕裘緩帶之閒暇不失投壺雅歌之樂江湖為襟帶坐銷赤白之囊朝廷半老成入驟朱丹之轂某藐焉何有謾亦自持冷官不出閩鄉再遊乃入江國佐劉發運奚欠一賔有杜參謀實長兩幕儻容孤拙得尾步趨入幄運奇非他人得與此議乗機扣請或孺子可教以兵言則甚真理亦難拒寓公鄰郡守端明李尚書莆壘一寒曾煖帥藩之襦袴江鄉列屬宻依吏部之門牆天借幸於及𤓰地可階而御李攝齊趨進衘袖贄恭某官望穹三朝名殿諸老聲華跨竈傳豹尾之箕裘議論對牀居鴈行之領袖謂受用簡編也大萃平生精力其間辨皇朝典故疑玉音嘉歎每怡軒表牋出紙價為髙匪徒見之空言凛可見其大節在紹熙留諫臣之去當慶元斥用事者非禁槖有華得勉益肅穹廬相語彼揆實來屬改政絃宜參國柄乃徘徊於方岳幾歴徧於文昌陶士元八為都督以輒遷司馬安四至九卿而求去上留甚切詞苦莫回佚以真宫華之紫殿惟中外宦遊畫繡之日少故兒童迎笑野服之樂真耆英社相從孺子亭可欵若非繫君民之念未有易泉石之清傳聞丹宸咨問華髪衛公經濟大業竊陋進士之卑司馬輔相初元亦自端明而召家風具在國典可稽某冷緒冰寒名場浪戰偶然金帖南宫之涴榜時則玉季上坡之司衡二老生春一官在泮人或謂之耗錢糜廪窮未至於不飯無氊退而需徯之戍長是則饑寒之實見耐窮不屈鬼笑吾亦笑之贊饋此來上獲下斯獲矣思之未得其成說拱而願師於大賢凡立身行已之方與事長居官之要前言往行之孰可佩服先達後進之相為推揚有齋乃心敢請其目舉一隅而不反何所取材或三語之偶竒敢請薦掾布之典記愓甚負芒本府官敎授梁同年發藻諸儒憶共折帝城之桂依蓮下士清不如魯泮之芹對賢主人懷我舊況論心喜甚投贄先之某官胸吞石渠舌瀉雲漢古括蒼之秀氣取數獨多今太學之名流屈指可計金注既優於三舍冰衘合問於一條何必道鹽愛熬波之語巧舍選初任鹽場寧不足飯還繫馬之官清問徐孺子之後謂誰意黄太史之澤未斬醫士風於久弊接道脈於前聞休歎無氊西山之簾足捲倚看重席東壁之書可翻某在儕輩中獨踸踔甚何妨冷官冠者五六人冒贊冰曹沛然百萬計試問鶚林上客乃吾虎榜中人側聆羣寮宷之間不獨一弟兄而已儻師儒引領偕二三子以同遊則風雨對牀追十五年之舊話相孚之妙不得於言南昌管宰經營幕燕不辭控地之勞問訊舄鳬便欲朝天而去將叙繾綣少留斯須某官鍾厥晶英逺哉源𣲖昔齊鼻祖曽援被髪之民在漢耳孫猶立揮鋤之節至今受賜有後為宜賢聲相應於塤箎最績可書之金石試洪附邑與汝為隣習熟於耳目見聞浹洽乎家庭唯諾罷滕王之舞佩奚損西山施武城之絃歌化為東魯將俾凡綰銅者勸盍陞諸鳴玉之聮某其仕以親皆名曰客栖栖可念坐氊亦無僕僕兹來聘幣安在懷古無益急今所須顧流馬之已遥慙無新畫挽征鞍而有請願賜片言逢寄一枝之春納交兹始共託千里之月索笑何時要之味同當以意㑹鐵菴集巻八
