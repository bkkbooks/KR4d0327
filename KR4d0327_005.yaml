body:
  text: 鐵菴集卷五宋方大琮撰奏申辭免御筆除右正言申省狀自天疏寵無地措躬竊以更化三年病源故在進言一路遺脈僅存必相續之有人庶足憑以立國慨念盛世若時先臣歐陽修謂不繫職司劉安世謂不比間慢矧當陽微陰長之會內阻外訌之秋全賴緊官共扶急證如某者生於僻壤少也末科多歷嵗年率皆田廬之日三趨選調不及權勢之門屬親覽於萬幾禆濫陪於百執勾書列寺再轉為丞濡墨祕丘復叨佐郡兩期且半一善未聞顧何取於師言乃誤蒙於宸選其要在格君心而學力不足其次在遏官邪而風采不揚退惟何人敢任斯責欲望公朝敷奏成命亟回别選鴻儒益重新除之筆姑令馬走少安舊著之班辭免御筆除起居舍人申省狀聞命自天措躬無地竊以進言丹匭執簡赤墀皆右省之通班出中宸之妙選敢期愚戅疊冒恩榮伏念某素乏修能自安平進兩書月紙曾無補於涓塵益近天光重有慚於記注盍控循牆之避預深維谷之懷欲望朝廷特賜敷奏急回成命庶無鵜翼之羞别揀碩儒以重螭頭之選辭免兼國史院編修官實録院檢討官申省狀仰觀國典最重史筵編摩者髦士是宜討論者大儒之事昔之世掌今以人兼既森森著鴻碩之羣豈瑣瑣欠馬走之一伏念某自慙獨學殊乏三長曾窺石室之書藏遽引蓬萊之舟去何禆騎省仍立螭階記言動於一時未之能信垂典章於萬世何所取材況嘗自請於祀釐豈宜久叨於執簡欲望朝省特賜敷陳亟收回誤墨之頒庶不為汗青之玷辭免寶章閣直學士仍任申省狀不允詔附渙汗載頒震驚失措伏念某早辭朝列濫玷藩方粗有小心任嶺海拊循之責幸無大過皆天地容蓋之恩昨者進松下之階留梅邊之戍曽勞力勞心之莫報而濡首濡尾之足憂方溫理祈間之詞乃已蒙增秩之賞深惟直學士之兼職允謂榮名未聞郡太守之五年尚仍仍舊貫於寵臣之數非不厚而任臣之意非不專其如材技殫窮筋骸衰病不亟求於寢免恐自速於顛隮伏望俯察危衷趣收前詔許畀二毛之餘景獲遂歸休别求一面之長才早為鎮撫辭免差知隆興府奏狀不允詔附寵命渙頒危衷震愓伏念臣逖違宸陛冒領遐藩德意布宣敢謂去天之萬里土風習熟不知入廣之五年極臣力之所為荷聖心之見照求去甚堅而任甚篤受恩愈厚而報愈艱今者山海息驚擾之虞田里慶豐登之樂上或可以逭朝廷之譴下稍可以謝嶺嶠之民及是時而退歸則末路之榮耀何圖詔綍復改州麾惟南昌之故區乃江西之勝處曩以待蕃宣之任今亦為名望之除自審衰殘難勝委寄伏望趣收前命更畀叢祠俾返山林息餘生而歸老雖居畎畝無一息之忘君敕省所奏辭免依舊寶章閣直學士差知隆興府填見闕恩命事具悉朕以卿宅牧海南五載淹久颶風炎瘴逈隔中州乃能不彼夷其民布宣中和藹有善最眷念忠藎不忘於心豈不欲亟下召環引以自近洪都選候久刓印姑輟仁賢往為撫綏雖蕃宣之任隨宜更革而地望隆重則今猶昔也人才難得而骨鯁敢言足以尊本朝折姦萌者為尤難顧瞻在廷重我感慨扶奬愛護朕志有在卿亦諒之否乎亟宜就鎮慰彼氓黎半夜席前兹固有待所辭宜不允故兹詔示想宜知悉冬寒卿比平安好遣書指不多及鐵菴集卷五
