body:
  text: 鐵菴集别集類三宋提要臣等謹案鐵菴集三十五卷宋方大琮撰大琮字德潤號壺山莆田人開禧元年省試第三人除右正言疏論天下大勢復言理亂安危之要遷起居舍人兼實録院檢討官奉祠去職尋改集英殿修撰知廣州調知隆興卒諡忠惠宋史無傳其事迹略見福建通志中今按周密齊東野語稱閩漕方大琮與王臞軒友善而集中亦有將卿漕之命語則常官福建轉運使又集首原題宋寶章閣直學士則不終於集英修撰蓋通志所紀歷官猶未備也宋季三朝政要載理宗端平三年大琮為右正言上疏極論濟王之寃侍御史蔣峴劾其鼓扇異端與王逸劉克莊同日去國蓋亦謇諤敢言之士故其疏多能疏通暢達切中時弊經義亦頗有可觀雖文格稍涉平衍而要非遊談無根也原集久佚此本乃其族孫良永良節等搜輯編成蓋散亡之餘已非全帙矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6bce3da018e161522b873026702eab273c90ed759614c1390035740f178be92d
