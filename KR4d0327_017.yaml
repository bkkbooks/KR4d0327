body:
  text: 鐵菴集卷十七宋方大琮撰書王尚書伯大某庚寅春再試福之永福先入城謁帥始獲拜于里第僅匆匆片時而所聽皆憂世語在邑嘗沐賜書以憂去弗克報甲午春調選偶見留博觀中朝人物明公猶以麾節徜徉于外所至皆可書及與朝廷爭履畝納楮新令衆聞之愕然獨區區私念今所當爭者奚獨此曷不唤歸使之立殿陛乎久之不至大臣請于上曰是不肯為都司者不肯為臺諫者改命趣行至則登省闥旋俾導密㫖上引以自近矣匹夫之言可重泰山矧多事如此日侍清光隨事救正最易為力將興邦之言無不行乎蓋旦旦以望亡何直前二疏逺外傳誦衆聞之耀然獨區區私念自謂知公最深者委曲而事濟諷諭而言行不忌不疑隱然之中命脉賴焉公本心也空其臆潔其身豈本心哉然當大昏睡中無一人醒覺有大聲疾呼其旁者雖睡者不樂而唤醒者亦有助公不知其論之髙也所言皆人所當知者豈不欲其行且濟哉至於當局者駭之以為髙而朝野交推之以為髙則公始大有感于世而不樂其名之見歸矣雖然某猶有望於世者上優容如天未始不知邪正所在始雖拂終未嘗不全之某亦容且全之一人也若以其言罪之在前代自無全理每念此恩至于感泣曩逐未嘗一毫怨讒者而吞噬不已朝拔一焉暮拔一焉浸及一世之名賢則實有不可曉者上以名藩穹職寵其行公辭未就乃改畀陳尚左成父成父十年辭聘召亦嘗以斯世望之將以郎對未及吐一語去以此觀之則今直前之疏雖若太遽抑豈可少哉成父不知肯為婺女一出否若諸賢始隨分寸以救時不必以固執為髙觀紹符後諸老其出或畀以外任皆無敢辭者豈本朝無罪言殺諫之法故運祚綿長亦終得忠言者之力聖上有敬言容諫之度若氣數復回安知亦不得忠言者之力為臣子者惟有敬怒畏威修身俟命以待天意之定以階世治之隆是所望於公輩人而某也素拙訥愈兢畏苟得養生送死為平世一無憾民則拜主上之恩益大與諸賢之賜益多復何求於世哉某生淳熙季及見故老說阜陵時事甚悉中外大勢有安而無危有周密而無罅漏自省事來見局面屢壞屢更壞不堪說當其更時布置安排未嘗不可觀及其久則日異而歲不如今金甌破缺甚矣東撐西拄前顧後慮身其餘幾端可寒心軍實未練招愈多而愈弱况未易多將非得實才則兵弱未易救猶曰閫外事也邊戍未撤財愈生而愈匱况未易生民不可復取則國貧未易救猶曰邦域內事也顧户內事猶有未能解人或者漆室隱憂言之熟爛未有豫建之實宫府一體不相統攝似有旁蹊之證祖宗天下碩輔迭扶豈必與一氏共之改元奚害或曰若留有待繼者又至或曰進此攔彼聞者惑焉有傳到公諫疏每斂衽端誦始則灑然以喜近又惕然以憂而今之患外耶內耶顯耶隱耶挈扶此世必人物如龍如虎乃足以當猶記辛丑夏驛車過建某以重任相責望公若曰必翕無異辭微有議則奈何某謂雖韓富馬吕不能使人皆同要之本領端正則發用條達在我者然矣其急在用人故曰集衆思廣忠益此賢相明效也其要在得君故曰一正君而國定惟大人為能格君心之非此聖賢格言也乾淳間其得名者侍從多輔相少惟所欲言為論思之官易必其可行居弼諧之地難後之輔相即前之論思非二人也豈其智不逮前哉行非果難信與不信耳今榻前剴切經闈密勿無非為啓沃之漸一旦精神㑹聚於一堂之上而功化流行於四方萬里之逺則其效也若曰不可則止一閙而散為身謀則善如吾君吾國何天若祚宋則必有濟曹侍郎豳某杜門屏處無雀可羅騎吏持寶翰至視之則連帥所賜鄰翁皆驚况小子乎前此聆逢人輒說項意偶然耳亦欲以氏名通賀又念明公之道行乎朝廷則四海受賜行乎方面則一道受賜某皆與焉崇閫邃嚴豈少閒人一紙書哉用是不敢詎圖挹損威重殷勤眷記乃不惜奬借拊存若猶比數于人者某生而僻左晚將湮沒曷嘗識中朝一人端平初偶綴于列則聆上將引公自近遽持近畿使節去而臨去一疏其吐露亦不少矣是時陽氣萌芽而言事一路洪舜俞王去非首有力中間諸人亦僅隨力撐持不敢墜嘉熙初氣脉幾歇明公大肆厥力于前有光言論風㫖天下後世有考焉既坐兩地者俱自外至則公之不得久居中也固宜以獻納論撰之班任保釐藩宣之寄豈徒然哉今帥材難四郊多壘與投壺雅歌之時不同全閩視諸道為近裏稍號樂國然海道有蛋舟山嶮有鹽子猶部內事若外户敉寧則脉絡未有不相關係者於談笑暇豫之中有隂講密備之意非特屏護一道而已上之付公豈不以此公可不勉之哉唐常卿璘某西湖禀別又見春風昨自杭望升雖不敢奏記聲跡猶可問而知今屏伏窮閭望之真在天表不勝江東暮雲之思三四年間所見居言路者皆積遷而入改遷而出若夫以豸冠徑入徑出惟察院一人可不失臺諫本來面目者方其招自外方不拘常格輒進便殿引對甚欵君臣之間雖馬周遇太宗不是過使盡用其言豈不足强國勢而懾敵情每疑閩士多弱自了齊後未易見察院雖家于福實在嵩溪上頭氣脉與劒溪接故峻拔如之某間謁于臺官宅未嘗見一日伸眉言必及十三廟之神靈請諫疏悉蒙賜教讀之凛然真所謂見剛者惜不留為朝廷掃盡姦邪收復元氣乃遽攬轡登車為漢之八使金陵國此門莫急於江防而淮京蜀其表也今藩籬多破闕何以為守胸中有全撫若早用其策亦豈不足强人意而救時危哉某杜門絶不知近事自浮光後常有異聞吾輩所望於陳制帥者何如為之纍夕不能寐今聞其被召果否嘗疑天以生為德豈忍借逺方以殘壞中國至此必將有悔禍之日使生靈復知有生之樂不然雖林下之人亦未知死所矣趙侍郎涯某前之月寅飭咫箋為建牙賀繼有自泉來者言壓境之初千里父老舉手加額曰仁人也若官若吏若邸第亦曰仁人也既而條教一頒莫不竦焉改視易聽曰是嘗正色立朝為天下彈擊大姦邪者也未可輕犯某聞而歎曰此侍郎之所以為仁人也太守以牧養小民為職若使汚官吮之滑胥齧之大姓漁之得無梗吾仁乎今也伐檀者重足刻木者束手拔薤者斂衽則仁行矣可賀也兹領誨翰誦味數過有費廣財殫官貪吏猾幹僕恣行之語侍郎非固忿嫉于頑也奉行天理而已矣然有輕重焉有先後焉胥蛇虺其性也其謹畏者少巨族盤根於此也其不仁者亦少若夫分曹列職佐太守為理者也宗支蕃而贍給艱仰舶舟與稅以佐費非一日前者有走弄舟數非特吏為之官實為之似不容不察聞近者治吏以驚官官又從而取於吏則無往非取也果得其實豈容不懲治道去太甚非此乎此特使善良吐氣田里閭閻相與涵濡於春風和氣中而官不敢叨民不敢豪皆相告語為善吏亦人耳其又何敢欺以自壞其身是所懲者寡而所全者多某又將聞而嘆曰此侍郎所以為仁人也中興後王倪真皆以二卿至郡今為四賢矣局面日急無小大無內外皆當隨力救世而論思獻納之彥則與他人不同乃心宜無一日不在王室中外方有望焉某雖在畎畝而所以望大賢者尤切徐右司鹿卿某前冬還家山友朋問所以得罪之由則謹取名賢送行詩示之然則蔣之疏公之詩孰榮孰辱哉當衆人畏禍不敢出一語之時獨蒙表而出之因念隨從班行間聚首雖不數而心有相通處臭味同則議論有不期而同者方言者明設防禁犯者必逐項理簿對首犯之公又犯之而言尤切某時立坳陛所親見也偶以職事所關又自犯之其見擯固宜猶幸諸賢有以重於朝異論不至遂熾未幾登樞掾兼宰士衆喜曰不惟能容之又峻遷之上曷嘗以言罪人哉又未幾項既去公亦去而異論者攘臂謂一網空矣然而上終念直臣以二千石起家信宿便藩坐平逺堂進千里若士若民若吏而宣布聖天子之德意歡聲雷如也父老咸曰此顔魯公所臨之地所見太守多矣乃今得明公而又佐以國正湯公非所謂議論同而名節同者乎賢守二同時千載佳話幸身見之政與教並行綱與目具舉其行有以慰滿父老之望者某日盱人張平仲素書對客走筆不知道何語一封雲錦翩其墮前慰藉良垕篤其為故舊忘其為罪戾也又以佩玉新堂命之使記非獨忘其為罪戾殆若有取焉此意非敢望於今之人盱雖小亦曰道千乘之國豈不足行聖人之言若等以上之必不懲前事有犯無隱不可則止恐未必若今之猶可以行志可以及物然而未可厚誣世道也在州縣有盤根錯節之能在朝廷乏佩玉鏘鳴之度自已試者言之讒人未為不相知雖然彼烏足以知此雍雍于于規行矩步以順為正曽是足為鏘鳴乎溫潤玉也縝栗非玉乎俱焚玉也不燼非玉乎疾徐中節非教琢者所能知實之正字奮然曰蔣之言何足以辱君子之堂奚其取某則曰此記禮者之言也蔣嘗言仁言義言敬仁義敬豈因一蔣而廢論語曽為姦禹竊取以亡漢矣而論語自若也某甚欲承命以憂患相仍情緒碎亂欲稍寬一限惟髙明亮之仲能國正初謂其自盱倅有校勘之召今知其未曾至盱而史館之命又或尼之邪正相攻久矣君子不幸一啓其罅乃亦爾耶閲報令人廢食久之濳夫得節實之贅二皆拽陳過江西亦足稍寬家食之窘也湯國正巾某疇昔解后于泉于洪皆於西山先生之坐上又十四五年而端平之聚為最久當其聚時憂喜歡愕靡所不有喜歡能幾何而隱憂大愕有非議論所能回者則亦徒相與太息而已丁酉春親聆玉音念西山不已使先生而在非徒得眷必將委國以聽翕合羣材俾各致其力當有大可觀者西山已矣孔山不為不得位使上盡信其言而聽其得賢者以為助當猶有可觀者而惜其皆未能然也憶訪落初西山自長沙召轉竹隱喜曰此真禮部侍郎也可為妙選近之以小司寇兼此官者何人哉此古夷夔之任他復何言哉盱江蕞爾城徐泉谷為之長執事為之二又同時俱上不知此地前乎有此賢守相比肩否某賦材最嗇亦非能言者今闒然卧病望之又似一木雞矣獨荷天度生全日望諸賢力扶世道以寬宵旰之憂使林下孤蹟得以安眠穩食而無恐則志願畢矣偶張兄平仲希季相訪聽其論誠奇士也其為蒙齊之客也不虛因其還里函寄一箋敘違離述嚮仰不勝卷卷之至江古心萬里某歲四日還家又旬日便郵中領賜翰函剖誦則頒教白鷺書院志記文講義皆精到程太中尉黃陂生二夫子朱文公既發之周程講道自江西始太中尉廬陵實為之先非古心其誰能發之偉哉其作古也所以惠吉士者甚厚蓋自洙泗之門多齊魯人惟有子游為吳人餘未之見漢晉以來其獲從祀者於東南絶無聞至本朝此學復興皆曰伊洛也孰知其生於淮之南而師授則舂陵也州以道名而又以明道之元二生豈偶然哉當南北未分裂時何遽有道南之語龜山之後為羅為李遂鍾而為文公之集成又豈偶然哉去春臨雍列五儒於祀典惟張為關人程洛耶淮耶周則楚人自蘭陵以不醇稱荆舒以邪說斥今元公則氣之始㑹也千百年僻左之閩乃今有朱文公皆我朝東南之盛者也近歲尤溪立韋齊父子祠堂裒集舊事為志俾某贅數語僭録以求教焉今家藏其書而實踐者少吉多文之邦古心一開發之必將有大可觀者或謂國初四書院皆先賢講學之地後人不欲沒其跡從而表出之今州縣學官有失其本意者而所在乃更創書院亦有盡體其意者乎獨不曰老佛之宫偏天下無有議其贅者使黨庠遂序講習增多又奚害申省援劍江涪潭信五賜額以為請獨不及洪之東湖豈以其師承來處不足張於言耶某向忝提督頗見士友說古心嘗學其間相語以為誇况請額者袁潔齊為庾使日也今古心繼潔齊之職任一道之寄儻併以惠吉者惠洪可乎因筆不覺覼縷惟賜亮幸甚杜尚書杲每憶壬戌擔簦邂逅劒津時洽四十年某食散人祿甫滿長者以五馬還故鄉其視向者一補試不能得不既多乎世謂老人喜言舊事信然若時事不當掛口如利害相迫何蜀危非一日遂墮渺茫中西陵建平吳所恃以為門户者敵皆據之虎卧在庭其起無時春水秋風舟與陸皆可憂閩廣最號僻陋自去歲已有指為堂奧者豈不異哉元日趙文仲移帥西廣或謂敵攻南詔與雍宜鄰有買馬驛程往往不能無震恐此正聖智馳騖之秋不知世有管樂乎不然朝市山林均為未穩來翰問栽花種竹之樂此平世事也某安得有此常恐不知死所常恐無葬地去臘于城南十里外葬婦首丘之計定矣把茅數間足以逃紛又念入山之不深耳示教書楞伽經序引尋繹敬歎真地位中人也竹湖答語則又微妙矣世謂蕭梁亡國之誤不知絶滅者乃佛本法非誤也至本朝諸公則用之以救世非反其鋒而用之乎非善用者乎韓忠獻諸賢猶共寫此經後進復何說以區區惡札綴北山竹湖大賢後以滿三十二人之數既無得於吾書姑附名於彼且依吾黨於不朽不亦榮乎偶記一事癸未夏過劒津遊道南書院見舊士友云去夏復齊先生於此寫孝經一書并文公刋誤三千餘字或以為勞復齊曰石經非思陵宸翰乎於學者何勞其間有舉前賢寫佛經事默不答此某之所以不敢也復齊最敬慕竹隱風節獨於此事有疑世謂士大夫晚年以此消釋聲利念此特其末耳坡之徑直猶不曰自此出若了齊之不畏死生禍福則人直曰自內典得力吾書獨無殺身成仁之語乎今姑聽其借去猶無害若張無盡楊畏輩亡命做官職則佛之罪人者也北山與竹湖今之了翁也以此立身以此救世儒者見之謂之儒佛者見之謂之佛所謂心根於仁之說是也政宣之禍至今以不用了翁為恨然則救斯世者二賢之責也此某之所甚望者也鐵菴集卷十七
