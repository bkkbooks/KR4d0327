body:
  text: 鐵菴集卷十二宋方大琮撰啓謝衛帥大參舉政績慕韓公之名蓋嘗同海內士受歐陽之薦今遂為門下人出王公風裁之精非世俗露章之比許與嚴而人服力量大而言行欲謝何辭獨竊有感今之天下所憂蓋在於本根譬之弱人其病毋求於理脉江東之王佐逺引客館之人流可覘諉曰乏才距不誣世杜衍用則所引皆知名輩司馬相則其徒有行道心還慶厯之休明見元祐之氣象人心歸嚮久有屬矣宗社靈長終將賴之近為北門守鑰而來咸曰山東歸衮之漸一鶴動興萬牛莫回野服與父老相從在公樂甚夾袋之姓名久悶如衆望何已動搖故鄉之思猶收拾數士而去如大琮者獨何人斯不能為時輩之重輕况足關世數之消長少而奏賦壯夫望而恥之中亦說經弟子笑于列者無負郭之二頃凡閉門者徒以斗升驅之臺府紛文書之盈几隨掃隨生問芻粟之餉邊孰多孰寡事固有大於此位不容出而思若積薪未焚可為流涕者二幸執贄而見毋慮吐哺者三不敢出尖於衆中若蔡小異於坐上幸官不曠奚績足言飛騰鶚表之書得尾羣彥持白鶴髮之老勸加一餐衮褒之語不虛鈞播之意有在某磨礱素志激勵深知方陳摧謝之私敢羾無厭之請選離坑塹望切庭闈與其黽勉仰面於他人孰若終始歸命於我相所舉四方士豈無才品之更髙莫難千載逢儻念狂愚之足取不負臨賀有如西江上觀使衛大參濓溪嘗䝉清獻之知屢煩薦表明允既因韓公以進猶再投書愛之必曲成乃休求者至洊請則瀆然而前修所不免則於小子乎何嫌敢憑深恩盡露誠悃世何常乏賢者之用患無以受天下之才或吐哺以至三或旁招而在列尺度權衡之下有劑量焉毫毛絲粟之能無遺棄者否則用之不盡甚至散而莫收時事日新比貞觀初年而奚若舊弼家食宜貞元朝士之無多以公歸兮正天意也開翹材館盍日延於千人坐退思堂局歲舉者三士此固海內之所共覬既出門下亦又奚求重念某自初投入幕之身端不作通閨之夢才各有所限人豈不自知讀古人書未能津涯作俗士文不足金石習諂則方心難鑿欲辨而鈍舌莫搖不識中朝一貴人祗延座上五窮鬼才學功力世所有者咸無焉掩伏縮藏人不知之何愠也一榻自埋於案牘諸臺誤問其姓名偶然陸君交有孜孜薦引之心緣此侯喜輕重勃勃仕進之念物至終窮則反理宜大有所遭慕司馬洛中名自兒童始開范公陜西閫以賓客從登進從容受知感奮分合竭微勞於臺府亦欲陳半策於廟堂企望衮還庶幾鈞播名已在公車之列薦援是入東閣而有辭猶欲陳情豈不聒聽持寸管偶脫場屋纍五剡乃出選坑浮屠合尖長繩結尾功須於一舉手世謂之再登科二老呼兒來前視吾髮白一相為世盟主待汝眼青試往束緼乞火其前斷無失節落枝之悔謹再拜受命退乃三熏修辭願武公之入相親見太平如任安之在門誓無叛去答士友江西計幕老熊解元入湖堂有儒峩冠以文銜袖斂而節奏則非流俗四六語肆其汪洋則為長書千餘言陳誼甚髙整容熟讀竊惟設書堂初意本以待場屋外人入而求性命各正之本原靜以觀喜怒未發之氣象湖光几案有浴沂舞雩之遺竹影庭除供吟風弄月之興自周孔顔曾以來所傳者凡關洛朱張之書皆在焉能嚌其真有足以樂夫亦奚負於吾輩乃今又添於耆儒上寓公之舊遊名當路之推重衆欣私淑之有此老僕亦公餘而質所聞然深玩一篇陳情之詞猶覺抱萬里思子之痛死於蜀顔路不聞其過戚子夏或責其太傷達道順天乎何尤進德與年而俱邵所存逺矣幸領略焉漕貢臨江袁監押摩空作賦偕計策名愛筆硯而不投肯同噲伍羣衣冠而角戰本占盧前居亞偶然登先自此某官先輩西江秀氣東漢名家四世五公青氊尚矣一門八薦淡墨半之漫食濮邸之魴再翔漕闈之鶚光騰斗射䜟卜洲連隆興䜟云三洲連出狀元毋鶡吾冠擲舊銜如脫屣傳臚近陛收髙第於摘髭某佐幕休休入京去去及見趨省闈之日考官奚敢瑕疵儻遇新進士于塗老婆休說塗抹珍投非暗善禱何如鐵菴集卷十二
