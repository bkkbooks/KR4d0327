body:
  text: 鐵菴集卷九宋方大琮撰啓本道守倅瑞守齊寺丞恭審起家二千石拜天朝之溫言並江十一城得道院之名郡擁騎赴頒春之約羾箋愧賀厦之遲某官矯哉南強逺矣北學護蹕江左導見謂管氏之功執手周南遷欲了父談之志墨綬未離於江面緹屏徑上於邊頭從容對壘之邦輕裘鎮撫咨訪長淮之表沃轡驅馳賜環平踐於清班借箸敷陳於大略論髙衆忌身退名香復把麾而承流局舞袖之太褊瑞今內地甫供錦水之吟青吾故家忽報齊疆之復聞之感舊重以籌思袴襦少聽於塗歌帷幄入陪於國論某管窺自陋幕辨焉能不足為一臺之重輕得竊窺諸郡之施設問訊喜來於名勝歡謡旁震於鄰封欲作賀賓相望一葦之莫到竊知媺俗不與三州而並聲有大於斯如前所頌隆興倅孔衍聖公裔恭審贊藩曰二錫命至三問厥世家正襲素王之統燁然公爵亶為洪府之輝邦之人曰未前聞臺有客欣然作賀某官代習過庭之禮宅存藏壁之書古來南面之帝王忽諸不祀天相東家之闕里施及無窮蓋與乾坤合焉其賢堯舜逺矣五十一世之嫡嗣千六百年之正傳降材自殊從政何有屢監州皆以名顯今佐嶽則其體尊百官之富出其門好官奚吝千乘之國可以道别乘太拘前代嘗起而輔相之本朝有挺然臺諫者等之而上疇曰不宜某仕於學之未優官相規而求益矧所從來者先聖今猶疑有於異聞節愛藹然公以贊為邦是急饋餉亟甚僕敢問去食何如誰謂之迂幸暢其説交代馮運幹厠賓僚之末綴欲罷不能瞻賢躅之在前忽瞪其後手所植舊桃亡恙僕又種新竹以迎交代某官密探正宗蚤參諸老伊洛之書奚負錮絶影銷潯陽之校有師訓箋日出更瑟宏開於斯學拔茅獨遜於其徒畫諾幾何欠臺家之餘債淹留底處尋壁記之舊題相視而驚試問其故翹材館資賢于列羣從橐聨櫝以聞孰壞垂成正堪一笑彼進此退加燈火十年之功小窮大通了簡編千載之業垕齋滿牀之著述草堂謀野之經綸道待位而後行功與言之並立某久客疲厭辱公後先悠哉已分之工夫奪以吏家之案牘鼠窮於技鳥倦則還贊饋運籌已試毋庸告者考德問業欲歸將有請焉荷甚書先藏為世好張帳幹轉輸列屬如推車之欲行臭味得賢覺同幕之增重昔相望各閩越隔今聮事如弟兄然厚甚襟期覘之眉目某官材雖天得業自父傳奏賦幾年至今膾炙人口明經有子恥與膏粱輩流警百里不以惠政縱夫姦據三尺不以人命媚其上又持此道來佐于臺凡我賓聮得賢使長有梓人者工得左右以趨如嚴君焉子之東西惟命然不壓下以勢皆得盡人之情既多所長何憚不告或曰笏鞭之算未免依人不如帷幄之籌自追乃祖某名為計屬祗是書生對案羣鶩滿前恐羞於應作吏一字無用是殆其然茍每事得因人成敢曰謀不自己出然吾黨和與同之道異而從長大若小之殊合此所聞悉以求教劉晏之客皆士類意者殆我輩人滕王之閣集賓僚恍焉猶前日事以心相與未面已孚王船場凡我同舟均是計臺之客用汝作楫來從宰相之家江頭企足以須書裏承顔而笑某官寶婺秀傑淳熙典刑鍊石奇勳宛存槐蔭肯堂好手新立棘班衍三世青箱之傳俾諸郎白眉者出蜚挽給饋在江之西舳艫課功設場曰北吾事濟矣哲將在焉無夜半藏壑是虞將天上乘槎可到某自知短拙幸共寅恭問錢榖幾何叶贊蕭劉之績縱風波不動豈敢胡越其心行且盍簪敢稽報玖葉船場從計使後謬參蓮客之羣有大匠來敢問梓人之道雖貽箋謙不以告既會面請其何辭某官秀出相家昉遊宦海便合乘槎而直上却問刳木之何如建臺據大江之衝移局自外郡而至一道給饋舳艫之尾相銜兩場課功斧斤之聲不絶觀其所指畫者信矣若素宦然昔者祖風嘗作濟川之楫久於父側習知轉漕之艘皇華以稱職聞青氊可指日復某念似人而見喜何接淅之來遲目斷欲穿早副幕下士之望心期相約勿作舟中人之疑欲吐甚多亟酬未盡帥司官劉參議瞻婺女星射斗牛分新帥垣之號令有滕大夫問議幕之老成得劉賓客以同鄉同朝之雅好為此時此地之勝逰某官學積功深論有根據執經麗澤久從太史之逰筮仕清漳曾受紫陽之薦有大際遇聽小浮沉彈冠迂寄於京廂彯組徐躋於列院睦宗掌教入藩邸則漸清策士臨軒直殿廬而益近自此升矣誰歟忌之乘逺障浩不肯留持直道落其難合閩中素號無事聊復參謀江右近警可憂或請易地境上流比所報諜敵內擾何暇及人顧我自備者何如恃彼不來則誤甚既固吾圉推及軍國之大謀趣歸舊班請決廟堂之密議某敢説癡兒之了不勝嫠婦之懷挽粟督儲以歲旱告采薇備遣奈兵驕何周旋兩司之間倚賴一賢之重雖六奇計非他人所得聞問一編書或孺子之可教所慙贄敬乃後隆謙孫撫幹自閩涉江迭君兩幕以臺視閫如出一家唯居其上者無間語於父兄則為之屬者猶比肩之子弟得賢滋重拜賜多慙某官早以文嗚紛其內美孕育三山之秀氣崢嶸六館之英聲如蜀兩蘇如吳二陸難昆既舒翹於亞榜執事合更放於一頭眇視科名絶不挂口相從問學鋭欲名家既振鐸於宜春盍説經於廣厦視孫洪易與耳毋庸館賓昔烏公何人哉尚可羅士矧今國脈寄我詞臣自詭佐元戎之僚與密論當世之故赤白囊所至幾處碧油幢所畫奚先雖襟帶內維比邊陲而稍緩然籌帷促入當賓主以相從某自信其愚無庸於世冗不見治之博士貧又來客於皇華昔讀史至流馬之謀歎其有智今坐漕於羣鶩者對立而讀書驚時事之方殷聞公來而竊喜機籌所運者大計蜚挽特居其一端私竊疑之非止治文書而入幕所有請者或許陪友師以論心以意相孚有言則淺本府諸州官謝教同年謁選修門共作江鄉之約久巢下幕何遲泮水之來一笑相逢三同敘好某官合沙地望上蔡家傳淡墨氊書得春闈雋半青舍選由夏校來雅不愛於熱官殆未忘於習氣潮接昌黎之治匪但文名洪為山谷之鄉不專詩𣲖曰教云者以道在焉凡襟佩所至來從意黌舍之緣未了毋填間散更須入太學以誨諸生會有遭逢必將坐細旃而舉明主某厥初入仕以冷自嫌及今為案櫝所禽翻不若虀鹽之味飛雲畫棟相看宦海之漫逰細雨簷花共説慈恩之舊夢報稽於施言出乎真趙僉判府幕元僚矧是冰壺之公子計臺一客自陳枌蔭之鄉人且相携為滕閣之逰未便要作閩山之夢剝緘喜甚空谷跫然某官藜燭觀書錦囊琢句棣華競顯夀獨殿於諸昆芝砌傳芳名相聮於纍榜中有足樂官不必炎議臬活千人之多撫字方百里者二抱南陽之婉畫愛西江而重逰惟洪都舊號龍潛而元帥今得螭史凡百政事當舉者與衆賓佐密決之如公此來不孤其望大則平章於軍府暇焉題品於物華南浦髙吟了此詩債東平入侍歸歟詔音某仕偶為飢學未能飽莫裨轉粟漫隨羣隊走趨竊意泛蓮自有一輩名勝宗英如許府望頓增衆所稱者翕然僕之意則異是家山爾汝儻許為忘年交賓客東南或尚可同日語由衷之請未面已孚談節推洪府大藩鎮以二三之執政闕名卿其視贊挽粟者流奚足並泛蓮而語墜緘肯及拜賜多慙某官以學成家其傳有父三間坡故居之屋起儋郡之懷思百年談太守之詩經誠齋之題品遺之來者是以似之材地更覺於寬餘民曹昉開於步武曽謂一再墨薦之書上不如數萬白粲之賞濃姑假塗乎奚傷至入幕則有體嗚鑾舊地懸榻遺風矧帥相與常時殊宜賓僚妙當世選笑談之頃休戚所關公衡尺以量材當始其容持旌麾而出府宜昌而門某渴於見賢幸甚同宷滕閣髙朋之滿如僕奚為廬陵君子之多觀公益信交謹其始情浮於詞南安余判官傳聞候客蓮新池上之衣多謝鄉人梅贈嶺頭之信顧縶在佐臺之逺不得與賀厦者俱某官粹然天資濟以世美壺中秀氣趾此山者多得之水南名家似其門者蓋寡矣兩仕未離贊邑一邦之號元僚洞丁與省民錯居幕議藉大賢為重擕書寶界尋無垢倚柱之磚命駕平亭訪祖師置鉢之石悠然川泳薦者瀾翻將繇大庾以召還添入吾莆之比事某里居素拙漕畫可知紛同寀而異鄉莫我告者隔似人於千里企豫望之相與以情有如已面袁州方録參飄然逺客入袁城羣寀之聨幸甚都曹自閩國同宗而至因念僕之臺長又為公之郡侯於此相逢良亦不偶某官天姿獨得世系有源元老叔興周緒出千年之逺太常儲在漢𣲖由三子而分久矣居河之南繼又渡江而左在上浙者嚴之建德常出白雲原處士占吾閩者莆與合沙俱以烏石峯得名然試問夫材孰寡孰多抑所托之地有大有小舟楫方山之雄壯理宜大族之繁昌榜艷金花班髙玉笋至今猶説於名父有子克傳於當家合踵登朝今猶治獄所關生人之命請盡君子之心民自不寃無貴踊之鬻市身享其報駕髙車而入門矧如大琮是乃同姓尚為此地留者蓋以行司在焉西風愁攬於旅襟上日喜聆於賢轍進既例陳於寮好退又密敘於宗盟竊笑兩郡一嶺之交缺焉齒拜邈在三峽五臺之下得以譜通詞不當駢施所宜報柳司理會府獄掾有三左獨居最名門家訓第一古來相傳移之官必有可觀得其書何以為謝某官毫端光熖書種源流在有唐號為禮法之庭至本朝有唱古文於世賢聲相續劇治不辭弭盜有方澄嶽樓之煙浪詰囚何處問洪獄於斗牛自空囹之風不傳聞畫地之諺亦惴慮傷汝體竭盡吾心毋曰理官不在古三后之列有如司寇亦居今八座之尊某本是山人強名臺客出則相盍簪於寮寀坐焉翻飛挽之文書聞風而敬士師焉敢凂於下惠用字不當律令恐見嗤於儀曹何以教之是所望也建昌朱司理樵水莆溪休作閩鄉之別李官蓮幕均為江國之遊賀上莫前由中有喜某官天資甚偉風裁不羣地近紫陽人謂考亭之族霜凝白簡家傳橫榻之聲卑之不屑尉曹識者知為仙隱晉當畫接官以秋名汝往欽哉弼教惟明民散久矣得情勿喜所不若江河之易避有如盱川非固求門閭之必髙自報于德某漫佐軺之日久知珥筆之風成無補蜚芻徒勞積櫝然念搜求情偽或於故紙失之不若審聽色辭所活平人多矣非徒交施亦有味言隆興朱監庫南豐有士足當此香吏部何官乃隱於酒笑僕之問粟奚味覽君之緘藤甚髙某官沉酣六經糟粕百氏詞場苦戰寒花賸有晚香宦路徐行倒蔗漸逢佳境既脫簿領又營糟丘調度急於版曹𣙜酤至于江國若非為養兵設亦豈欲與民爭醇乎萬家之春是則諸庫者職為醖而仕耳竊議白眼之步兵縱意不在焉合作蒼顔之太守某出本為於飢迫念不到於醉醲徒自心勞謬參饋餉之百萬計儻以賢舉不如管庫之七十家意之欲孚言所不盡南昌周宰南昌冠八邑中有來賢尹濓溪去百年後得匪聞孫揩摩記壁之塵埃唤起銘心之德澤凡曰同寀傳為美談某官名壓羣英學推本統公生中古已矣不夢於周公道在本朝崛然有起於營道惠爾後學况其災家精舍進修把通書而為的泮林講貫畫太極以示人三復立言一生受用今乃舊臨之邑入而首拜其祠議法常曰與民仁哉斯語爭獄不屈當路直以事人見者謂若存兮不然何其似也先生往矣局於持節秉麾執事成之繇此得時行道某幼常有志壯轉無聞挽粟塵中久之厭倦愛蓮亭上至則躊躇聆君兹來使我重感新政過人逺甚端有源流遺書與世共之儻容質難曷酬厚意盡去陳言髙安余宰來從相閥號古子男之居言念臺家有小賓客者在肯告之至熟味而慙某官材雖天成美亦世濟源流甚逺嘗生慶厯之諫臣融結未休遂作紹興之魁輔將顯顯者為元成之子又駸駸焉及魏謨之孫冶者所為丞哉奚負庾節既參於上介花封又訪於髙安雖筠郡所領邑三然道院自負郭始治以聖書愛人之説質之縣譜藏家者同甚得斯民之心請借乃祖以頌巧於製錦歸我公是以衮兮譬之割雞宰天下如此肉矣某問其從出毋乃太寒強置之畫諾之間非素所討論而得想傳觀書檄豈不笑幕下人欲叩問典刑安得為座上客所幸密邇或可續聞鐵菴集卷九
