body:
  text: 鐵菴集巻二十八宋方大琮撰詩題永福董宰溪莊圖羡君胸次有溪壑眼底塵埃一洗之地獻山湖供入畫天私風月要吟詩貴人豈復知盤谷名世應須學武夷政恐主翁方宦達買山雖早入山遲題董宰讀書軒坐衙彈琴和且平退衙讀書鏘有聲琴聲書聲兩相和和氣散作花滿城亦知言游不可起雅俗二者難兼行曩余不敏坐此處軒窻塵土安有名堂前薇花寂寂笑此殆文吏非書生君非異人何能爾吏事不廢心轉清牒紛案集判筆走庭空吏散詩句成嘗聞歐公居夷陵日討故牘繙研精金陵宰鄞政習禮天津客已愁鵑鳴懐哉尹君志古道請把此案一商評挽趙南塘初開學禁預招延俄滯周南四十年大振文章驚海内肯將詁訓讓儒先孤忠自許漢遺老髙氣直凌唐謫仙鳯昔覽輝今已矣危樓百尺尚依然晚起蘇公以禮郎侍經掌制位文昌端平氣脉真堪寄元祐光隂惜未長馬邑深憂形諌墨鸞臺寧徙恥書黄門生最是知心者追配微言淚數行夀鄉守張秘閣秋氣髙寒公始生禀資多得聖之清官箴未許氷為潔心事真堪月比明久合紫囊還再世却令皂葢歴三城憑誰盡記前張政只聴村謠里唱聲家學淵源今吏師寛嚴殊劑亦殊施豪宗咸服薤一本野老齊歌麥兩岐最課休聲無地著芳名姱節有天知請將郡志從頭數髙出蓬中更有誰老去遇公為地主賸將恩意煦摧頹龜魚得䕃眠偏穏鷗鷺忘機熟不猜方喜璽褒天下最又聞玉節日邊來豐年一飽誰之賜好把禾頭祝夀杯送俊明李提舉有美羊城一巨儒蘭坡氣脉最關渠村髙懶宿郎官被色養姑乘使者車曩日緑林功未賞今年清社事堪書福星何事輕移去久矣世無公毁譽幸甚聨臺餘五月户庭微細事皆知山中菊徑多歸思膝下萊衣少脫時吏散庭空無滯牒客來酒盡有新詩耳聞眼見誰虛實寫與行人作口碑時賢落落嘆晨星世事如棋局又新赤白交馳邊塞急腐紅消盡國家貧誰令野有横舟者應是朝無惜寳人握手不堪離思涌願公自愛廟堂身送廣東趙舶使百禽收舌後一鶚淩清秋滄波渺浩蕩中有萬斛舟刼灰燒不盡宗老擅風流典型尚千古雅奥根九疇忠憤流中壘功名起武侯載彼北方學來為南國游皇風仗宣布蠻俗賴懐柔偶然得共事顧影非其儔逢迎時一笑傾吐不復留抵掌談西事强顔愧楚囚見晚别何早含情酒澆愁惟有加餐祝作歌壯行輈有詔願亟起且莫事鋤耰顧我何為者一毛在九牛送李兄赴省乃翁場屋負髙名裏許工夫共講明謝氏弟兄輝玉樹韋侯父子薄金籯世科莫訝榮寒畯少作曽看到老成此去家傳衣鉢在想非温飽志平生鐵菴集巻二十八
