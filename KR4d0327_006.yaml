body:
  text: 鐵菴集卷六宋方大琮撰外制吏部侍郎兼中書舍人兼權直學士院許應龍兼侍讀昔我孝祖日御經帷嘗講畢賜茶命講官稍前曰朕無大過豈無小失況朕未能無過乎具官某種學有本秉心有常不激不阿夙夜禁密繇講而讀匪曰序升乾淳五十卷之書蓋將關抽而鑰啓焉卿其以孝祖之風烈望朕朕亦以克家等之規益望卿交修胥敕無忝先朝非徒曰能讀也期爾有猷置朕無過可左司諫曹豳兼侍講國朝諸臣稱言官者必曰皓講官必曰頤朕謂皓氣和豈不宜講官頤氣直豈不宜言責其不得兼者可恨也爾東嘉宿學內直外和每覽奏篇謂宜兹選端平初嘗以語之大臣矣亦閲三載乃遂於懷昔賢之不得兼者悉以命汝夫魯經二臣所最究心者也益𢡟所學朝夕誨台以成二臣之志以紬繹信諫之義蓋朕之信卿久矣可馬良母王氏江元秉母徐氏吕燾母厲氏並封孺人敕具官某母某氏王制五年柴祀問百年者就見之朕三載一禋大賚四海爾子名在仕籍思華其親雖年未滿百猶畀以初封視昔人尊禮髙年之意不既優乎尚服新命益綏壽祺可淮西總管陳芾差充蒙古國通好使特授武略大夫敕具官某國家於蒙古非讐敵比也疆吏不戒以至疲吾邊氓通好之使頻嵗屢遣竟未得要領以歸爾以小行人銜命再往其為朕諭以重惜民命兼愛南北之意進爾二秩以榮其行茍能成約則豐官醲賞不汝靳也敬哉毋忽可南劒州判官新辟差知贑州安逺縣鄭循降儒林郎敕具官某熙寧距今百七十年一時奉新書者貴顯何限今其澤之存者誰與監門俠不受安石改官之餌流離終其身中興初旌遺直官其後一澤如線蓋纍傳而至爾循之身亦可以觀天理矣可以自愛重矣延平佐幕弗克靖共營辟徑行漕臣劾上薄鐫一秩朕不容私循其省哉毋忝爾祖可鐵菴集卷六
