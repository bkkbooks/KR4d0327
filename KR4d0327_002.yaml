body:
  text: 鐵菴集卷二宋方大琮撰右螭奏議直前劄子端平三年十一月十二日臣頃以遺補官從駿奔後忽覩明禋雷雨之異不勝言責失職之憂陛下既不忍加誅又引以自近遂得日侍坳陛備見天顔憂勞五旬之間宰衡虛席九重凝慮於上百辟攢眉於下妖狐嘯鬼跳躑天昏臣時憤悶非不能直前一吐而在廷應詔之臣言之頗有中者臣日望之陛下庶幾聽之乃者趣召新揆四輩方行儀圖舊臣陛正元宰宜中外之相慶幸相權之有歸詎非今日一大機括乎然癸巳置相之初一機也而以輕率壞乙未並相之初又一機也而以異同壞今也改新元起諸賢敕責百官詔旨峻厲以示滌舊圖新之意故善用此機者今日也不善用之猶前日也況今之機尤有急於前者乎自紹定之戊子至於癸巳江閩大擾而邊無強敵也中間雖有蜀之警方動而旋息自端平之甲午至于闕又臣頃入對恭聆陛下責羣臣曰大言傲誕者有之肆為欺罔者有之背公營私者有之豈不以國用匱兵籍虛將材乏未聞獻理財之實計畫強兵之實策薦一校之實材此非諸臣而誰責而羣臣又切切然望陛下曰綱常既泯布粟之謡不解恐盩氣之未散兵端輕動輪臺之悔不聞恐怨氣之未洗北司怙寵南陽干政恐謗聲之未消自汴洛喪師京城失伍之後每更一變上下相諉廢日力違事機至於今極矣然下之所以望乎上者皆所當為而其事甚易上之所以責於下者皆所必為而其事甚難陛下何不自為其所易而責羣臣以所難哉今內外之事急矣不知禍變何為至此極也所以回天心感人心者獨非當為之事乎為陛下計莫若明出二詔布告中外其一則開陳即位之初心全復友睦之美意前愆往謬各正主名綏亡拊存曲盡恩渥對越祖考可以慰答列聖之靈則天心悔禍矣其一則深懲興兵之昨非具述蹙地之大痛戒諭諸閫當若同舟勞苦將士俾如挾纊號召豪傑顯罷和議使有不與敵俱生之志則人心思奮矣必如間關草昧而無為平世之規模必如篳路藍縷而毋事太平之盛觀謀必公之於外廷則掃除户內者無所投其巧矣聽必廣之疏逺則夤緣近親者無所售其私矣此在陛下一轉手間直易易耳明白洞達布之海內而無愧感動天人之機豈不在是然後大會羣臣而語之曰財以何術而裕兵以何策而強將以何道而擇給之筆札如慶厯之開天章閣極其議論如淳熙之對選德殿置國用一局使曉暢財用長於心計者居焉置邊防一局使明習兵事熟於地形者與焉凡今之所以難者使之朝夕講求焉商確焉可也且將材以多事而見今可為多事矣而將材未之見何也若夫合諸屯之伍符而考核軍實則兵精而財有裕以出戍之生券而就募邊勇則兵倍而財亦省此䇿非有難行者而施之兵刃交接力不暇給之時則衆疑其難矣亦豈容畏其難不為之哉今而曰必敵勢稍寬而後可言治兵可言儲將必事會稍紓而後可議節用可議救楮然陛下何修而得其寬且紓哉必有以感人心回天意而後庶幾得之此臣區區之愚深望陛下為其易而使羣臣當其難也羣臣亦何能之有不過憑藉祖宗之積纍蒙賴陛下之福德殫竭智慮有死無二或足以康時屯而延國脈也雖然今之所謂易者在陛下一心耳播告詔旨豈空言哉臣嘗觀漢文帝賜尉他書其言質實無少回護首曰朕髙皇帝側室之子以王侯吏不釋之故不得不立帝蓋自明其即位之初心而無所諱故他亦感服粵患遂息又嘗觀唐陸贄草興元詔德宗許以不必避忌有曰天譴而不悟民怨而不知朕實不君人則何罪帝蓋自言其召戎之大誤而無所掩故悍卒感泣冦難遂平聲音之化於人末矣果出於心中之真未有感而不化者茍非其真雖日下一詔無益也臣願陛下翻然感悟毋為虛利害所撼洗然更新無為小補綴所牽斥逺孽閹毋至決侍臣之去留裁抑近屬毋重煩諫臣之論疏是機也茍善用之則人心可悅天意可回凡兵財等事庶可徐就吾之條理矣方危機交迫悔改已遲若遲而又遲一旦瓦解雖人主汲汲修德百官皇皇修政祈衷於宗社請命於上帝已無所及自古危亡之極豈其國之君皆失道臣皆不賢哉蓋由其來漸矣此臣所以痛哭流涕為陛下告也當主憂臣辱之時而臣力不足以執干戈謀不足以獻帷幄朝驚夕悸思效一得而忠愛陛下者止於如此愚戅無補祈去未俞惟陛下察其誠而採其言則宗社幸甚哀其愚而聽其去則小臣幸甚直前劄子嘉熙元年正月二十一日臣目覩近證外潰內虛有病無醫孰扶孰救乏材之急非獨陛下憂之蓋通國所共憂也雖然豈必借異代之材而慨想不同時之人哉天之生材自足世用民望所歸則其人也蜀許靖何人猶不忍以時望棄之況於望實俱孚者乎國家盛際以望用人具有績效班班青史比其壞也以望沮人非沮其人也沮國人之心也蓋自符紹竄逐崇觀廢錮至於政宣極矣擅國者懼時事之將潰尚能以名望召楊時諸人用之先儒朱熹謂若早用其人猶可救得一半蓋惜其用之晚也然觀是時元祐諸賢多埋瘴窟四海人物惟有陳瓘南郡鐵壁惟劉安世所以繫天下之望者此二人耳使當國者忘其忌而授之政則靖康元二之屯必不遺萬世恨也今天下之材皆托逺斧斤之僅存者嘉定以來三十年間權魁凶儔極力鋤剗僅能成就德秀了翁二臣之名而已冰山見睍二臣迭召當其改絃之初使亟坐其一於燮調填撫之地垂紳搢笏豈不足銷壓亂萌而召之稍遲天又奪之其將誰尤使亟置其一於謨明弼諧之地偉識宏議豈不足參定廟算而召之益遲事出倉迫強俾視師以至流落孤寄於大江之濵是誰之咎二臣學同志同其所以不同者和氣英氣分劑有多寡耳愛護保惜獨非主張人才者之責乎國難至此倣徨乏使陛下當饋太息猶且明詔中外博採材識雖細不遺若夫三十年劫火不燼之精英一既為天之所奪一復為人所沮豈不大孤海內之望哉近者帥越之命下見者舉手相慶謂有過闕之期矣而俄復不然既而帥閩之命再下見者失色相視謂有逺外之漸矣而俄又有甚焉此非陛下意也其沮之者誰歟每視除目當駁當限是非顛倒聞者驚愕若果有之世事可知四蜀糜爛百萬為魚其繫西南之望者如臣􅌫之老成俾就開宣閫宜矣若了翁者獨不可留為朝廷重乎借曰經制西事豈必身去廟堂哉況今巨姦大黠旁睨側視猶有駕言羊城老臣之薦以欺衆援進者竟以物議喧譁而止其説曰是小有才也是天不絶惡之仁也而當世之所謂善人吉士負一代之望者反以小有偏棄之豈天所以生賢祐國之意耶抑臣又有憂焉望非一日之能積也修於下而扶於上小者養其氣大者全其節風流接續國終賴之端平用賢漸失初意昔進今亡令人短氣獨一言路雖沮不屈有齊南史相繼之風存此一脈亦天所以祐吾國也向者臣清叟以直去中使宣留至煩再遣同列留之給舍留之侍從經筵之臣留之猶稍有本朝盛時上書俱貶交疏留行氣象曽幾何時臣範以直去既席藁私室矣又出關矣又絶江矣盈庭嗟惜視前有加然而內靳遣留之使聖意日以異外乏交留之章士氣日以靡朝野觖望有識深訝矧今西府亦曩言官指摘輔臣見謂風力臣昔所敬今反以眷留苛挽欲去不能其勃鬱當何如三院寧幾人其絶江者未必可回其猶居職者各閉閣求去月紙不書臺綱盡廢南臺惟一人之謡興絶市無臺官之諺起此何景哉祖宗朝諫臺之議輔弼未有不行其言其間有兩去者無兩存者及其既去而皆還既還而皆交惟不失其為皆賢故實具在也況當國勢綴旒人心解瓦之時人才之銷歇既無以表其望言路之湮塞又無以養其氣大臣之進退未定又無以全其節強冦闖門室內交鬬為主人者坐視莫決納侮四夷傳笑萬古深為國體惜之臣愚欲望陛下仰稽家法旁採人言表人才之望而盡其用還言路之氣而旌其直全大臣之節而亮其心區處得宜大愜衆志則朝綱整肅國脈安強內可以弭姦杜邪外可以折衝禦侮矣臣前日見範去國雨旬憂悶抗疏不勇昨日聞了翁事憤激援筆不能待旦此非臣之言也在廷之言皆然獨臣日侍清光不敢不直前一吐臣頑鈍無恥當去而留前愧臣清叟後愧臣範頃者敷對自請叢祠至蒙玉音俾之且待今再閲月矣惟陛下哀憐而聽許之臣不勝局蹐俟命之至鐵菴集卷二
