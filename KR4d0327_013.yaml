body:
  text: 鐵菴集卷十三宋方大琮撰正書江西計幕監司守倅縣官江西倉蕭著郎元日在璿璣整齊七政大慶受寳玉榮懐萬邦矧惟翠節之尊宜介青祺之輯某官陽和徳宇月潔詞華激濁揚清冰生羣吏之膽賑濟議貸春在萬姓之膚式舉椒觴入膺荷囊某受容漢部矧出韓門愿將汝水之烟波斟為美醁更指峩峯之松竹用祝修齡輒羾魚書少代燕賀回臨江軍楊寺簿某伏以獻歲初吉端月始和某官剖竹策勲賜金褒最借留滿道扶翊有神台候動止萬福某遥瞻賀牀併羾謝櫝願加頤養之吉入赴泰通之交葉主簿稱獻歲之觴頌椒有喜語向陽之木栖枳為多某官富有賢稱昉為世用髯鬚盡黑雅宜稱於青春簿領勾朱肯徒銷於白日靡不如願其始自今某燕幕凄然貂裘弊矣正一曰元日皆受歲以相懽四十是明朝獨流年之有感且與同輩交賀泰通武寧樓尉桃符執厲式宣司警之威椒頌紀時茂介履端之慶某官宦隨業進道與時行千室安眠不聞夜吠四郊笑語已泛春聲惟北部愛少府深恐東君歸上苑去某居然幕破况又帳開念綈袍不能自完如僕寒甚若玉璽果朌大賚與君同之斐然奉酬還以為頌冬書江西計幕監司郡守賀江西倉日書黄道聿增一線之長星驗清臺果協五珠之瑞維部使者自天祐之某官勁節凝霜英詞煥斗方立朝而正色挺特歲寒宜察部以鋤姦森嚴風采道豈容於久鬱陽至復而必亨入相明君密扶元氣某問漕下之冰未泮念帳中之風猶凄然夜半雪飛報嶺梅之消息朝來灰動併谷黍以吹嘘誦詠意深編摩字短某惟魯史五雲之書為外諸侯言周易七日之復為内君子言某官今之循吏邇者四隣以歳歉吿獨樂郊以有年書則宜春臺上書雲之日其又得祥必矣此外之已應者然今之端人乃心王室久勞于外消長往來之機於復見之有其象而無其驗可乎此内而當應者推而為泰之通晉之接則道長之效也某一寒最甚䝉温言以披拂之固知君子以氣類為念也不敢勞摭綺語請以經對惟領畧幸甚興國軍李司直某恭以燕寢凝香報珠連於夜半熊幡憑軾看景至於日南宜有嘉祥式昭吉旦仰惟某官名髙瑞世之斗舌帶談兵之霜坐黄石城自延辟穀之算對赤壁岸潜息飛灰之塵乗此陽亨入而冬見某漕下之冰未泮帳中之風猶寒雲曷墜前粲然郇公朶翰春來底處知是司業酒錢既九頓以登藏又再拜而起祝勤拳之悃矜炤是祈進賢王宰獻長踐之履聿嚴太史氏之書峩進賢之冠正應内君子之象屬時小至受福孔多某官三異休稱一同和氣圭景南至終餘北嶽之風聲書林日長飽讀初寮之文字合趂陽生之候入趨冬見之朝某遑恤下客之身寒且喜吾儕之道長放梅舒柳想成滿縣之芳剪水染雲少代登堂之賀因酬來施莫匪謡言豐城林宰登魯觀之臺書雲禮也望豐城之邑有氣佳哉宜其主人介爾景福某官心同琴適政與錦新筆下粲花端是嘘枯之手江邉種栁扇成解凍之風圭景初長璽褒已促某材如韈短愁似線添癯然天賦之寒未遑身計屬此陽剛之長交慶道亨庚辰東湖黄講書生日回贄日困幕塵坐生逢於南斗神馳親舍正望逐於飛雲詎圖山谷之聞孫特借方壺而壽我稱重善禱鏗鏘妙詞誠可被之管絃慙無歌者謹珍藏於笥篋時出觀之辛已東湖馮學錄羽檄在道慚無幕客之謀弧矢掛門竊感男兒之事念天生我以奚用愧皇揆予之有初敢謂博雅之醇儒亦出頌禱之妙語荷君厚意顧今何時必上則報君父之恥讐此學者說性命之根本吾生無補世何闕兹甲辰天運既周歲又逢再辛巳懐此已久觸之而言壬午東湖堂長傅法師揆予初度笑南斗之不神有朋逺來為東湖而借重敢圖大雅亦費清吟某官味道之腴得詩之𣲖地孕麻山之秀屢見桑田家緜商傅之傳來從箕宿宜其得夀推以愛人某仕正及强志猶有惑夫子嘗不動心矣敢問何如後生所畏無聞焉願眀見告東湖職事暮春五六人覺遊從之可樂明朝四十歲驚老大之相推入當為郎之年出合專城之日彼哉言也我則異焉問學就荒恐墮無聞之役友朋惠顧幸未見惡於人鏗鏘大篇褒拂初度生吾前者敢問不動心何知幸明告之亦足為强仕之助三山郡解元我生悠哉三見西山之面客句佳甚併擕北海之尊且飲且哦以喜以愧枌榆共話於七聚蓬矢固在於四方子將决勝而行吾辦賦歸之計來春三月何處又得新詩避道長安善頌有如此酒賀皇姪節使生日某恭審仙源衍慶宗邸毓奇雅韻中涵貯金天之露氣祥光下燭先銀漢之星期宣錫獸樽和熏麟玉某欣逢盛旦倍劇懽悰贍太白之符豈無賀識誦秋陽之賦愧乏坡詞併凟菲儀仰祈采覽回鄉守張秘閣友白髮餘生已抱鰥夫之感雌堂雅好特貽㓜婦之詞方小人不知紀年而君子乃為善禱兢然捧戴允矣記存恭惟某官循良巨師醖藉賢牧心傳家學少通安世之書手擅文名見謂燕公之筆千里沐聲明之教一陶皆仁夀之風顧如羈蹤尤荷異眷豈寓士所至固國君之加禮抑勞民之首尤仁政之宜先欲寵綏以竹裏之庖且奬拂以花間之詠非獨門闌之私幸殆關風化之大端而某閒中聞車馬以驚猜老去任衣裳之顛倒攬迎不暇喜懼交并締觀麗以則之詩恐負愛欲生之德深藏為好時誦銷憂身隠白雲𤣥英不復出矣編傳黄石赤松儻可遇乎甚愧投珠若為報玖王正字邁枯槁餘生逢春已晩奇窮薄命任斗不神惟磨蝎所莅之宫有子卯相刑之說昌黎值之而掇謗坡老遇此以招讒而况晩生敢攀前哲或報蓬壺之巨擘特揮椽筆之長篇在常人為湯餅諛說之時而明公皆藥石苦硬之語益堅益壯如鐵漢之元城不辨不休如芻言之忠肅遂令衰懦亦或激昂然念少壯相期固將許國中間同出皆匪愛軀得非臣罪之當誅敢曰吾謀之不用今則自搔華鬢空耿丹心感劬勞之章二親已矣痛悼亡之賦隻影蕭然不復志桑矢於四方祗合旅樵漁於一壑醉鄉之酒山隂之鵝皆出君家以為僕惠矧重朌於地栗豈不勝於野薇自此哦臞軒甚富之詩與後村寡和之曲有足以樂復奚所求優游卒歲以不知生死太平而無憾笑方叔而已老安得壯身羡王喬之長存豈非仙種所願受延年之訣不敢開談命之書縮於賡酬見則愧謝鐵菴集卷十三
