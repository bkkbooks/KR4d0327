body:
  text: 鐵菴集卷三十二宋方大琮撰題跋跋敘長官遷莆事始曩見鄉人凡諸姓志墓者僉曰自光州固始來則從王氏入閩似矣又見舊姓在王氏之前者亦曰來自固始詰其説則曰固始之來有二唐光啓中王審知兄弟自固始諸同姓入閩此光啓之固始也前此晉永嘉亂林王陳鄭丘黃胡何八姓入閩亦自固始此永嘉之固始也非獨莆也凡閩人之説亦然且閩之有長材秀民舊矣借曰衣冠避地逺來豈必一處而必曰固始哉况永嘉距光啓相望五百四十餘年而來自固始前後吻合心竊疑之及觀鄭夾漈先生集謂王緒舉光夀二州以附秦宗權王潮兄弟以固始之衆從之後緒拔二州之衆南走入閩王審知因其衆以定閩中以桑梓故獨優固始人故閩人至今言氏族者皆云固始以當審知之時尚固始人其實非也然後疑始釋知凡閩人所以牽合固始之由嘉定辛巳遊宦江右有清江同姓人攜寺丞叔所辨長史自固始遷莆之非曰此寺丞客清江日所傳也因念此編不得之族長而得之他鄉其為寡陋甚矣益知長官因官于莆遂家于莆猶在唐世援據明白其為祛惑信矣敬録于前述莆方三派聚族莆之方其沠三吾長史一沠自長官始居于刺桐巷曰方巷今曰朱紫坊次房祕監在焉析為留橋為後隆為下坊為瀨溪為南門外長房員外有過潮者既歸而居後塘第三房著作居朱紫坊亦有居留橋者四房司直舊居義門闕下曰方倉五房禮部居後塘其三子侍郎光祿寺丞皆在焉蓋北自河沿諫議居東至後隆其間曰後塘曰烏石曰後埭前方綿亘不斷大抵烏石山前居其大半六房正字居後塘之觀後其散而他去者所未論此長官六子而唐長史琡之後也此外如白杜一𣲖其譜以為唐末名閥之後或傳以為長官遺腹子聞前此長官有與後塘序昭穆者更宜考如方山一𣲖析而為大松之鳯沖為山屏為叱石為伯俊今城居之東宅學前則自鳯沖出城外之上坊則自伯俊出龍井則自叱石出其他尚多皆唐泉州長史叔達之後也三𣲖之後皆以紘為逺祖雖世系昭穆莫可推要皆同出一源莆衣冠大姓不一然多與編户之姓同而有非所能雜者獨吾方姓不甚見于農工商之版其達且溫者各以家世為念而其寒者猶克保其為士人之家以待其興此所以為入閩三百餘年之貴姓而尚有望于來者記後塘福平長者八祖遺事長官金紫公唐季入莆居刺桐巷今朱紫坊之方巷是也其第五子禮部公仕于閩自方巷來卜居烏石山前之後塘蓋三子皆在焉曰侍郎曰光祿卿曰寺丞入本朝皆以子貴光祿之長子都官公為慶厯望郎乾道辛卯宅燬未復後最昌都官曾孫三十八人其尤蕃而昌者福平長者公也長者崇寧乙酉自後塘出數十步卜居後埭是時後埭四姓錯立隴西唐末滎陽廣平太平興國後吾宗少監長子保定之子以天禧後來後隆皆一二百年尺寸不遺力其中間氣脈厚而基址寬皆諸姓日所經行之地獨留以待吾福平之來豈偶然哉甫二甲子崇寧乙酉至今嵗紹定庚寅凡一百二十有六年傳世七自福平祖居一今十不啻聚族之盛視他姓過之既而後塘舊居福平長子吳左公諱愷析二子復往居焉今塘埭相望氣勢綿連接福平之慶益宏逺子孫知其植産之厚而忘其勤勞知其種德之深而忘其事迹雖知其勞與事之一二而忘其嵗月之始末及今尚可推久則浸忘之矣福平諱祐字天貺一字平國以長官稱于時嘗聞族黨長上傳為丙午生享年七十二逮嘉定辛巳龍坡藂祠再修神像于中得福平仲子白岩公諱愃捐金造像一疏父某丙午四月初一日寅時生行年六十九嵗至白岩二子和劑局南安丞年月皆具時紹興四年甲寅九月也以此推之則丙午之傳不妄而享年七十二亦誠可信是生于治平三年卒于紹興七年丁巳七月初二日又見滎陽長上道朝議公後埭諱叔元知邵武軍事道之父以女事福平垂歿以此壻單薄為念始疑其言之過近得嘉祐八年都官公五子分帳觀之僉判享年淺王氏妣創樓藏書增益先疇都官承先世遺産十貫僉判房得十之二子舍共增産十貫僉判房居十之八是本房共十千之産王氏之勤勞居多然析而為四子則漸少而二府君居次又析而與三子則益少而福平公居次往往不及千錢之産謂之薄亦宜未幾日增月益至四十千四子復倍之又聞閭巷長上道其所以得長者之名恭約而好禮嗇已而厚人髙價買産賤價易廪值嵗荒則傾囷無吝色童幼時見楓嶺故老猶能道當時最愛旁溪之清迤邐囊山之上置倉於此卜地於此施行人湯水於此每幅巾野服尚羊道傍農叟村童歡喜出迎曰長者來矣飢食寒衣病藥死棺人人滿意衲子將疏以橋宇寺宇請者無不遂其求凡得於傳説者如此今其尤足稽者廳事題梁崇寧四年乙酉嵗是自後塘遷居後埭之前年才四十延夀橋石梁方某同室人鄭氏九娘施五百貫迎仙橋石梁方某施二百貫兩橋刻石皆建炎元年丁未嵗時年六十有二林泉院題梁施五百貫紹興三年癸丑四月時年六十有八名氏與嵗月之見于碑刻者如此天慶後殿題梁三百貫囊山碑刻三百貫光孝之大藏與羅漢寺各施二百貫栖隱禪院三百貫施水菴捐錢十萬又捨菴基又置菴田雖嵗月不詳而名氏之見于題刻者如此以至崇聖繼善一帶諸剎之梵像多長者所塑又有持神主舊題相示知鄭氏甲辰五月二十七日酉時生是為治平元年共諱以四月二十七日而年不具延夀橋所謂同室云者則長者六十二之時鄭氏六十四尚存福平山歐陽四門詹集遊蜀門寄林藴詩云村步如延夀川原似福平自注云福平即余别墅莆比事云福平在郡西北二十里一名卜平則曰福平者據四平集言也之夀藏長者自卜吳左公董役斗山公諱恢奉兄命筆于庵云紹興改元辛亥臘月三日丙寅興役明年正月告成十七日己酉奉母鄭氏柩葬時長者六十有六推鄭氏之享年其在六旬有六之間乎又六年而長者下世及今九十四年合六代子孫餘二百人將千億而未艾是為前方始祖然則世之以智巧漁獵貧弱以為富者豈能有成縱暫成豈能如是之久逺哉和劑公諱萬遺稿有云十四五嵗時習讀每至已所不欲勿施于人大父輒語之曰此吾平生受用得力處小子識之嗚呼仁哉長者之言也艾軒先生集中有挽方天貺詩其一云長者雖云沒流風尚爾存宗盟修里巷家法在兒孫艾軒莆大儒以長者稱吾祖蓋取時人之所共稱之而宗盟家法之語亦以吾祖所以望後人者言之皆紀其實也長者上接纍世簪纓之傳下縯百世詩禮之澤子孫滿前督教不倦子四人吳左公有聲學校將貢不不仕而能以長兄助其父課子弟于學夾漈先生深嘉尚之端溪丞公諱衡第三子首預鄉書南安丞第十孫與長者同脈則孫十一人皆當見之紹興甲子鄉薦二又十五年己卯薦亦二遂登庚辰進士文子之祥始兆于此曾孫三十人淳熙丁酉庚子癸卯七年三詔薦者七登第二特奏一漸趨于盛矣玄孫五十三人甫十預薦大琮才品最下偶脫場屋居昆仲先而真才碩能所望以振吾宗者猶未易量也來孫八十餘人預薦者僅一二見七世孫又將詵詵矣吾輩幸為長者子孫而不知其起家之意可乎曰長者何也以其厚者言之也福平天資有厚而無薄故見之事皆然以此善其身以此延其世顧資不能皆然必學以補之孝弟忠信厚之基也講精行到宗族愛之鄉黨信之鬼神祐之薄者反是狡刻傲妬遂其偏而甚之非薄人也乃自薄其身而忘其祖惟讀書知理義者則無是患矣為其厚不為其薄其居為善人其出為名人將世世不失吾長者之本意因閲譜系既裒集長者遺事而復推明其意以示後之人方氏仕譜志閩第進士自歐陽詹始昌黎語也唐史因之然前一年有林藻矣林歐俱莆人是時莆特唐清源一屬邑耳而擢第為七閩的後百年間聨翩不絶唐季吾方氏始來值五季世士墮在偏方不得策名上國者餘四十年故方未由是選者宋興二十年矣遐陬僻壤爭相貢士以與中州之士並驅而先而莆以未克入職方獨不得貢士氣鬱甚太平興國三年陳氏奉版籍以歸莆升為郡士氣百倍預選者有人天下之視莆隱然若一大都會吾長官子孫亦可以備淬礪振作出為世用矣獨以廟學未立無師承為郡缺典祕監之子儀以布衣間關萬里俯伏闕下慷慨上書名震京師咸平改元有詔立學儀傾家資以助族人從之者翕然河南士之氣始吐二年儀與弟能從子謹言始克舉茂才京師復拜疏于朝請廓其址京人曰此向之伏闕請立學者而今復與其弟姪俱來矣三年學成河南士之氣始張儀遂以是年與謹言連名擢太常第豪傑之士雖無學校猶興夫豈不能自奮收一第而切切于立學如營私計其愛邦人子弟深矣則莆之有學自吾方氏始太平興國後郡擢第者間一二見然未有登甲科者謹言一舉中的越再詔謹從躡之昆仲俱以甲選為莆唱邦人榮之莆之視方隱然若一藩屏儀止于著作而學宫之祠與郡相終始謹言尚羊諫垣風裁凛凛謹從標表學館遍儀清貫聲名翕翕明道景祐間遂與中州名臣抗衡而天下知有長官子孫矣方之入莆始鬱于五季復隔于陳氏懷才抱藝而弗克逞以至學成之後是惟無出出則聨翔而髙擢焜耀海內之聽聞嗣是橫飛捷出合力鏖戰策勛上都他邦斂袂亞殿魁者有人奏賦為南宫髙選者有人或通榜而兩三人者難更僕數參錯鵷行盤旋要路不特以科第自見或以政聲聞或以德望著或以文章傳或以名節顯人人奮勵各求以勒名青史自垂于不朽蓋不徒以進士一途也猗歟休哉吾大父和劑公以一經名堂實藏書萬卷謂姓名漫漶弗紀將軼立仕版于堂楣以進士標其首特奏次之世賞又次之封贈又次之髙伯祖嶽陽使君擴為之記深以磨淬望後來蓋紹興二十八年戊寅也版成之二年而大父策名其間版載登仕籍者百二十一人距今五十年來彬彬輩出版溢久矣來者無以容欲更而大之爰取而列之譜系之後既首擢吾祖所以擢第之由復推廣伯祖所以責望之意吾祖積善植德以詒子孫餘三百年詩書有種公侯有種本厚根深其發暢也易然不學不足以承之則與稊稗何以異暴棄枯燥為不肖子而失其所以種後來戒乎哉雖然學者何記誦多而已乎詞藝精而已乎科第華其身而已乎要必基以忠孝充以器識自其師友講習無非君民事業則其出也光明俊偉為國家聞人而後不負所以學後來勉乎哉必如是而後足為長官子孫跋建陽趙宰羅源常寧二譜余逐于朝過建之建陽野無遊民問其大夫曰趙君也至其室無留訟意其必有竒策他巧與之語平易近人而已何其局之熟而政之不煩也出福之羅源衡之常寧二譜相示羅源三年拊海濱氓有恩常寧又三年拊定洞氓益有恩至建陽則三為尹矣其熟而不煩也固宜縣與民最親更兩縣乃入倅國朝成法也今須入雖三年而資序之説猶不廢若滿選人令者再則班改後免須入又近例也士大夫指邑為債為湯火有始入縣齋粘每嵗之月于壁了一月則勾去一月惟恐脫之不速也君非再滿選令應可免之例乎可免而不求免非癡乎其必有以也世以縣為畏途畏愈甚者脫愈欲速心公而政平又以其勤苦者為之惻怛者感之民亦豈忍以其不肖者應之何畏焉此君之所以不憚煩也此非一朝之力也孔門使弟子宰猶曰比及三年可使足民曰及者幾及之謂也曰可者僅可之謂也今須入之法浸壞有班下營遷者有甫至官改辟者古惟彭澤八十餘日解去若密令數年後化益行其久可知今人衒才舞智于俄頃間謂足以見長奚以久勞為其去為靖節乎余未之見也其才有過孔門之髙弟乎有過褒德侯乎余未之見也其伸君者非久乎雖以久而伸亦以久而屈君之屈民之伸也民伸矣君之志亦伸矣其屈者外物耳必將有伸之者余年二十負笈道建陽白首往還歷三紀所聞見十六七令曩在江西見西山先生稱行之儲君不去口近余友潛夫劉君去邑老稚擁車不使去至今經過猶然則民之應之者何如亦西山所亟稱也君慕二賢者惜不遇西山品題而余何足以定之故表其久而伸者以愧世之不安于令者或曰子不及三年乎余兩試邑皆年餘以憂去每恨親民之志未遂既免喪詣銓曹謂成資後惟以理去者可免不聽然則君之得伸其志於民余所愧也亦所羡也嘉熙元年九月二十日莆田方某書于雙溪閣跋杜正甫藏西山帖西山先生學問道德為百世師而性雅不喜書然其片詞半札為世珍愛如是學者倘因是而有所感激焉則周程燈印思所接續若唐碑晉帖束置髙閣可也余于是有以知正甫矣淳祐新元辛丑春中後五日書跋朱文公二帖余久聞覺軒蔡君名至建安屢遣幣迎之不果來今夏有行役過其廬花木泉石幽間恬靜俯仰久之嘆曰為文公先生學篤信力行三世不墜者獨此一家耳既又得敬觀先生所與二帖可以想見一時師友親厚之意覺軒岐嶷夙成有受道之質也今年過五十氣貌溫雅悉屏萬事沈酣師書隱几面壁而怡然自得意有出于世味之外是真有進于所謂覺者可敬也淳祐初元至日莆田方某敬書鐵菴集卷三十二
