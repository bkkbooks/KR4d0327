body:
  text: 鐵菴集卷三十四宋方大琮撰祭文祭江西吕運管代昔余兄弟從游太史講道麗澤聚四方士觀其雁行一團和氣有質難處辨論迭起吕氏之學有本如是太史謂豫體用必備余謹受教迂無所試晚落江外見其季氏如見先生感慨且喜遺言緒論相與追記人謂余幕有賢君子持論平允不激不詭毗贊居多物隂被賜使自展布有大于此八世相門緝熙未墜君方來時日哭其弟半載而强君又逝矣失此佽助出涕彈指舟楫將行我則經紀兒能勉學君則不死四十餘年師友之誼感今懷舊西風一時祭裘司直嗚呼利名世梏稚耽耄馳性命天道棄擲如遺君自初筮早值師資懸悟獨醒已大物微貌古而癯氣和且夷疆里方寸辨析毫釐筍班數月治鳯來儀夢懷西山九牛莫追出入幕中為親少縻色養已矣琴有餘悲君雖誓墓我欲勵時護閫有守招以卑辭知有薦稿入闉故遲報墨未乾斯人已矣鳴呼天之生材成者實希可激薄俗何必仕為彼逐逐者知乎不知為邦惜賢聊敬一巵祭張帳幹嗚呼淳熙壬辰奏賦明光東浙名輩也幼誦其文晚見其子西江同宷也去秋戾止逢迎南浦風神炯炯也入今秋來告病雖數畫諾不倦也南迓使指東餞戎乘尚能力疾也藥裹之餘臨楸對僧劇談自若也夫何髙枕四日拂袖千古治命了然也當貴之年遽棄軒冕惸然孤兒誰其諄諄也棺衾備矣舟楫具矣霜露嚴凝靈兮何之也吉治雞絮寫此惻怛屋梁顔色涕泗漣洏不可遏也祭瑞倅十五叔公嗚呼叔祖稟資之豐潤器宇之崢嶸問學議論之該博材具業履之粹明六仕州縣所至有聲此縉紳之所共敬而鄉里之所羡榮然若有憾者皓首執卷日督課程四上春官而場屋之願未伸倅還兩年休息無營衆勉一出行行及京而疾錮之不容闖一武于帝城朝家念閩重困鹽征孰曉本末鄉都司以公稱嗚呼三十年湮沈未有拈出其姓名一旦徹廟堂之聽意自此升而大數限之不獲獻一策于欽翹之庭此朝紳之所共惜而鄉閭之所歎驚然無足憾者官不昌茍微有及民則為不虛其生夀不永茍不失本心則為能全其身雖不能壓韋布而雄雖不能取一障而乘彼外物奚足為重輕某以祖德族緒為念者儀曹四孫枝四百而贏固宜交奮力扶簮纓前嵗哭徽倅叔去年哭揭陽兄今哭叔祖連嵗凡三人去春公任者一今春一上南宫而猶有望于臚唱之三英所失者漸通顯所補者甫萌芽某猶有為叔祖幸者二千里外携子以行湯藥必嘗棺衾必誠而倉卒治具又有偶聚宗黨之敬承某昨問疾時曰恃汝無恐顧綿力之未能舟輿告行涓吉發津護視惟謹靈爽安寧陳薄奠以語訣遡西風而涕零祭亡室林宜人嗚呼往嵗玉融親迎同歸三十二年辛勤百罹余周旋倫紀恐力有所遺也而庭闈恱伯季怡助餕交賓拊幼接卑君佐之無不粗如彛余世故濶疏俾不以攪于思也而婚與嫁不失時數椽可棲數畝雖儉嵗可無飢非君力而誰然則世之以婦職稱者君何多于得而優于為雖多且優勞亦如之暇則談其大父簡肅懿事歷歷不遺或隨所遇若相感發不敢墮節而失枝則又余之益友良規也客京四年覘豫色詞見遷不喜曰此危機去年卧牀寸步不移猝聞火變能跣而馳痛定語余歸哉毋疑秋末冬來恰亦一朞病日居多或時從容與家人辭非獨兒婦女壻之團欒而族戚鄰里俱在兹終于首丘豈不勝于京師逝者無憾其如存者之悲初君之歸余也俱全無故其樂熙熙十六年間天傾地陷手摧足披所恃以娛余老惟君是依曾謂生齊而去相違余亦何樂于斯世顧影而嗟咨經營同穴自有道者視之孰速孰遲呼演子而來前汝母不能及中夀之期而起家植立之勞與種德深厚之澤所以遺汝者不可不知茍知而不忘又將以語汝後之人靈其勿吐此巵祭嫂陳恭人中興盛際為乾為淳正獻名相簡肅名卿道同志合匪徒襟姻兩家諸孫禮法繩繩議幕早孤靈兮來賓事姑巾帨祭先蘩蘋克相君子敬睦儉仁朱幡油幢于湘于京廉取舊物將錦還閩鸞影遽虧肅持户庭子之能仕期以祿迎世念雲薄何恙忽傾亦既希夀華腴鮮倫曷不期頤留此典刑開禧丙寅余壻福清拜夫人聶洎令人陳年運而往猶一輩人表裏齊眉過從春溫晚嵗哭婦又哭婦兄有來素軒以賢淑稱過建訴哀至莆乞銘余入嶺久安書來頻亦聞慶夀誕日小春方圗走介俄焉訃臨眼閲三世獨餘老身緘詞一酹感舊愴新歸田屢請束裝俟征還舍少定百里為程匍匐弔孤或預紼旌靈其鑒之語與涕零祭子長弟嗚呼子長古之人十五入大學逾一年而天府登名見謂早竒四十曰强仕又四年而策名廣廷未為甚遲五十曰服政正頡頏華途發紓學業之時羊城一都㑹臺閫之立如鼎官僚之布如棊子居其間上敬中協而下亦以為宜嗚呼子長好善為恱進德不渝氣和無迫促之狀貌澤非衰落之姿距希嵗猶二十縱不少延胡遽至斯嗚呼子長入京轉費于四戰入嶺僅及于再朞料檢行囊自嫁女外無遺舊書一橱半子見之留斯種也少亦足百年之貽耕父田而讀父書勉哉兩兒有婦有妹足以寬譬母慈此非子所不如早歸再酹東送涕泪交頤鐵菴集卷三十四
