body:
  text: 鐵菴集巻三十三宋方大琮撰祝文將樂謁先聖民社之難其寄在聖門已然矣某以至拙之才而治不易為之邑然學道愛人吾儒根本時異勢殊要之此心不可一日忘也茍銖寸及人庶幾無負吾先聖之訓赤松凌虛真君邑之秀在玉華真君位焉相傳為神農雨師靈祐公宰斯邑有禱必應今並列閣上邑人飲食必祝某才凉徳薄不敢私禱于祠下願雨暘時若毋替相斯民之意則令與拜賜靈祐公令斯邑者不知幾人惟公血食不替遂為一邑司命生息以蕃雨暘以時其愛斯民至矣某不才踵遺躅于百七十年之後方將求庇于公敢不體公愛民之意蒼龍廟邑治之東偏鹽庾在焉而神實位其中夫豈無意邑以鹽為命輦運欲其速厫積欲其富場竈欲其泄三者如意則邑立矣邑立則神其永血食矣土地某披覽圖志祠與縣治同經始且據邑山髙處今又與縣治俱鼎新某迎親就養于此舉首見祠必起敬焉神之庇邑人固矣願庇令之親以及其身與其家令豈敢忘報謁龜山墓漢儒近道仲舒一人過其墳者猶下馬况先生程門顔閔唱道東南特起于百世之下某至之日拜遺像于學之舊廬又將訪求讀書之精舍兹又偕其僚洎先生之孫與鄉之大夫士拜于松楸嗚呼道公一世先生之書家藏户誦而邑中人民咸曰吾東家夫子也往往其接舊聞也熟玩是書專其感發必有深焉者如是先生其舉斯斚縣學安奉八先生祠濂溪明道伊川龜山了齋豫章延平晦菴後孟子千四百年明道闡其端伊洛𢎞其源至武夷而其教益宣脉絡其間者劒津之諸賢責沈之作遵堯之錄靜一之數無非衍斯文之緒當全盛際見稱于洛學者有矣道南之語獨在吾鏞川中興後巍然特存所留以紹前啓後當歸之天蕞爾邑而百世師出焉是用推原其本統詮次其宗𣲖祠學宫而告䖍噫道一也山川如昨人物依然登其堂者尚其勉旃毋徒曰瞻遺像而讀遺編告都官祖享亭成曰莆甲族靈隠為冠惟公支𣲖居其大半景徳甲科慶厯郎闈發源浩渺流衍固宜騎鯨仙游將三甲子宰木參天山川雄峙中更重和妥祀建亭百有餘年凛焉欲傾撒而新之屋拆椽换重掲華扁晶采壯觀漕翔一鶚里貢三賓合戰南宫興者七人敢告亭成適與捷㑹發揮先業勇氣百倍簮紳濟濟羅拜松阡六代枝孫咸在眼前祖徳淵深先靈發越相爾後昆固無窮歇毋斷書種毋忝家聲審能如是九原用歆聚俗告都官福平二祖吾祖以學起家毎詔若鄉若漕不絶書而試于胄者有時今合國胄之秀通榜儉于百而聲律之首經之亞崢嶸其閒則金紫祖之後十不啻以逺方抗衡上國遂為朝紳之冠都官祖之後居其七福平祖之後又七之四曰大珪曰大鈞曰辰孫曰演孫皆新國子進士福平種徳尤厚來者襲慶决科自紹興之庚辰十八年而為淳熙之戊戌又六年而為甲辰則稍密矣又二十二年而為開禧之乙丑則稍疎矣中間之疎尤甚三十年為一世彈冠于朝觀光于國既鳩胄之英又將集鄉與漕之竒羣凑翕聚蘭省楓庭聨翩策名則今之密可補前之疎矣某綴班有守俾弟大瑄聚俗以告惟吾祖考克相其成仁山告后土城南十里有山曰仁局勢雄偉環合秀崪昔者胡為祕藏幾春問之里老野燒成形前此清晝如聞鉦聲或時異光照于郊坰厥有識者來獻山經自乾發祖向丙坐壬内外位置合卦與星去冬破土巨石塞門今冬始壙又如盤根幾難著力䖍禱爾神若或相之可移可平厥土五色又如金凝燥温堅密允矣佳城昔𦵏先君其里喜成日温于玉圖䜟足慿今兹有告暗合黙徴其書有云展翼大鵬安穴于頂金籠前横審如所言將相公卿姑寘勿言既𦵏宜人茍藏者固斯存者寧呵䕶保佑多謝山靈種徳新庵拜福平長者祠維公生于治平歿于紹興積善好施以長者稱楓嶺之秀方坡之清尤于其間若有夙因下為倉宇上卜佳城創庵嶺巔置田供僧屋後有山種松采薪來者憩飲毋渇于行故老相傳記其平生毎策驢出野服樵巾長者至矣歡喜相迎發廪捐金療疾賑貧造橋砌路芳跡不冺餘二甲子屋老欲傾振而新之是在後人自唐長史洎于幙賓六世簮紱紹者彬彬公與其父獨若隠淪耕耨心田大培厥根種徳之報不在其身甫一傳後聨翩策名五世其昌蓄久發宏艾軒詩在家法宗盟後裔謹之毋替其承相彼庵址移東創新以引以翼有垣有亭憧憧往來讚歎同聲庵故有祠楹桷告成孫曽羅拜涓吉妥靈遺愛勿諼宛其儀刑掬水寒泉千年之春辭方廣禮部及諸墳某拜命之旬日從吏數輩至與雷陽使君兄孺良從長上帥子弟謁靈隠山金紫公墓下又三日謁方廣山山以方名舊矣儀曹公來宅九跳之正脉面勢宏濶從而祔者五代此某之宗𣲖也每代之中昭穆相從凡四十餘周官族墳墓之說吕氏深有取焉此山宜與婺之明招等祭亭半圮寳闕間髙安别乘叔祖復創新之于是拜跪飲餕有所矣尤可喜者聚俗亦然烏石山前連甍接棟無一散去者孫枝最蕃登桂籍將六十儀曹房不啻半為金紫六房之冠靈隠首占山川之勝方廣接之尤有力殆與長者之功相稱諸公有持鄉者某始漕于此父老有喜色况上世松楸乎先靈森布其交舉此觴其隂有以相之俾無負父老之望辭曾祖柏岩宣義墳嘗讀元祐七年十二月范内翰奏疏郊見之夕景氣清霽福應嚮荅都人懽呼謂前未見宣付史館此本朝極盛時也而柏岩公生于是月之八日又二十一日而太孺人生天作之合家道日昌教二子以書縣丞入仕和劑擢第柏岩已不及見太孺人膺初封享上夀而承重者孫耳每見先君大夫具言二父揚顯之志未遂若有望于其後者某頃登西省以言事去兹起臨鄉部其敢為門户羞告别墓下尚祈隂相辭祖南澣和劑墳長者之後以詩書發身自大父始以大父之學識該博二十九乃登科僅年餘不克享若某之樸訥迂拙餘二十續世科最鈍矣猶侍玉皇香案既退矣猶持漕節按鄉部種于前而穫于後不于其身于其孫大父所未及為者豈徒官職云哉發揚先志俾毋為門户羞為父老羞其尚克隂相之燎黄癸巳考贈通直某等幼學壯行中年通籍親顔有喜庶幾封渥與年俱髙曾謂前日之封遂為後日之贈乎乃庚寅季秋明禋大賚凢官升于朝者皆得追榮其親某以皇考為請明年春告甫至皇妣又棄諸孤某等抱痛終天重以稽留詔命為懼兹既即告敬焚黄墓下俛焉想慕音容如昨泉壤之光自今伊始曷報君親教忠訓在甲午考贈朝奉往嘉泰壬戌先君携二子入京試不偶開禧乙丑又携以試禮闈既偕仕以親年該初封覃慶再封合請也自是必升朝乃得請封與贈各一某請也皇上頒祭澤之四某乃得與弟某合詞以請稍酬疇昔並携之意非幸歟贈之秩以二合則三之非又幸歟先君夀踰希嵗及今猶可存曷不使某等捧觴堂上而燎黄墓下非恨歟五六年趨調者再三十年前趨試者再兄弟皆同昔侍先君而同今以免喪而同感念嗚咽非又恨歟某留綴朝武某歸需邑次併告以謝忠孝相勉能不沒其親之名則不徒拜君之賜庶幾幸者侈而恨者釋丙申考贈朝請郎告廟某嘉定乙亥侍先君入修門既得缺將行先君慨然曰吾能復入此乎某知先志之有在也前春登班感念斯言兹以遺補執事合宫導引齋恪既沾澤以贈典請可謂榮矣追憶二十年前語益用愴然斧封在逺尚阻告焚先白于廟尚饗戊戌告墓前秋之季綴邇班行明禋禮成考妣加贈葢嘗白于廟遐贍松楸神往未遂嗣以言去罪大責輕幾無顔見墓下上恩深厚畀以真祠遂得躬行三獻之儀敬燎兩通之誥考妣其嘉享之庚子考贈朝散大夫國家肆頒祭澤許臣子追榮其親者中外無間夫君三封五贈而為大夫去秋之請猶奉祠日也告第甫至適有鄉漕之命迓從儀物足以將事于是恭奉誥命敬燎墓下人以為丘隴之榮獨念忠恵蔡公以便二親為此官以恱民者恱其親某亦人子也曷報罔極之恩將以二十一日視印即行職在咨諏敢不究厥心以無忝于前修無負于先訓壬寅考贈奉直大夫妣贈恭人先君篤愛同氣慶元丙辰張别駕赴潮女兄邀以俱至則女弟以薛南海赴告冐炎暑取孀孤先妣聞之驚語諸子得毋深入否既出嶺先君曰誼不容己也後四十六年春不肖孤䝉恩移鎮感念舊事悵甚不獲以帥守祿養乃季秋祭澤行先君登六品之正先妣升八號之半君貺與親恩俱隆敢不益思所以報効用先告于行廟而焚黄則有待焉亡室贈恭人與君同甘苦㳺州縣歴班行甫三封下世之二年某使閩又二年鎮廣皆奉主以行明禋沛澤由宜而恭豈不足慶非封而贈尚其永懐婦人從夫爵此贈之始也有以知君之素志敢先告于廟演受將仕郎告廟孫具位兹以子被受將仕郎誥命敢昭告于家廟先世入本朝以儒起家延賞最盛自諫議始厥後班班有之福平長者種徳深厚代收科級而上封下延乃自某始積善之慶方此流衍教忠之訓毋敢失墜謹以酒果用伸䖍告演受將仕郎告室人夫具位兹以子被受將仕郎誥命敬告于亡室宜人贈恭人林氏十娘追惟平生鍾愛一子策名仕版于此權輿使及見之豈不慰意慈訓如在俾奉周旋謹以酒果用伸䖍告西山玉隆宫祈雨鍾陵千里之地時乃愆陽玉隆萬夀之宫邦之司命素稱妙濟敢控微衷臣再至南昌適逢東作雖社節播種幸得雨之應期然土脉久乾甫逾旬而告病飭羽流而演法慿神力以籲天伏願連日為霖俾前功之不廢成雲荷鍤幸卒嵗之可期袁州行司祈雨秋陽久暴驚赤地之如焚晚稼垂枯籲蒼天而有請葢髙非逺大叫祈憐伏念臣所部十一州維時七八月緑雲變稿嗟三農望霓之可傷白露過期更數日不雨則難救民病孔亟吏責奚逃陳菲薦于公堂控微衷于大造伏願鑒其迫切錫以滂沱轉旱嵗為三登使禾盡起茍吾民得一飽輓粟何憂謝雨送許真君火老三辰之次亢旱如焚玉隆萬夀之居為民司命屈臨公宇祈沛甘霖望膚寸以難成詞再三而欲竭心乎黙禱慿祝史以無庸人所弗聞荷髙真之垂聴隂雲俄合膏澤溥沾非薄徳所能感通葢此邦自䝉矜惻仙歸漸逺物望未休仰止西山馳精神而俱到洎于南畝願優渥之無遺謝雨送聖水以風雨名池而龍實神之此非池中物也必有以推其溥施之功而驗其變化之妙今兹秋陽為沴乞靈祠下一勺之水當為彌天之澤曽謂少蘇枯槁即歸靈湫而遂止乎尚祈不嗇其出不倦共施俾沛然霑足以滿農之望慰吏之懇以無負池之名與龍之實城下龍王廟自去秋及今龍澤之潛乆矣土人以社節為播種之始是日雷雨大作奮躍天衢必有妙于變化者種漸入土若繼此霑洽則不至再凟神聰今乃土脉槁而烈日燥之雲欲合而狂風散之方欲雨未雨之時偶振其蟄而神其化則一呼吸間四澤皆滿農用之不竭矣吏與民望神之切如此神其克恵相之戊子諭合屬祈福魁星堂啓運聚奎文明之象咸平龍首著為圖狀有赫光芒久臨莆壤靈祠新妥逢掖宗仰郡入職方甲科誰唱大諫都官二祖振響自時厥後魁亞相望福平種德五世昌王秋試春闈多列前鞅猶有待者占人頭上踏槐鏖戰叔侄輩行所期聨翩鼔勇西向羅拜英躔庶其隂相龍浦廟聚族于神之境者我福平祖距今方五世甲子再周而人物視他姓為最稠非神庇而何事神如父母敢布其詳由一祖之身始傳而貢于鄉者四而中等者一又三傳而貢者七中等視前倍之四傳而貢者甫十而中等者甫一今試者僅可數而鄉評之所推者亦欲束矣傳至於五孫枝人物日以加多則科名宜亦如之則糾合長少奮其鋭氣聨翩策名以慰宗人之望以稱福平所期來者之意伐鼓飲衆庸拜神休籍桂堂科名夙定神物司之祠宇肇新士勇倍甚合吾莆而通者幾及百人數靈之一枝餘五十輩是亦盛矣猶有望焉某等𣲖出福平聚居垕埭勇赴飛龍之㑹須由薦鶚而升㸃朱衣之頭尚祈隂助潤黄榜之墨願續世科青詞將樂上元祈福千室之邑為宰甫爾臨民一年之計在春兹焉祈福吉蠲公宇寅叩髙穹伏念臣某材實非長縣名曰樂雖竊庭闈之養所期田野之蘇諭獷俗以無爭念疲氓之欲逸撫字勉殫于心力順從全仰于天時百穀阜蕃享耕耨斂藏之利三農輯睦無水火疾疫之虞為母太安人保安小人有母不勝喜懼之情大徳曰生敢覬和平之福敬殫誠赤仰叩圓清伏念臣母甫踰希嵗之三曾忝命封之一夙懐淡志蔬素之日居多晚失齊眉涕淚之痕猶在行將服政仍恐運竒屬兹元正禱于洪禧晚景曲䝉于庇祐謝忱敢忽于潔蠲伏願俯憐丹衷革去宿愆老軀長健更祈多筭之増祿養未忘早遂兩兒之願伯四一致政保安人情莫不欲夀善願所同天徳之大曰生老身何幸實踰素望敬瀝丹衷伏念臣某紹興遺民寳慶初命女累多而幸皆得壻男息晚而今亦抱孫得延殘喘以至今辰由曾祖再傳之後非不衆多啟髙年八袠之祥聿自臣始步行未至于扶杖目力猶能以細書何徳以堪知恩所自兹縁誕日仰荅髙真伏祈仁慈更畀康健力行善事付兩兒以家政之傳繼今餘生微一日非造物之賜新居設醮半生辛勤幸有此屋上帝隂隲克相攸居伏念臣某弟兄相勉以起家志念豈遑于問舍縁祖廬之團聚無所棲蹤奉父命以經營皆依序族實始意之未到由洪造之曲成勉力所難姑先堂宇興工之頃恐犯方隅將以爰居敢忘昭謝願同家室長承孟母之懽更冀子孫益大于門之慶永福上元祈福百里之民繫命自愧非才一年之計在春喜逢錫福吉蠲公宇寅叩髙穹伏念臣某猥試窮山來當荒嵗飢氓垂殞而復活隣兵雖逞而無虞匪曰人謀實邀天幸嵗華更始物意向榮念蓋藏之不殷凛艱食之為慮必舳艫逺輳以寛春夏貴糴之急必玉燭時和以成秋冬上熟之期是則四民安康百變消弭全賴髙真之垂佑敬修菲薦以控陳拙令微忱乞遂邑人之願小臣深悃更期國祚之寧庶使邇遐均䝉䕶庇六十弟薦父黄籙身嬰降割可勝失父之悲教許追亡敢控籲天之痛伏念臣父某當叨封命幸享髙齡備歴門户之艱多償兒女之債八十三年之塵世寧免愆尤五千餘言之𤣥笈曲賜拯拔訴蒼旻而上奏冀肸蠁以能通道力大藏招幽魂于既散精靈不昧認故宇以來歸選姪薦父黄籙丱角罔知傷哉無父叩頭有請痛甚籲天俯瀝卑悰仰祈穹聴伏念臣父既愚且拙惟儉與勤暗室自持鮮蹈城闉之跡野疇稍闢克推父祖之心每言得子之嵗遲猶覬處躬之晚佚詎期一夕遂棄二孤大徳莫酬于百年𤣥科敬演于三日伏望上蒼降鑒列聖垂慈憫塵世之多愆悉從蠲祓照靈臺之一㸃俾遂逍遥㕔事成設醮君恩未報奚敢顧家父志不忘用成作室計數椽之經始逾一紀而僅全兹豈人為端由天造伏念臣某自知材下幸接慶餘堂寢所以庇身居廬急先㕔事力未之能所以㑹族莅邑再試而日不多登朝屢遷而祿僅給輒因暇日爰繼前修未免稱貸為之其歴辛勤甚矣吉蠲新宇仰荅洪恩伏願髙穹垂仁列聖昭鑒鐵菴集巻三十三
