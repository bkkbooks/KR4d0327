body:
  text: 鐵菴集卷三宋方大琮撰西掖奏議繳奏董琳差知滁州録黃臣切惟疆場多事武夫典城權也使其勇足以保境智足以衛民雖奴如季布僕如衛青用之無害也若董琳則厮𨽻中之號為無能者依人濟事驟致富貴但能掠奪資財以媚舊閫奴顔也選造語言以間兩帥奴唇也去嵗求制檄入閩欲以沐猴之狀夸閭里而凌轢之猶曰小人無知耳其實害及民則多招無賴劫奪民舟而三山之人思食其肉所過海郡公肆剽掠而四民之城幾至晝閉蓋其假挾聲威蹈藉貧下真奴才也昔制臣嘗數其罪矣又臺臣嘗暴其惡矣今滁之為郡最關風教使得素有氣節稍識義理者守之猶庶幾效死勿去之意如琳之間兩帥則不知有主擾平民則不知有鄉而望之以死封疆衛社稷萬無是也以歐陽修所臨之郡不幸而使腥臊鋒鏑者掛名其下又不幸而使庸奴如琳者繼之豈不重可歎哉欲望睿慈將琳寢罷新命姑仍本職别選材智以保滁城不勝邊方之幸所有録黃臣未敢書行繳奏户部侍郎權兵部尚書兼知臨安府浙西安撫使趙與歡奏火災乞削奪竄斥奉聖㫖依纍降指揮不得再有陳請録黃臣聞有大變故必有大懲創有大懲創必有大更張本朝以火德王建炎中移蹕錢塘當其盛時七十餘年行都熙洽土氣尚厚火性亦順其久也功化薄而明與昌寢不及齒聚蕃而華與僞交相蹙先皇登位八年而有嘉泰辛酉之災蓋一焦土矣既而不復災陛下亦八年而有紹定辛卯之災又一焦土矣豈容更復災改元嘉熙議者欲以扶炎運之隆而失性轉甚乃夏五月延燎之家四萬七千有奇而邸第官舍營寨寺觀不與焉暴露之民為口二十九萬三千有奇而斃於虐熖者不與焉辛卯距辛酉猶三十年民漸忘其塗炭之苦矣今夏距辛卯秋才六年耳創尚新痛未定何以又堪此禍市三日哭不足紓哀力薄氣焦地幾不勝戰矣此識者所素憂而言之今尤岌岌焉凡闤闠之區冨饒之室哀邑所密恃以為緩急根本者一炬不留豈不貽識者之憂乎豈不烈於辛卯之禍乎此正陛下深自悔艾尅責之日也避殿之禮求言之典賑恤之政無不舉行辛卯故實獨未聞有大舉措有大施為足以慰答人心過於辛卯者曩權相之與輔弼猶知自為貶等殿步之與帥漕猶皆一切易置今月且半矣晏然無以異於常時但聞大臣纍疏避位帥臣纍章待罪今日曰不允明日曰不得再有陳請而已不惟不加罪而彈壓與扈衛之臣亦得同宰士樞掾並賜金焉其說不過曰禍雖烈於前而太室無恙也然則彼四萬七千餘家何辜焉孟軻曰民為貴社稷次之非民則廟社何所依而存此聖賢分明條貫也少知此義者亦可以愧矣辛卯帥臣林介罷曰謝太室也辛酉帥臣趙善堅罷時太室亦無恙蓋謝百姓也三紀之間火災者三其二易帥此先朝與今日的切證例也今何禍不然況其禍比辛卯尤烈少知此證者亦可惕矣故臣於與歡待罪之章見其懇切至到未嘗不嘆帥臣之能知恥而惜朝廷之不知權也與歡頗亦潔修疏財輕施人所共之不幸而遇非常之變抗疏自劾至於再三今轉徙之民敢於怨怒驚擾之衆易以動搖必須精神奮發規慮周密有以鎮壓其心作新其耳目而强誘之欲去未能之身難矣臣愚望聖慈速賜區處勉從所請俾還槖班亦少見重民所以重廟社之意毋使或者謂懲創更張不惟不能過於前而反有不及者乎當使凡為臣子者皆宜引咎知恥況其責有大於帥臣者乎以隆尊綦貴猶深挹厚損方汲汲焉修實德行實政之不暇匪徒曰惔一憂心足以懼災也出一善言足以退舍也若燮調之地尤責望所叢更迭出關旋入治事一表一答至三即休夫既寂然略無施行毋怪觀者指為禮數何以回天譴何以塞民怨恐非止禍之道臣日侍威顔目覩災變救時無策愧見都人亦當在削奪竄斥之科席藁俟誅不勝隕越所有録黃臣未敢書行繳奏御筆李子道鄒雲從應詔論事文理可采並特補將侍郎録黃臣聞有言遜志必求諸非道有言逆心必求諸道伊尹為萬世人君立聽言之法惟此二語蓋人言交至之初熟不喜順而惡違然而未遽喜也未遽惡也必歸而求之道則順者未必愛我而違者未必非愛我也乃至五壬申癸酉災京邑半燬求言有詔謀及臣民亦足見陛下側身修行舍已從人之盛德矣扣閽不知其幾人獻策不知其幾說但聞有所謂臨安府類申學生李子道廣南額外攝官鄒雲從者特勤宸禮拔之衆中授以初命中外愕眙欲見二書不可得比數日來傳者始謂子道有援引齊唐之說雲從有假借春秋之說道路之言或得以竊窺聖意而愚臣臆度以為淵鑒精明必不出此也自唐人以家事何預外人之語遏絶人言醖成禍本本朝家法正大明白户庭之事與衆公之議濮園之爭請立國本之疏國史班班可覆也恭惟陛下以藝祖之子孫受寧考之付託薄海內外悉主悉臣十有四年于兹蓋天命之有歸人心之共戴也若夫一宗藩之淪謝使蚤出聖衷稍為經紀不過一常事耳奚至人言紛紛不已遂為今日一大議論彼頴封人田寖郎以片語感悟曷嘗費辭哉此亦羣臣之罪也閭閻小民其有家道浸衰病證交急必反思內省冥冥之中得無猶有愧負者乎醫藥之外不廢悔改愛家全身之道不得不然況國乎本朝以忠厚立國富强不及前代雖變故間興而綿綿不絶所恃者天也今之未盡合乎天者此特其一耳議者謂此事既舉立可回天立可弭禍或指以為儒生之談然置此不問於人理終有缺缺恐天亦未易回而禍亦未遽弭也故臣以為兵弱而土蹙財匱而國貧將帥乏而人材衰歇皆今日大患所當上下日夜相與汲汲圖之然亦宜舉措服人心修為合天理真意實德既無一虧少於其內而復閫鉞之臣介胄之士得以殫智竭勞於其外上天悔禍宗社垂祐守固戰克而和可成兵息費省而國為吾國矣內之修外之助也采薇治外遣戍勞役是也天保治內大率皆人倫事君臣兄弟朋友何與昆夷玁狁古人豈若是之迂哉孔孟以來儒者所以舌腐唇敝以植世教而扶世治者亦只此方法自夫論事而不論理計利害而不計是非設為危險之言陰肆脅持之術其始皆左右憸人耳今縉紳大夫或有從而和之若天人不相關而內外不相為謀者聖賢救世之防始決於此豈不可懼世豈有理外之事是非外之利害哉今之窒礙特一關耳此關一透疏明洞達友愛復還天必悅人必服繇此漸弭諸禍豈復更生一疑是則真善計利害者豈若常人淺淺之計帝王之見與常人之見不同此臣所以深有望於陛下也昨者剽聞陛下嘗許大臣以改營其宅兆矣災變條來事及未舉羣臣不能紓徐將順言之或傷乎激遂使異論創興而窶人寒士揣摩以希必合恐喝以覬必聽彼豈真知陛下友睦之本心哉今反從而官之是本心終無以自明於天下矣若以本彼為真愛己也則向者德秀諸臣之愛君曽二人之不若歟廣謀從衆善鈞從衆通國之人亦衆矣豈有通國誤陛下而二人獨為愛歟然則聽其言之違順孰若求其道之是非也當章憲太后垂簾時有方仲弓者乞立劉氏七廟后擲其奏於地曰不作此負宗祖事當濮議既定後有范亦顔者復唱稱親之說神祖出其疏命講讀官斷之於是言者論其矯誣經義緣飾姦言當岐王尚居禁中之日有章辟光者請出王於外神祖批示中書曰辟光小人離間至親而中丞吕誨乞以其疏付外治罪此三小臣者不過妄揣上意以規富貴耳而祖宗篤叙倫紀不為姦險動搖且以所言質之公論或監逺州稅或降下縣尉求合而忤求升而黜然後見列聖之威斷過人且又見清朝之名器不可詭謀取也彼已仕者猶抑之不使進而況未仕者欲挾邪以徼幸得乎今邊方孔棘戰士暴露聞有妄男子以迎合得官之易緩急之際將有諉甲於鶴者矣臣愚欲望睿慈深入聖慮亟收一扎明出二書付之外庭參定可否果議論之無取豈爵命之可輕庶足杜冒濫之萌抑亦絶姦回之漸臣自知方命屢觸雷霆獨有寸忠可白天日茍以愛君而獲罪則雖九殞而不辭所有録黃臣未敢書行鐵菴集卷三
