body:
  text: 鐵菴集卷十八宋方大琮撰書劉子栗縝某比辱垂顧於久别中雖旬話猶不足况僅三日乎臨岐走行館則寺僧告以騎氣已出城南數里矣悵然而返䝉尊府使君需在諫垣日初疏輒令録呈然天度未賞不優容而言者不見容其揣合太過耳昨聞常簿自巴陵邑滿便合登朝故相惡聞此邑之名遂不果因記曽伯祖擴紹興中得岳州忽改為知純州以秦檜之惡聞岳之名秦死仍舊名然則岳之州與縣之名毎為權臣所惡何其不幸哉可發一笑潮掲二令至煩太守彈劾其一老士人曷亦如此見潜夫郎中云分教三山時為史老立祠講堂且植豐碑焉西山至郡撤去當立祠時豈不欲媚當國者正復何益又可發一笑鄭金部逄辰所在貴糴三山如何有海舟可招否義米乃人户隨苗輸納寄之官倉以備凶荒者今朝家行之倉司刷上常平米數不得移動若果然則州縣常年春夏間所藉顆粒以拔濟者豈不失望又聞行之福州和糴十萬或傳州科之寺院以應命若果然寺院糴米即民間米也自活猶不足豈能有餘以及逺乎昨見李倉請留義米不見聽又見權帥請免和糴亦以未聽若得大蓬早造朝汲汲為上言之使義米不出境自和糴不作俑閩中百年之利也此亦可為第二劄一帖黄之備任一道之寄者不能言而必頼為君相所信嚮者言之亦可媿也苟利於民已之媿不計也㑹次乞為拜下意某初至廣見報狀今馮太博以衢幙捧憲檄至婺推鞠横遭誣詆題絶印厯奇哉兄與憲和其詩又為辨于朝嬰言者鋒尤奇羣隂蟠據三山之賢靡不家食謂無復清明時上親覽悉起而用之非特馮召審向牽連者平亦登從列獨户部以節符徜徉豈中外皆不可無忠賢耶庾臺新建迎擊廬陵行之郡勿遣迓或驚曰此戚畹之最有力者曷遽爾嘗見一過賓云伯昌好奇某曰不然江流滔滔其致逺其灌溉功用甚巨特時因風石以見奇耳至於不容不為亦常也何足言奇人强名之爾某二紀前在豫章與孫履之國録為鄰幙嘗言受教於勉齋先生學識進處事偶到手審其當發拚膽為之如是一再可以無懼縱觸患難可以無悔怡山問學自勉齋師友中來某竊因而有味於陳了齋之言學者須常自試以觀已之力量進否觀其同時諸賢既擯則已雖元城最不屈摺亦不復言獨此翁著書爭辨强聒不休忠肝義膽直得之天何以試為殆以此教後學也怡山進而不已將至於成來翰謂至顛以平易治選用賢良固將安之非以勝之平易豈造次可至使人見其正不見其奇則吾輩本心也某老相催而學不進向來嘗懼不免嶺海一行乃以牧守至復何道五年辛苦僅能為遐氓全䕶一線氣脉晉職至再荷上恩甚厚稱塞謂何已辦行裝乞為散吏不復作十年前議論之想猶憶在班行時得兄囊封與面對副本讀之皆鯁切靡隠又侍立時見兄秉笏立庭下衘䄂有疏料其言必有驚倒竈下婢者惜不果上吾儕皆以蔣去兄其首也頃漕閩日見陳和仲大書壁記云以諫議大夫蔣峴疏罷恰見陳抑齋參預求去亦曰嘗以李知孝蔣峴林畧逐皆若不以為諱者近有一賢士夫云前蔣後劉皆戕國手問之則曰如南唐人謂宋齊丘為造國手之類國所恃者人天愛國愛賢者豈樂其戕之使盡彼特自戕耳紹符崇觀後國與賢俱戕而後彼乃戕天未厭宋宗社未可量凡經二人手者皆復聚于朝户部疇昔袖間之未及上者與年來胷中之所欲吐者曷日借上前箸歴歴陳之或言劉遷于盱亦巡管内置之不問潜夫後村守袁曰李孝章謫瑞稍相隣有勸以通書後村答亦不必以徳報怨某與蔣公舊有契分特察其借以進身未嘗有他語要知國恩未報與户部同此一念某良月上澣蒙走騎特賜帖報以重陽三日有易郡洪都之命自念落南五載若樸斷做者時竊聞諸賢議論或謂錮之逺藩或謂慮其技窮力殫何幸得此今稍可轉動猶恐未必然又兩澣省劄自郵筒至葢五旬乃達嶺南去天未為甚逺遲鈍乃爾改紀兩朞置相為上杜立齋最可惜至游克齋乃定其休休有容古大臣用心同列非前兩年伴食者比而兵財分任或以為疑殿之上下如爭如昵固不害為前賢之同要須純意國家乃可荆湖延納北降之數甚多似元樞以為然陳抑齋爭之力聞後所納者猶二萬果否宣閫久據潰疽忽消賈秋壑宜亟馳交軍一指顧可定兩年亦無甚急遽聲不知藩籬曽做得多少工夫毋但以狡焉者不如舊時為恃户外事猶未足深保屋裏事毋虚過光隂邇列要途頗皆得人館閣諸賢相繼吐氣區區愚意正不欲如此既能轉其機以為宗國與夫討賊而未得其實且封駁彈擊皆舉職衆方望之不必形之言也其於賢者猶責備太過設有姦邪詎肯舍諸淮南獨憚黯者畏其言之不止也端平初王君保斥蔣良貴諸人為一隊敢死軍當緩急際滿目偷生所欠不愛死者耳而何斥乎朝有直氣覘國者知其尚可為也元祐末君子自為異同反若開憸門而延之入往轍可鑒然八九年間比隆慶厯成一治體久猶頼之今局猶未成舉朝所防一大窺伺者多言奚益一正君而國定必外勢固而内綱整使人主有所倚以為安則不復有思杞之念矣冬孟除目三山最盛内相大少常伯皆真除大坡亦𦂳頭竹湖淡然無欲進一武則政塗更須留耕以力量輔之真元壯實邪氣辟易則内防姦之入外防敵之侵將皆不足慮顧疎逺之人安知時事言之未必中節幸一覽棄去某五年于此頗諳嶺俗民之為生稍易於閩胥遨卒悍經訟則破仕者入南以黷為常必大吏以身率之俾無可議其黷者飭之不悛則去之遨而悍者時禁戢之痛獮之而後窮閻之生可保路與州皆以廣為名壤地綿亘若非時有剽竊處處皆成聚落不減閩浙港汊太雜則有蠻蛋山峒髙阻則有徭數州合界則有冦攘然隨其萌芽纔剪輒散亦不能為害此為本路言也其地産鹽而自河贑自湖南來動以千百為羣産米産漆又有畨貨而自温台明越來大艚或以十餘為䑸有所産以養人自外運去者反以害人其辭不直未有不敗去者故廣無巨寇其黠者多自外至選帥必有文武威風識大體者為之繇唐以來遂為定論然元次山在舂陵謝表亦曰今之為刺史者必有武畧以制暴有文才以救疲能清亷以率下則一州不亂然則豈獨治廣為然其言文武則同而大體之意宏凊亷之用切某竊亦有志焉而户部之秉節鉞相隣也則皆得之觀荆公學記則贑剽悍殆風氣使然紹興後來之變殆亦有以激之若鹽于入嶺向者留忠宣守贑時給據與之何後來之不可行惠甫宋憲使申嚴保五法以其精力行之兩年間越嶺者少去秋廣昌寧都間之幾于决裂者何說户部之迄能拊定者何道今夏非販鹺時乃突入循惠界亟調兵且勦且驅之聞至寧都而殱焉或言入去秋來自取鋤戮者甚多惡種甚稀顧山川所産豈能盡絶但常得文武清亷如吾户部者非特賣刀之化可成抑使珥筆之風亦歇是豈不在我乎某歸夢栩栩久在家山南昌之行實所不敢已申審乞將見管職事交與以次官離任還鄉待祠命下昨見帥漕皆除人既而復差日為嶺海繫望以某之拙鈍猶能諄惻化俗蒐補壯威儲備待用皆不敢以一毫苟心苟道為之况於過某萬萬者乎羊城亦無甚氣候自不應煩明公於此以今所臨度嶺便是豈非某與十四州之望某伏蒙委貺書籍四種内楊信齋祭禮則戸部向嘗上之送官今又進之乙覽遂備儀禮通解全書以書樓延致考訂十餘年而後成又繕寫送進鋟梓十餘年而後傳不孤信齋之勤勞户部之力也非特為信齋也勉齋之目可暝考亭之志始遂西山嘗稱其為千年不刋之典信然某曩得南康祭藁今與此可以合觀近得黙得在桂林日刋儀禮圖歎信齋之有功於學者怡山之進既有表又有狀述先師始編時取儀禮十七篇悉為圖列之每章之下凡先王制度名物之要以圖考書其辭美黙得之跋謂此圖粗見制度名物進退周旋之梗槩而其義則有未通者其辭嚴盖怡山敬師也極其尊黙得輩行也責之備安得有悉為詔禮一書便講明而肄習者皆可曉以成黙得之志顧事關王朝雖不敢肄習豈不可講明若使太常官為之亦無不可惜信齋不得為此官其責望之意甚大西山於士類其議論終是渾厚又觀所刋留耕食用本草竊窺賢者以愛身者推之愛人其自序以伐性傷生為戒孰知其寓愛國之深意乎䕶養元氣亦惟食用之常苟求竒好異所損必多是知醫國者也郡齋新刻二書紙價必貴再拜以謝鐵菴集卷十八
