body:
  text: 鐵菴集卷十五宋方大琮撰婚書回宋比鄰歲久知諸老之游從門户日新尋兩家之盟好蔚甚象賢之醖藉藐焉弱息之功容方二難共復於公侯乃一族相為於妯娌便蕃委貺珍重拜嘉好事到門竊為吾兒吾孫之喜遺書滿屋願紬乃祖乃父之藏林回徐北境詩來報家山之入夢東牀選重欲兒女之及時如忠宣之滯留未歸而洪氏之婚姻不廢輒援舊比用合新歡某人學士自力簡編接二魁之族緒舍妹小娘粗間針訓遺九牧之家風兹領幣交豈輕金諾質母黨以曰可諒父懷之亦同為國而齧雪旄言旋是望入門而㑹冰玉語笑何如方回洪相望一舍羡詩禮之方興締好兩家幸典刑之僅有吾輩各酬於兒債歡顔俱溢於親闈幼女何知行媒交至有如佳壻真得味於書中豈必諸姑多擇於榜下夤緣偶契於片語臭味殆同於宿交吉書入門和氣滿族當諄勤姆訓庶幾婦德之修宜濡染父師行趾世科之美鐵菴集卷十五
  hash: sha256:685419e38dec9130c658ca6084cb692aef9de55941f005d739749555176a47e3
