body:
  text: 鐵菴集卷十一宋方大琮撰啓江西計幕薦舉上漕使鞏吏部子來幾日何禆幕府之文書我有二天肯傍誰家之門户固知士女自衒之可醜然於父師用情而亦宜所恃至公輒萌妄想某冗焉三載閒則十年肯低其頭送窮鬼之貧不屈此膝拜天孫之巧子雲好靜而求道退之少晩則著書悠哉此心未能免俗因出營雙親之甘㫖竊有感當世之功名數米一二而炊此自孤寒之眼孔輓粟百萬之計那知幹運於心籌方錢穀為相國憂而鞭笏有膚使在所慙管識亡補臺家欲辨㤀言喑主人之一鴈以直事上羞嬖者之十禽無所短長旅焉進退幸不汝罵敢求已知聞公每有體國之言竊意莫大薦賢之事愛之必自近者始僕其異乎人之求敢持弱植仰問大鈞雖欂櫨毋庸厦屋已成之時然术桂可補藥籠尚虛之數是或有命庶幾賞音自知游夏之措辭莫賛其力若問湜籍之叛否實臨此心不倍斯言請觀他日上憲使留直院按部皇華竦瞻濡轡何物小子敢問大鈞居焉接壤之諸生仕則聯臺之列屬此世俗攀援之常語非王公髙明所樂聞乃如愚衷竊有深感今薦員其極弊矣亦為士者有罪焉黄卷羅前皆持清議青衫羈縛漸變初心乞憐有甚於病畦脫選須離於苦海馴至達顯致身之地翻忘孤寒仰面之時貴者有挾而必從否則唾去其肯顧孰謂東閤典刑之盛復持江西英蕩之輝乃不為力勢所撼移若孰識韲鹽之臭味人以為異公如固然忠宣知人密傳先范老之法晦叔引類推廣大申公之心無非培植家世宰相之規模葢越尋常流俗士夫之見識求之今而僅有被其選者最榮顧如大琮見謂小器少而奏賦浪駭聽於一軍漫亦說經冗不治者三載謂解褐早則宜無得失之累且需泥久則盍有講貫之期棄日力而荒于嬉負造物之望則甚幸聞師論未甚途迷有賦不逐揚子之貧有文不乞柳氏之巧二親戒毋苟祿以養一命苟可及人則為未四十作丞郎咄咄休嘆轉百萬俾發運多多奈何森若置司均之受察曩以莆士企清源者三舎今以漕掾望章貢之二星皆非弱水之遥獨欠荆州之拜于隰所至雖山亦摇甚者欲解印而逃誰歟作剡章之夢矧惟職狀是真探虎穴覬得子之難叩以空談何異操豚蹄祝滿車之獲豈無垂涎之欲者祗恐取辱而輟焉僕冒而前衆為之愕意謂鄉貴得上林之賦索囊而空或問帝城有子公之書搏手以對人皆笑其狂且妄已所恃者公生明如其扣繫亡奇分甘肘足或者機縁偶合寧不動心敢出位而言之若成功則天也伏遇某官先生梅巖標致槐鼎經綸握蘭當榻以敷陳仗節單車而還報其議論當今少對自學問定力中來身擁繡衣以謙接物家傳夾袋所至收材方建臺則徧移公舉之文今察州又招揭律貪之戒刺史不揚激久矣列城之觀聽竦然歴數品題人物之精多是寒畯科名之輩某忘其自衒呼則大聲方屈蠖為諸公所共憐苟成龍則五日其可集且得士亦足以報所愧諛材使觀風之行不虛少還古意必有好語毋容多言謝蕭倉使舉改官與徐撫幹清史同薦焚香薦士雙櫝俱飛盥手啟函一軍盡駭咸曰孤寒之甚誰為髙眀之欺崇臺公道之所存私室謝恩之安敢視昔者擁衡所寄求賢於賓客亦多湜與居易何如有逺取近捨之恨洪視温造等耳必朝羅莫拔乃來固皆佳話之相傳未有同時而並進望臨川者一水膚使在焉𨽻豫章之兩司列屬皆是采其尤既登於學館持此望交歸於門牆然䑛淮南之丹紛然雞犬空冀北之廏敢辭駑駘鐵菴集卷十一
