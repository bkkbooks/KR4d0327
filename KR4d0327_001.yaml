body:
  text: 鐵菴集巻一宋方大琮撰諫院奏議端平三年七月分第一劄臣至愚極陋起自逺方三十年間八書吏考雖田廬之日最久而畎畆之忠不忘大化更新誤叨收擢退然衆後惟有靖共屬者内出手書俾司言責力小任重曉夕驚憂陛下何取於臣而拔之冗散耶抑以其草野少戅或能盡言無隱耶然未信而諫交淺言深雖蘇軾猶以為疑若夫柔行巽入以涵養為大體隂諷宻諭以嵗月為深功此平世事也臣自立朝以來每見羣臣論議始則言成敗中則言安危至於去嵗夏五之後景象頓異則以存亡言矣今也亡之一字慣熟於上下之口然徒知天下有將亡之形不知古今有不可亡之理理者何綱常是也綱常者天地所以付宗子祖宗所以遺後人臣民所以戴君上夷狄所以畏服中國者也微失之則敗重失之則危終失之而不悔則亡竊跡當世之故敵居漠北越數萬里干我王畧蹙我境土此天地之大變也以臣觀之蜀口之敗雖敵也而終蕩於潰兵之擾襄州之失非敵也而實壊於叛兵之變州縣之兵則衊其守將京畿之兵則疾其長上以至遐方赤子皆睊睊然有作慝之念其為綱淪常斁不既多乎陛下豈願其至此哉出御經幄懼形於色朝問羣臣憂見於言六字之銘未嘗不欲飭已十二條之誡未嘗不欲敕吏減斛面停稅畆未嘗不欲寛民優廪給戒掊尅未嘗不欲恤軍且心者綱常之所自出也陛下之用心若此而危形急證相尋不已臣廢食忘寢思所以銷惡運遏亂原而不得其說陛下隱之於心其猶有不安者乎恭惟本朝立國度越古昔太祖皇帝之授受不以私其子而感趙普金匱與弟之一誓髙宗皇帝之選立不以私其近屬而寤婁寅亮立昌陵後之一言一祖一宗為我宋肇興再造之主皆自其不私天下一念者基之臣在田野側聞寧宗皇帝嘉定選擇之時追記先朝眷念魏邸之意故陛下之立必自魏來寧考此心其與後世猜防多忌者異矣用能緜三百載無疆之休以啓佑我陛下者亦此一念也是以陛下踐祚之初朝饗原廟而都人大悅則人與之也始見圜丘而月星明摡則天與之也疇敢貪天之功以自為已力哉彼故王之退守藩服變出不測霅川之事深可痛也臣嘗記真徳秀之奏曰前有避匿之跡後與討捕之謀又記洪咨夔之疏曰霅川之變非濟邸之本心濟邸之死非陛下之本心魏了翁直前之疏徐清叟火災之疏皆可謂得其情矣胡夢昱一疏尤為惻怛貫穿百代之興亡指陳天人之感應讀之令人流涕當是時也天地祖宗猶有以察陛下之有所制黃壤沉魂猶有以亮陛下之不得已亦既十載天斃老妖端平改絃威福自出此非昭寃雪枉之時乎臣恭覩元年六月御筆有曰脅枉䧟逆又曰復爵眡塋而立嗣一事則曰闗繫國家難以輕議又恭覩二年七月御筆有曰衞王功茂深欲保持其家又曰札付宅之兄弟自今臣僚毋得攟摭一則牢闗固拒如待深仇何其重於繼同氣之後一則丁寧覆䕶如拊愛子何其厚於保姦孽之家合二筆而觀有人心者宜何如哉故王之跡非若秦邸而秦邸子孫至今蕃盛此太宗皇帝保全之力今也西溪荒阡麥飯無主孀婺孤寄抑墮緇流獨不以太宗之待秦邸者待之乎賊逺之罪浮於奸檜而檜死之日諸子勒令致仕此髙宗皇帝果決之斷今也宅之頑童班槖錫第起玷名郡敢抗公評獨不以髙宗之處檜者處之乎陛下厲精之始如逐二凶人竄二贓吏召諸賢求直言以至禁戢苞苴止遏干請每一札出萬目聳觀四方傳誦交讚聖朝獨此二筆讀者無不憮然失色聞者無不黯然吞聲徳於其非所當徳怨於其非所當怨一念之私綱常倒植大原既失他美莫贖驕卒安得不狂悖凶氓安得不跳躑叛將安得不飛颺豈皆無秉彞之心葢有以召之矣陛下必以逺為功則臣請有以辨之昔漢大臣議立文帝之時特曰齊王母家戾惡代王母家長者以善人則大臣安史所載本說如此大臣之意不過謀身豈料得一文帝遂為三代以後不可及之主哉陛下天賦粹美不下文帝逺之自謀亦猶漢臣既見聖質髙邁乃復時進妖麗欲以昏其明而盜其權所賴韜藏靜定不墮機穿遂有今日之懿若逺者豈容生免繫獄之辱而死反冒極美之諡乎陛下必以故王為疑則臣又有以釋之昔漢淮南之驕僭非復有愛兄之道文帝哭甚哀以盎解而止及聞斗粟尺布之謡則還地封子不遺餘恩豈終膠於盎之說哉陛下天性友愛與文帝同故王之脅與淮南異小臣剽聞謂故王嘗從陛下㑹朝侍班同榻共食情愛備至使無逺先入之言寧不愴念疇昔之好若故王者豈其生有友睦之義而死不蒙經紀之恩乎臣愛助孤忠惟始終以漢文帝望陛下也矧自更化之後凡逐臣羈士見扼於權姦者無枉不白獨天倫大寃不能自明一婦茹屈枯旱三年匹夫非辜飛霜六月而況先帝之子陛下之兄乎臣聞徳秀垂殁語其家以不能申前言為大恨又見咨夔僅對臣言曰上意未回則天意亦未易回今二臣巳矣獨夢昱所謂寃不散則禍不消自今觀之其言皆驗昱竄海濵弟兄暴骨今雖官其一子未足償一門之痛是不惟故王之寃未散而昱之論亦未明也然則解釋陛下之疑啓寤陛下之聽此非舊學大臣之責乎此非耆老大臣之責乎此非二三執政之責乎此非經筵從容啓沃之責乎此非侍從論思獻納之責乎此非諫臣繩愆糾繆之責乎羣臣泛議一語及此摇手吐舌指為深諱是殆以齊人敬王也然而臣知陛下有可回之機者何也小臣疏奏間及此事陛下雖微詰之亦不罪之草茅對策間發此語陛下雖稍抑之亦不棄之是機也茍有以開導而疏滌之則油然之一念固在也臣愚欲望陛下豁然開悟出於真誠特下明詔敷釋本心正權臣之罪洗故王之寃則端平徳刑之大者明矣是必發暴姦伏絀絶貪功抑孽種而奪守符收宸札而裁寵數賈充之諡别議里克之惡始彰是必改營髙燥亟謀紹承幸伉儷之猶存庶精􅐩之有託若敖之鬼不餒新城之巫永消則天心之悔禍有期人心之厭亂有日特在陛下一念間耳或曰四郊多壘未暇議也不知腹心不治何以望膚革之安或曰皇嗣未衍未遽議也不知麟趾不歌何以致螽斯之盛事固有甚難者百物翔踊而楮日輕則曰吾力不能救强敵薦食而兵日困則曰吾力不能抗此不過一號令轉移之易而陛下猶難之且事與天合與祖宗合與先帝合與天下之心合而何他慮之有若易者猶難臣恐難者愈難矣宋文帝何如主猶能還二王之家正徐傅之戮而况九京之下所望於英明之主哉通天地間一氣耳今也盭氣流行在天則為妖星在地則為洚水在朝廷則為二相不咸在邊方則為諸閫不協去嵗叛兵之變自南而北殆遍天下去夏殿旅之閧市扉晝閉相恐以走此無非盭氣之流注激射也臣曩請清叟火災疏曰若有所警而言問其故頗異昔鄭人驚伯有之厲子産以為鬼無歸之故或者類是臣又近聞宅宇以其父三十年聚怨之華堂一旦捨之為僧廬採其事尤異昔王安石捐居第於鍾山而記者以為覩雱囚之故殆亦類是事雖涉怪理有或然逺之家不足恤而闗於宗社者甚重若一念之歉横於胸中而不化則一氣之盭鬱於兩間而不消誠能宣明洞達此歉不留將見精誠感召此盭自弭不能運化推移無往不復刓忍諱䕶其裂難收瑶華之位終復蔡京之後終錮而光景迫促已無救於尼雅滿長驅之禍矣吁可畏哉臣素拙且賤始進瞽言遽觸雷霆罪在不赦然漢武帝有言髙廟神靈使汝敎我或者祖宗列聖之神寧考在天之靈將以啓聖心而開治運歟先儒嘗謂夷狄為患由中國先無三綱故臣以綱常為弭亂之本又謂一念覺處便是天理故臣以一念為綱常之本然則宗社存亡之決夷狄嚮背之機天命人心去留之㑹在陛下今日之一念覺則髙廟神靈之賜否則小臣積誠不至請伏妄言之誅惟陛下財幸第二劄臣夙懷忠憤驟被親除其免櫝首語所謂更化三年病源故在者已冒死盡言於前矣顧猶有闗宗廟社稷之至重至大者方今中外多事之秋未有繫屬人心之本豫選親賢於春秋鼎盛之時則有嘉祐紹興故事在送歸舊邸於皇嗣既生之後則有祥符故事在今陛下既留聖思矣宗廟社稷之福也然而故王之寃不雪則他日能保其如所屬意者乎權姦之罪不正則他日能保其無有貪功者乎臣於故王何所有於故相何所怨所以復冒死深言者為陛下子孫萬世計耳孟軻謂天子不能以天下與人必歸之天况人臣乎陛下果能昭寃定罪開明天下之大公選擇親賢圖惟天下之大慮即此一念上格天心則燕禖熊夢不占有孚子孫衆多受福千億可泰然無他日之虞矣臣願陛下見之決而無繫累之私行之亟而無猶豫之疑則天人今日之望也病源既除蔽障盡撤一念善而萬境澄三綱正而萬目舉臣始得以推廣聖心而條其梗槩昔金人欲亡久矣曾謂殄種之日適㑹親政之初陛下夢寐清明上通文祖人孰不謂此心之感然亳之復汴之人方以歸疆為喜襄之失蜀之危反以蹙國為憂長淮大江憂抑甚焉昔之喜何從而來今之憂何縁而起陛下之心猶有非人所能盡曉者而謂天心之不可曉乎恭惟本朝列聖緝續艱勤以至於今日炎興半守而猶牢也不可以當吾世而有金甌破缺之形誠能以三百年宗社常置於聖心念國步之多艱於帝命之不易必將兢業萬幾之不暇而何有於耽樂必將奉先帝宫室之恐羞而何有於奢侈必將裁抑近屬以全富貴勿謂其能循法必將檢柅宦寺以杜窺伺勿謂其粗知書必真信直言豈可名優而實逺之必真絶小人豈可俟少寛而漸來之必躬行與心聲相應毋徒修飾以華簡冊必内庭與外朝無異毋徒尊嚴以美觀瞻嚬笑之間理亂繫焉天不可欺人不可愚則陛下之心其可不正乎又當切責大臣曰本朝碩輔相與扶持以至於今日􅀈逺雖壞而未潰也不可以當此時而有舉酒祝柱之歎誠宜各以三百年宗社共置於胸中念輕舉之難掩勉後效之可圖必將剖破藩籬不可使人疑其異必將洒掃庭宇不可使人議其雜必將共圖大計毋自困於叢脞必將共保大權毋或聽其旁落人材朝廷之人材也豈必競相牢籠公議天下之公議也豈必過為調䕶力不足以運掉逺隅何取乎鎮撫威不足以號令疆閫何取乎處置訏謨之頃安危繫焉君不可欺衆不可葢則大臣之心其可不公乎抑臣猶有甚憂者陛下之身三百年宗社所託之身也邇者聖體違豫幸即藥喜採之所聞新幸貴艷多給匪頒大臣不敢諫恐忤㫖也舊璫蠱媚密進竒巧大臣不能制恐招讒也無非傷和伐性之具甚乖謹獨閑邪之規陛下以社稷為念則必養心於寡欲大臣以陛下為念則必格心於未非何至如道路之傳哉户外之事急矣所賴以回天心收人心者一堂聚㑹之間耳臣願陛下正心以修徳大臣同心修政二三執政盡心以修輔轉亡為存國其庶幾否則淪胥以敗是誰之責顧臣何人敢犯陛下敢觸大臣然言及乗輿則天子改容事闗廊廟則宰相待罪此祖宗待臺諫家法也臣誠愛君臣誠愛國螻蟻之軀不敢自愛惟陛下無以人棄言則宗社幸甚生靈幸甚八月分第一劄臣頃者冒進愚戅輕犯雷霆敢謂聖度如天猶獲瞻威咫尺窮子見父且喜且悲所謂大綱大本之說臣申言之則近於激不言則流於欺不激不欺以觀陛下之心焉請以今日經帷誦說之書而推明帝王正心之大法以告其說若稍緩矣然雖緩而亦切也心一大闗紐也書曰無怠無荒此待夷狄法也惟難惟危此畏小民法也甘嗜峻雕未或不亡此警省一身法也天下皆樂而一人獨憂天下皆泰而一人獨危以一人之憂危所以保天下之泰且樂也若昔明良䕶持此法重闗累鍵植立甚嚴自管仲始破其扃鐍謂聲色酒肉不足以害覇賈誼微寛其繩束謂為治而乏鐘鼓之樂不如勿為誼之言猶婉而仲之說直謂把握於外者有定力則安意肆志於内者為無損是以威公負其强力而溺内嬖惑刁牙以啓國中之爭文帝安於所性而罷露臺止驂乗以成富庶之效至唐太宗以雄心霸氣孩撫一世外而鞭笞剪伐無不如意内而縱情長慾肆其所為哆然恚其臣曰是欲使國家不役一人不收一租宫人無髮乃稱其意善乎魏徵之諫曰憂人之言不絶於口樂身之事實切於心深中帝病帝亦斂容謝焉合三君而觀文帝恭儉量已甚明二君外操内縱自謂竒策卒不免貽後嗣患况於外無把握之力而内為安意肆志之事可乎帝王治法止一塗轍持心身者乃所以持天下也今天下未易持也如支老屋補壁而籬仆如駕漏舟掉首而尾濡鳩工烝楫合力扶救猶惕然有壓溺之虞而為主人者出有懼色入無戒心反使工慵楫惰得以有辭於其主臣固不敢以魏徴之語窺陛下而其迹則有不能掩人之疑者何也三邊功賞有頻年未下者而後宫新封數十之宣雖不一夕取辦未遲也五閫將佐猶有待激勸者而腑肺近親雙節之命雖不同日並拜未害也襄蜀流移糠籺不飫而進勸豈羣貂之所宜爭壻哉江北居民千里清野而木妖豈内庭之所宜時有哉陛下憂勤之念未孚四方而佚樂之聲頗傳道路而或者猶曰事有不可為未免興退飲醇酒之歎此前世中主事也聖明豈有是哉然而消疑釋謗抑豈無說布衣帛冠豈足興衞而文公之志自此立薪寢膽食豈足彊越而勾踐之志自此堅陛下倘以襄失為恥則其志必在復襄以蜀敗為歉則其志必在保蜀以荆擾淮危為憂則其志必在牢固疆場以民愁兵怨為慮則其志必在䕶養根本用志不分樂事自息書不云惟疾敬徳緩則不及事矣無遑耽樂雖欲為而無其暇矣是故惡㫖酒必真如建隆經宿之悔斥寵嬖必真如慶厯女口之遣減省嬪御止如雍熙三百之數檢制奄寺當如景徳過分之戒節縮浮費則韓琦宫掖之議可行也停罷力役則歐陽修土木之疏可復也非惟消釋天下之疑亦足以助成陛下大有為之志孝子者善繼人之志也以先皇帝錫杯之奉澣衣之御此不過禁庭間事耳而幽閨深谷民到於今稱之當慶泰禧定以來天下非少事也所以銷一時之變結數十年之人心者敬仁勤儉之一念耳帝王大法祖宗家法森乎三尺之不可越也憂者樂之對危者安之反嗜樂而喜安人之情也臣乃欲奪其所樂以遺之以憂禁其所安而投之以危豈情也哉葢有凛乎朽索之危而後有平成之安有若涉淵氷之憂而後有垂拱之樂豈惟天下安樂之而一身之至安真樂孰大焉不然則欲安而危迫之則反失其安欲樂而憂乗之則反不得其樂明者可以計利害於此矣今也當把握之機而有縱放之形當憂危之㑹而為逸樂之事所以使陛下負此疑謗於天下必有分任其責者理亂安危自君心出格其非者大臣也救其源者諫臣也若夫阿意曲從務為容悅今日曰誠如聖諭明日曰非臣等所及固恩戀寵此大臣之恥也嬰鱗自疑更進他說前疏則格不下後疏則又說了學淺膽怯臣實有罪焉先民有言宰相尊行其道諫官卑行其言引君於當道必納君於無過使天下不得以竊議吾君則道與言俱行也否則言之不行非行道者之責乎故臣於陛下與二三大臣皆有望焉取進止貼黃臣恭聞慶厯初邊事起内出詔書減皇后及宗室郊祀所賜之半於是皇后妃嬪各上俸錢有司奏公卿近臣以次减舊此今日之當法也又近聞熙寧初河北大水宰相辭免郊賚司馬光王安石同為學士光謂節用省費當始貴近宜聽其辭賞安石謂未足富國徒傷大體反持之不下安石議論乖僻蠧國害民之禍胚胎於此一語此今日之當戒也矧今邊費浩穰水災徧滿明禋大賚為數不貲内而宫掖外而公卿以下得無有可裁抑者乎欲望睿慈頒慶厯之詔鑒熙寧之議亟飭有司痛加節縮以見中外臣子共體國家憂邊恤災之意亦節用之一助也第二劄臣忝居遺補之官分行御史之事故於去佞擊姦之際必寓植賢扶善之心竊謂科目不足以盡天下之材而人材必自科目出者祖宗法度然也其最髙者例蒙尊顯或三年而為館職或一任而必為學官其得之者亦自愛珍有不以温飽為志有不肯抗聲自陳上下之交相成蓋為扶植國命計也豈徒以一日蓋天下而攫終身之富貴哉中興人物稍不逮前異才間出僅續氣脉權饕柄國摧殘殆盡斧斤之餘苗芽猶有臣己丑冬調官都門是時蔣重珍以廷唱第一人召其登對兩疏首戒逸樂次詆苞苴剴切至到士論翕然王㑹龍亦第一人也同時召對鹵莽塞責軟熟腐爛觀者攢眉又是時陳塤以禮闈第一人為國子録其輪對一疏譏切時相不顧姻黨該括激烈人皆偉之陳松龍正是年第一人也館于相姻鳴騶張燈動稱府第行道醜笑以物論之相形見人品之逈絶葢自寶慶乙酉竄逐諸賢之後望而畏者萬口皆喑獨蔣重珍與陳塤二人戛然並鳴横身權熖每出愈切真無負於科目者若王㑹龍之鄙陳松龍之黠科目何賴焉臣謹按工部郎官王㑹龍素乏俊聲偶冠多士入閩幙則不畫一籌垂滿實裝偏需諸邑白帥鬻刹所得不貲登朝路則諂事權孽授題銓闈韻脚互異同列爭功不掩衆目得郡嚴陵尤無治狀前之權郎既不可今何所取而輒備正郎之選乎新淮西制置司幹辦公事陳松龍自負纎慧資行巨姦方進身則憑藉兇熖預定易題叨寘首選廷試納藁見拒主司為敎官則附和貪帥干政濟惡坐擁多貲校文天府敗鏹啟爭累玷彈繳具有實狀前之帥幙既不堪今幾何時而復玷制幙之辟乎以其始觀之四人之榮進皆素定也今珍重以從槖召人日望其至塤以郡最聞人望其召而㑹龍為公論所輕松龍為公論所棄蓋其自染於穢濁者深矣欲望聖慈將㑹龍姑畀祠廩或與待次州郡徐用未晚松龍特罷新任雖久於選調亦不足惜庶幾可為自壞科目者之戒貼黄臣所為自壞科目者又見一人焉軍器少監兼權左司郎官趙汝譢粗有幹略殊欠檢修其為帥幙也招權狎妓自閩來者皆能言之其宰宜興也不飭簠簋郡之名勝者能言之其為宰掾也喜怒任臆予奪行私低價收贓家之寶玩厚資聚列屋之艷姝都門苞苴近稍禁止或議都司不能盡絶則前之居言路者屢欲彈之久據省闥人不謂宜近者王伯大為右司郎除目一出衆口稱愜汝譢與伯大俱廷唱第五人也眎王伯大之清修有守寧不少愧臣又於舍選中見其自壞者有二人焉武學博士林伯順品數平凡曩試校定以已用之零分經營再用學官鄙之近求改秩欠數月之考第牽合非律銓曹却之太學録鄭斗祥資禀儇薄未為京敎則鑽刺相客呼儔懇事反以見厭既録成均猶多印空貼妄鬻泮職竟以啟訟二人者一以䇿括稱一以聲律名資歴未深遽登儒館可謂逺士之幸而狗茍蠅營殊少器識眎其同列之鯁亮敢言端重無競者寧不可愧甚非朝廷所以貴重科目之意欲望聖慈將汝譢伯順斗祥並與補外以老其才以廣其識亦使世之居髙第出舍選者警焉九月分第一劄改除不果上臣以遺補官叨駿奔列方陪拜原廟小雨㣲潤則隱然以憂及導引齋輅晴雲劃開則油然以喜至於宗祀之夕祼鬯將舉暴雨大至收雷忽鳴千官百辟相顧眙愕仰瞻天顔益加寅畏迂道東升雖勞不憚離立小次竣事益恭還内鼓吹紫宸稱賀中使傳宣並與寢免於是執事之臣咸歎聖敬之有加竊疑天道之尚逺也臣終夕驚憂思所以為陛下告則綱常之說正心之說周思慮之說嘗累疏懇懇言之陛下已衡聖慮矣而天之怒未回何也蓋自立春以來先雷而雪星文失紀迭奉諱惡立秋之始大雹暴風積潦逾月畿甸最甚天之積怒非一日矣明禋大饗此為何夕於是則赫然震怒矣近者雨色㣲異猶可掩抑至於電掣雷鳴有目皆見有耳皆聞不謂之帝怒可乎時政經曰雷不順時天怒之象小人盜權君子受制陽不閉藏與陰相薄此為雷發非時言也況事神饗帝之時乎今陛下既頒責已求言之詔矣罪在朕躬聖心既知自責咎在臣等宰輔亦不容黙而一二宰輔亦知所以掇怒於天者乎大臣者所以代天工而共天職也未見格天之功動皆違天之政不量力以興師舉者輕而爭者不力初履畆以稔怨謀者疎而捄者亡策此輕易之失也非䙝天乎王邸近屬或言其有援解之力故不敢有所指陳衺民黠璫或言其有借譽之力故不敢有所檢束此容悅之失也非慢天乎冦有宿兵未歸巢穴而誇張於倐回之騎邊有重備未固籬落而動色於難保之和此蒙蔽之失也非欺天乎倫紀之當厚天理也相因而不敢言姦孽之當錮天罰也屢起而不能遏此恡固之失也非拂天乎正人者天所佑以生也聽其散而莫為主直言者天所假以鳴也挫其銳而使習為噤此妬嫉之失也非棄天乎向也至誠體公收召衆賢嘗以徳度稱向也揆事圖策動中機的嘗以謨畧稱粤從並建之初已有不和之謗今逾年矣謗猶未解强冦闖闗而同室之鬬未平驚湍遇風而舟中之爭不已國事至此已有餘責左支右吾安用矛盾用志乖刺何以燮調秉徳二三何以克享是宜顯相之初致此不測之怒此臣所以切切為亮天者責也恭聞乾道三年郊禋雷雨内出手詔戒諭宰輔又切責百事閱八日免顒相祀又四日詔求直言當乾道間無闖邊之韃無失伍之旅無折閱難行之楮無險怨起膚之民一睹變異恐懼如此今之君臣當食不下咽矣臣愚欲望陛下斷自宸衷一遵古典明諭二相何以應天怒何以答天譴其亟圖之然後戒敕一二執政當以向之任言路責人者而自責又戒勵百官當以平時居下位議人者而自議臣言官也知而不言言而不盡當坐以不正其刑墨之罪惟陛下財幸貼黄臣既以災異為大臣責矣又稽之時政經曰午日雷發非時此王者奢淫樂游之過故天怒之此一機也譴怒之至重亦仁愛之至切也方齊明盛服以覲父母非獨愠形於色且厲聲呵責焉雖耳提面命不過如此臣昨嘗親奉玉音有恐懼修省之語今又於手札見之然臣竊疑陛下知恐懼而未知所以修省也葢畏天之實不在中庭露禱而在於暗室屋漏之頃應天之實不在緇黃祈禱而在於發政施令之際蓋恐懼者其心而修省者其事也陛下誠能端居靖念某事當戒某事當舉修飭省悟揆之於心當戒者不憚改當舉者不憚行則父母之變容動色者將悅豫之矣否則藴積之怒既泄而無以為解則將棄絶之矣我將之詩曰敬天之威于時保之時者無一息間斷之謂也鐵菴集巻一
