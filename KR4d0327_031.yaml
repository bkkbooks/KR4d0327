body:
  text: 鐵菴集卷三十一宋方大琮撰序方氏族譜序方氏之先出于神農始得姓者曰雷神農八代孫岡帝榆之子也相黃帝伐蚩尤以功封方山食其邑因氏焉子孫以世相傳明與風力並驅回從雷澤之游贊乂洪水在夏曰相勤績中興佐周者叔敻見于秦賞與望與陽見于漢世居河南有曰紘者遭新莽亂過江宅吳自是江左之方悉祖于紘紘生雄為司馬府公雄生儲儕儼和帝時儼負文武材辟三公不就髙蹈茅山儕仕至南郡太守儲位歷太常卿黟縣侯有張文臣為之碑自得姓以來其見于文字者如此儕儼之後無聞儲生讚之觀之𢎞之皆當世知名士讚𢎞之後星居江浙本祖琡乃觀之之後中間世次莫詳則譜不修之故也琡仕唐為都督府長史一子殷符為威王府咨議統兵征剿任銀青光祿大夫兼御史中丞則僖宗中和四年也中丞之子七其三早世有曰某為户部侍郎其子官于滁因家焉有曰某守潭州湘隂簿者有曰廷滔者歷官尚書左丞僕射子孫家于江州吾祖廷範為溫州平固尉歷宰長溪古田長樂邑遂卜居于泉之莆田為巨族始祖則中丞第三子也纍贈金紫而所宰三邑皆閩地父老相傳至今猶號曰長官蓋唐季俶擾長史中丞子孫各家於其官長官既定為閩人愴念故地藁葬祖父以寓松楸之思今烏齊與豐田二穴是也長官葬靈隱山雖仕閩猶為唐臣至六子則王氏之閩矣仁逸水部員外郎仁嶽大中祕監仁瑞祕書省著作郎仁遜大理司直仁載禮部郎中仁逺祕書省正字今繪像于廣化寺之薦福所謂靈隱長官六房是也方五季亂所存分裂豪傑無以為歸各仕于其國長官六子適值其㑹逮宋龍興向之仕于其國者相與歸仕于天子而長官之子孫彬彬輩出聨翩髙第參錯要路遂與中州名臣抗衡而長官之後始大今其來者各求以功名自見于世方興而未艾也故合天下之諸方不如莆田之盛合莆之諸方不如長官之盛枝葉繁衍冠冕輝映所在充牣幾半于莆詰其從來俱出六房六房之出則本于長官也噫由一人之身而至于以百計以千計蓋將以萬計而未止亦可謂盛矣然人之情少則易親多則易踈吾宗最以多稱固有一族之支五服之𣲖慶弔往來未盡廢卒然邂逅熟視而揖則其踈且逺者相值于塗憧憧踵接不相熟識噫由一人之身分而至于如塗之人曰塗人者利害不相及之謂也不相及猶可也推其薄將有不得為塗之人者吾用是懼此族譜所為作也得吾譜而觀之猶歸水焉大川三百支川三千或流漫而愈長或瀦滙而滋浩或委蛇曲折已微而復大或不安其所潰溢而四出沿流究竟則同出于崑崙之區黃河之原有本者如是夫凡今之所以相視如塗人者貫穿聨絡同自一脉中來觀吾譜者尊祖睦族之心可以油然而生矣逺則難合多則必散勢也勢則吾末如之何然人不可有此心也以孝弟之心相孚通則宗盟篤矣風俗淳厚矣吾祖心即吾心也將舉宗人之心皆然有不然者彼獨何心大琮竊慕古之賢人君子皆能自序其先世筆史者亦為標之于其傳前輩有自作譜例載之家乘流行于世譜亦隨之其先世豈能皆賢蓋其無所聞知隨世湮沒者多矣以無所聞知之人而得以輝煌於史冊著見于文集有所附以為不朽之傳則賢子孫之力也顧其同時之人豈無自序自譜者而史之不載集之不行終焉泯沒為人後者其勉之哉前輩曰立法以為譜學者事也蓋以責子孫之好學者吾知勉而已知盡學者之事而已安可逆料其不傳不行而遂已哉需次之隙搜尋舊譜纂輯昭穆推而上下之則知源流之脉絡從而列之則知子孫之多寡後來者能相續修補之則可以衍於無窮而不絶長官子孫必將大有興者安知其不傳且行也凡我族類相與勉之哉與畫工黃本軒序造物之生斯人也吾意其甚勞而不切方其分布耳目鼻口也不知若為而耳若為而目若為而口與鼻目則引而長之耳則翼而聳之而其數皆偶隆之而為鼻方之而為口而其數皆竒而鼻又居竒之偶皮聨于膜膜聨于肉肉附于骨骨牽于筋絡運轉有類傀㒦何為者哉逮夫靜而思之細而睨之四肢百骸各有攸宜視聽言動缺一不可若移鼻于口移耳于目若復足而手之頂而踵之則非人類矣造物者又若差巧而可笑本軒所游之藝方其執筆諦視運思而未獲也殆若造物者之甚勞而不切者至其落筆風動又幾于造物之差巧而可笑者是各一技也然而造物之創斯人也均是耳目口鼻也而老少妍媸之不同今夫人也或老焉而自少之或醜而自妍之一不當意則曰我貌不然又曰某然某不然嗚呼是必揠平仲而七尺傅坡髯以鉛華而後可也本軒儒家裔苗必將默㑹于斯言然豈特為軒嘆哉鐵菴集卷三十一
