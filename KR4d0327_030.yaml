body:
  text: 鐵菴集卷三十宋方大琮撰文將邑丙戌勸農文令嵗前入境所至聚落父老出迎度其意望令不淺令亦有欲言者今何幸與汝農相勞問于郊共話心腹事環邑皆山層髙而田尺敷寸墾耰鋤艱辛竭地之力僅足自食輸官之餘糶不出境令念汝農用力勤而收效寡也令亦幸以身家竊食其間顧何以為農謝且為農勸趣耕巡稼出入阡陌不能如古長吏亦少盡吾心爾涉春多雨獨甲子晴乃驚蟄後雷聲應期令為汝農喜有豐稔之兆也種必時培必厚畝必修泉必導纎悉微細令知之不若汝農之知之深也是不待勸絶撓戢追呼抑強梗令不敢有一毫妨汝農毋遊惰毋爭訟毋屠販毋冒禁農其慎勿自妨顧有關人道之最大者令事事之初首以孝悌輯睦為汝告今再以朱文公注解孝經庶人章併刻示汝汝能服行受用無窮人事既盡時和自應倉箱盈止室家寧止然後知令言之不汝欺將邑丁亥勸農文連嵗以稔告去嵗不獨粒米狼戾凡菽麥蔬果之屬皆稔令竊自喜意吾邑為然已而聞他邑亦然他郡莫不皆然此蓋國家之洪福抑上天勱相我民令何力之有亦願我民父老訓其子弟必曰孝曰友與人之族黨鄰里言必曰和曰忍與人之主佃言必曰貧富相依索者毋太亟輸者毋失期以至飲博盜攘爭訟屠販妨業等事必切切于言朝夕之所施行者無非勸不特去嵗春秋出郊兩勸也今臘前三白立春即雨天相我民未艾令為民喜亦未艾父老來前停杯審聽更相告語益勤乃事有年屢書必然之理謂言不信有如此酒將邑丙戌秋勸種麥詔農于春著令也秋既半吏以勸麥告此古者斂時也今何幸與汝農周旋阡陌間汝知種麥之利乎青黃未接以麥為秋如行千里施擔得漿故禾則主佃均之而麥則農專其利汝知令之喜乎五風十雨膏澤不禱而自應粒米狼戾市價不抑而自平父老謂前未有令將何德以得此汝知令之心乎令生長海濱賦平鹽賤今邑民輸納不甚輕又官鹽之價不啻數十倍下郡心實惻然若月解僅足稍可以寬民者無不為汝猶記令今春之言乎飲博鬬訟屠販皆足妨業方尚氣逐利時笑俯首南畝者為拙及抵于禁田荒財耗視前日之所指笑為拙者倉箱實而室家樂所獲為孰多今早禾既穫晚禾又堅可謂樂嵗父兄子弟胥聽令言毋偷安勤則不匱毋耗蠧儉則足用毋乖爭和則致祥蓋修人事以迓續天庥于無窮笙鼓賽田神雞豚燕同社非獨田家作樂令亦與有喜色庶幾吾邑不虛得樂郊樂土之名鐵菴集卷三十
