body:
  text: 鐵菴集卷二十宋方大琮撰書趙教授時迬某舊秋登劒之湖頭去城餘十里有傳示冰銜則郡博士也不以其常為吾泮林之辱而更勞苦之此意甚古既至廣文官舍則儒隱觀瀾彌髙儼如壬申癸酉新創時凡手所植所聚所引梅竹泉石皆相迎而哭似亦不以為辱者豈非體今主人之意而不忘舊主人耶某繼楊充甫太博者也冷舍與直舍為佛廬所隔楊始通之而謀成之充甫為慶元六君子之首節甚髙惜其立朝不久且逐且死前此典教多名人其稍顯者三山任先生由御史登頌臺有點校二禮板本在黃實夫架閣當禁錮道學時所取程文前列有用語録中字者諸生有請曰此等字朝廷近禁也實夫答曰朝廷令諸君不喫飯能之乎每味此語禮義之學與日用飲食同自今觀之食可禁乎學可禁乎其時之隨聲同吠何限黃之不顯命也諸生知而祠之者但曰闢試闈耳近番陽湯伯升其學問議論器識足名其家觀其通變策經畫世務甚精晚乃淡視世故其了死生吾儒之常或謂葛藤之助非也言論風旨襟佩猶言之否去而顯者雷季仲參預也當其在西掖時傅烈仲記題名取以為一記之光又榜廳東一閣曰具瞻以祝其由政途而經上來者遂指閣為雷創殆借以為重區區則謂此郡元寮宏博之標足為幕職重非徒宏博也參預也而西山之學與節則可以言顯矣此吾徒所師而慕者也鄭節推宅心某屏居丘園目盡無來人曽謂數千里外乃有走介貽緘者繾綣滿紙又知舊秋曾寓書西省相尋而不肖已歸矣憶在坡邊時四方書尺不暇答賢者獨否既解此職來者浸稀却荷寄聲雖不及領意則可感君謨謂為諫臣則人見疏為詞臣則復見親蓋古之人皆然今也反是執事過今人而追古人矣矧為逐臣誰復觀省獨拳拳如此意逾古而感逾深癸已秋抄聚于建陽入冬又聚于京見持逺幕久次去僕留而愧焉時事日艱每見朝家以儲帥材為難某心知有執事而氣力低小不能為軒輊既而聞已遂及瓜度其必能以聲績表表自見矧楚塞風寒之衝正志士馳騖之會笑談兩幕無非偉畫諸公方將有求于執事不待執事之求也顧相期待者甚逺人之家有藩籬有門户而後堂奧可安今藩籬如此門户如此欲髙枕而卧得乎何以捍守何以葺理必要有方略而稽之古驗之今要必有合者蓋疇昔通德一年所得於髙蓋人物者亦可謂不凡矣願天下愛此寶順昌趙宰汝腴某過劍津望順溪四舍欲一見琴堂主人無從惟有美譽滿耳既歸得潛夫吏部所題步雲閣詩讀之則主人胸次可知書翰與記文俱頒又知閣之所從始與所以復興唐律十二髙詞三愈出愈竒句精麗而意感慨此豈湯火中人哉其復興者豈獨一閣哉世謂邑之不可為者誣也某再仕劍聞邑之難者惟此每闕官委攝多勉就惟思不得脫有冒注而來者鮮見以美去况復三年有成乎今既有成之年矣可以登班矣邑人上借留之請朝家頒因任之文令君不以為淹與其民益親縣齋初心之詩益有自樂然自當世論之得毋太淹賢乎今之言英宗者非獨伯仲為閩中瑞蓋當代鮮儷也給札之命當與長公接趾于祕丘矣某四期之中立朝者三年且半其鯁槩豈敢望正字兄荷相與最厚去國荷相送不忍舍而少公又問勞其至家之後交以為感甚欲附名於步雲之後而未能也敢祈為天下愛寶亟膺密召如前所期曽朝守天麟某掃軌謝客了不知户外事忽有故舊求書者竊審開藩鳳城與春俱至某不覺驚喜曰豈非韓木已亥歲乎何其適相符也韓之後更幾甲子而有本朝之陳文惠者大監其人也忠信足以感異類則赤子可知均之為鱷驅而徙之與捕而戮之微有間然皆能使之屏息二公之文具在今將以此驗之使吏畏威而民懷惠其為驅鱷也尤大獻納弼亮將有光於前二公是不虛當一已亥矣某無補明時永棄奚憾猶使之無窮叨廪此國家仁厚之澤主上優容之賜每一食必生慙愧心因念與潭府不無夤緣非獨忝聮朝好而受工部之㕓出經略之榜而先大觀文樞使似期待之頗逺今永孤此望矣因筆輒及之趙西宗希政某曩留京望羅浮數千里書筒不廢往來今里居距西邸數驛近徹聲甚易如出處殊途何雲錦墮前問勞滿紙則前日之捉筆自疑者淺矣大君子豈以貴顯而疏舊交居畎畝者亦豈一日忘愛賢望治之心哉鄉人多仕嶺外其來者言惠陽之治至今無異辭所在官民相仇况乘以倉卒其不疾視者幾希又世之好議論人者人鮮不躡其後今也民愛而留之當路與朝家亦幸其留為逺氓主其何以得人心愜世論至此然則凡士夫所至其可苟哉以拊摩葺理之良勞則今兹領宗藩糾正之尊亦誠清且簡顧巋然為漢遺老則惓惓宗國之中又何如回首杏園將三紀人物蕭疏其疇昔過三山見城中外五六十人今立大功名惟陳制書餘亦少存焉歲二之日楊廷播告以左揆位百僚上者乃吾榜中人蓋幾年而後有此屬時多事所望以扶顛持危者不淺非吾黨之私也是日進而居臺者亦云盛哉猶記甲午春李大蓬會同盟於道山某少伯符兩月耳時新自逺方來不識中朝官職為何物既而推遷漸至危地則知其決不堪復用矣今所望通材偉入居要近共扶國脈是又可為同庚之光曾劒守宏正某之曾大父之弟宗卿庭實字公美紹興初以宣諭使朝陵還對榻前具以所見言君臣至於感泣秦檜聞之大不樂曰公美自失從官矣又上書乞贖胡淡菴罪愈忤檜意出之使閩又推之使廣劾檜黨愈急終于官職者哀之淡菴還朝聲其事者屢雖直氣見扼於權姦而流澤不墜者纍世今監鬱林州都監倉炳者其曽孫也每見明公嘆世道之衰而慨然有感於前賢憤嶺官之叨而察其能拔於儔品炳也其庶幾焉林竹溪希逸某比者嘗造謝不遇可勝愧仰傳諭需南塘行實復齋志銘未及尋納兹沐珍染謂聞茂實於端平有異論茂實賢者安得有此所不滿者端平之相耳後村每謂南塘三十餘年一正字甲午乙未不年餘繇內制登從列始既有扼之者則後必有伸之者似若忘所主者然而用人天子之事而近世以恩怨歸之柄人物者不知此何時可改今狀云端平更化收用老成則上自用之是也其始云史丞相曰趙今第一秀才宜為文字官其後云趙丞相欲挈而固辭史丞相處以清望官而不少貶則後之據清要誰挈而處之乎豈非不能行其言不足以用之也其不識秀才反史之不如也此或者所以疑其論之未平也髙明以為何如曽太卿式中某與長者居連卿十六七年前薄宦江西與法曽傅泳之今武博王賓之遊二君相繼付濡須臺府之招竊聞以盛年分重寄聲名赫赫起欲一拜無從又六七年償邑債于福之永福始汀邵擾浸及其鄰既調諸郡暨諸道兵又調殿旅敵視之蔑如益披猖遂越而殘泉之永德而某所領邑又鄰焉岌乎殆哉未幾連以捷告遂成陳招使戰勝之功問之則花帽軍也鐵橋軍也此西淮制垣所遣也非獨一邑拜公賜全閩同之吾鄉僻左號樂土戴白不聞鼓鼙聲豈識邊頭事雖語之未必信逮目擊其擾而身受其賜乃知屏衛邊方之勞以全內地於安者其賜尤大袖手有年凡向所奬拔之偏裨今有能為將者向所揀練之行伍其居者捍鄉井其出者非獨有功于閩而江廣實賴之惜乎始折于三京繼損于邳徐近又殱于定城而西兵之精鋭略盡矣誰實使然言之短氣竊聞居間雖鄙事小物必親知之者謂其感髀肉之生忘運甓之勞蓋將以有為也不然豈不能以帥體自居於逸哉百年金甌豈堪破缺凡擾我者皆曰邊庭而邊庭則曰盜也四郊多壘抑誰之辱督府宏開臨以政地贊以卿月非徒贊之蓋留後之儲也然公未至鄂之前有如親行聖上之委寄隆矣廣建參佐時材之搜羅盛矣養兵號二十一萬潰卒流氓之收拾多矣外幣內犒俱發國家之帑藏可計矣網罩州縣遺利江湖之民力可想矣往往某規模已成區畫已定幸遇棗紅之期將見冰合之候其必有以副上下之望今公此行以謀為職不苟殉不苟異對上流而按昔雄驅馳之舊趾巡西淮而愴前日生聚之遺民圖上方略少寬旰食之憂牢立根腳毋墮北人之計本朝無戰功雖元老宣督其成者少惟范公未嘗敗以今之形證言之實難儻天與人相應而事可濟福與力相扶而事可濟是所望於大卿將億兆姓之性命有賴使便布此區區漳浦陳宰森某歸來望髙蓋舊遊數舍近欲作書相問訊或者百乘經臨可以面會乎既而聞已開新邑矣得賢令尹可為漳浦赤子賀某端平初見廟堂欲選才辦事每有繁使必曰無如執事蓋欲處掌故學官而復遲者為此耳閩中𣙜鹽之役雖復命而不阿楫使俱往之喻徑辭命而不行與其攘臂抵掌以邀一時之富貴曷若緩步徐行以做實地之工夫邑與民最親最易行志朝有所為夕被其利嚮者鑿空之數甚夥更賢守輕減而科罰遂少今竹湖尤賢而易事何止一分之寬可行撫字之志邑有東溪先生髙彥先靖康中同陳少陽伏闕乞誅六賊者紹興間以直貶死文公守漳祠于郡庠贈官得請録後不果有節有學曾祠於縣庠否其後有人否訪而恤之是亦風化之助執事不以比肩滕薛大夫為嫌而勤民如此官職是命中帶來者嚮之幾為而未及為者何患其不為哉某杜門念咎其拙訥尤甚於向時每憶癸巳歲良月上浣日至京後兩日冰山頽局面一新而執事至之日亦同今思之真一夢也永福董宰鴻道某距髙蓋一牛鳴近偶閲報見當路選令尹以辟書上深為贊喜既而聞百乘開邑政與教兼善又以晝簾之暇尋擘玉峽舊址於五里外捐俸而亭之援筆而詩之山川添顔色矣世所謂鼎鑊者抑何才力從容及此因詰之自永來者云峽古矣三紀前常尹發之漸湮浸沒舒尹又得之執事始大發揮之得非有待於宗𣲖社中人邪某在邑一年非不知名山水簾之奇屢作意輒止若有勒回之者辛卯歲人日僅能擕家一至方廣寺觀所謂龍尾泉所謂水幢者亦奇哉轉盼八年如墮夢境每念此邑二十年間莆人凡四至無漏去匪特莆人為然以最滿者自舒文始而執事今繼之若與江西諸賢有緣邑之民力農務本無甚貧餒者苟冬春之交米不甚泄則青黃未接間可無貴糴之患其大夫士最多皆秀而文好秉義持法以議其上有以服其心則亦帖然無譁故民與士皆美俗也一永之諺過矣二稅不甚難催惟倅之經總郡之係省縣之俸料悉出牙契向不減分多是鏹又半楮極充裕既減分又全楮頗難辦然亦未嘗不可辦但以全楮收以中半解則無難矣今版曹給契紙俵下有印紙則有解發倅與邑之責可輕然不知係省於何乎出俸料又於何乎支其必有以處此不知他日更有改變否方以談風月為嘉輒又及此可以别利器於盤錯中矣邑士黃元晉持賜書至誦其詞旨溫潤可愛可感黃告歸亟拜之此兄能讀其父書不甚至偃室者也幸善待之續又拜狀何判官士頤某就有申稟偶數佳士友來訪以鄉民艱食甚急頗相責以不能白之郡竊料賢使君所以與幕府討論者至熟特外人未之知耳莆土狹人稠雖甚豐年僅足支半歲之食大率仰南北舟而仰於南者為最多春夏之交又仰二麥以接濟去歲二洋不為甚歉而濱海處為鹹水所傷亦不少又麥秋大不及常年今山谷之民尚足支一兩月洋海細氓持錢入城入山者無數不知大家蓋藏可支得一月否又不知官司倉廪可支得一月否又不知指廪望新可挨得一月否飢飽自是民間事而所在多以責望之官府而為長吏者亦當之而不敢辭非特利害相關亦官民一家之意使府區處可得聞乎屋裏所有不患其不出必自外而入者乃為上策向者常為嗣歲之備至差上吏持輕齎入廣搬運以來去冬亦有慮及此者而官司藐如也若夫責吏胥督牙儈厚旌賞蠲雜征凡可以勸誘其來者及今宜以真意實政行之非徒拖案沓具故事而已不知吏儈今所報者已入港者各若干少猶可慮况無乎此所甚望而未可準者也若在官之可準者有二倉焉曰米則義倉乃人户隨苗一石外例納一斗寄之官倉以備凶荒濟鄰里者也今人户但知輸納不知其為自已樁寄之物官司但知受納亦不知其為人户樁寄之物然而人士之識者知之官司之清明者亦知之苟皆知之則當飢饉之時其可不捐以還之民乎今非還也糶也若急時猶靳而不糶則此倉不得為義矣前此多積壓不動遂化為朽腐或私移易則有之若賑糶則曰常平法重也中間賢守亦有出糶者某曩試邑永福見前令每當水旱必發義倉以其糶價申倉臺照會未聞有駁難者某嘗親行之矣豈有縣能之而郡反不能之乎今積久者恐未敢動且時三年內盡發糶可乎此亦新陳相易之本法李常平賢使者是可保也曰穀則平糶倉所在有社倉近來賢守令多創平糶倉而此判則自曽侯始其意所望於後人者甚美而其弊則士友之賢者直欲罷之且先以其美者言之以錢俵僧量時價而糴於新熟之時暨糶於青黃未接之時則如其價不敢增僧主出納官提其綱所以防吏姦者非不至歲歲如是豈不甚美以其弊者言之增價求糶有重費請錢與納穀皆有費其病僧最甚姑置未言而士友以為病民者早禾方熟而遽糴則市價不退僧無所陪貼而科之佃户則民代受其擾閉吝而不散雖散而不均糶之價多於始之糴如此類非一孰知其有大弊乎此倉本為民設不知官所擬以為軍糧者安在而歲那給於是不知所資以稱提者何謂而時借兊於是糴本既有移動而連秋罷一剎掩取其租以為填補之數則此倉初意果為民乎為官乎僧受其害官受其利吏與卒皆有利而民之霑實惠者幾何毋怪乎士友之羣議也謂宜盡數節次發糶其價比元糴姑與量增隨門俵由之時與開倉給散之時皆須選清強官實有志於民者俾任其責則吏卒之姦必可革矣福建趙倉綸某比承使軺觀風一出雖曰奉稱楮之命而常平使者所至正當青黃未接之時嗸嗸待哺者衆又當樁留義廪之時指揮申嚴者屢不發則失民望發之則非朝命此其所以難也既發而奏殆與汲長孺同意全活甚多又與富青社同功循行原隰至于海隅慈行也其有補於民命大矣可賀近頒降新楮至使司名曰糶本建民相驚米舟不入城市價頓增長遂與守卿同曉諭之乃定舟雖至價未退要之上四郡猶稍有儲藏下四郡不無望廣舟赴試來者言都城米升六百舊會似更亷於外處所願處處皆同則和糴不貽閩人之慮矣豈不大可賀乎某前晚得永福黃令熙書以常平事獲譴於使臺亦嘗略為稟控然未能詳也某庚寅歲試此邑始至則米升草四文邑民謂未嘗見幾至絶糴者一兩日遂發義倉出糴且發且申以解倒懸之急然後知常平之為有功也是冬遂以義倉所糶錢與社倉所樁錢收糴以為來歲備請於倉臺時史端明為使者報之曰若能收糴於外處乃為有益其為邑民慮甚至端明知三山産米之不足于食例招糴於廣欲邑體此行之却未知永福山邑亦為産米處只産少販户謀利撤載入州才及春則內自受困某遂再申以內之永得稍存為幸若外之米則沂灘難入且難恃所以急急收糴者如此端明大以為然然散亦良難明年邑再荒某以憂去權官賑糶之助也今十年矣豈謂今春荒最甚升米四十二文視昔幾倍之黃令權宜就義倉借錢收糴所欠者亟申使臺爾今亦自知其非矣渠有公劄申呈欲望薰然慈仁諒其心而赦其罪則令與邑人之感同也某本不識之去秋因其來試漕闈且於按櫝中見其書擬甚可觀則知王留耕在江東日識其材遂呼以攝帳管也某去此邑後令之賢否無不知今自邑來者皆稱之又區區鄙性每見其人之賢且材則敬之愛之或有疏處則察其所以疏者何由若其人之不善則嫉而輕之如不欲與之語或有可取處則又未常不幸其能改也若黃令此舉則賢者之過之疏也某只欲為著一二語因記舊事不覺靦縷鐵菴集卷二十
