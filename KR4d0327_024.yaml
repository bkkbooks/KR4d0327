body:
  text: 鐵菴集卷二十四宋方大琮撰論治國大體之功人主當以身建天地之功不可以已安者自限也古昔聖人以身立于一堂之上親裁闔闢使覆載之間無一物之不得其所而後可以無憾此其事宏大濶逺決非後世之所可望聖人不作天地為之失序者屢矣君子固幸一日之安而不可得况望其以身任天下之責有如人主天資真可以古聖事業而僅止于後世之茍安民物亦賴以粗康彼且以是為大體之所在而不知古人之大體則不止此粗安一世如是足矣必欲清寧宇宙而上以合天地之心則吾身之責有所不容辭奈之何自守已見而卒無以副儒者之望耶文帝以安靜守漢國家大體極言五帝之功皆自以其身任之而非茍安而止其事雖不遂而告帝之言則大矣云云孰謂錯漢臣也而能以是望君耶吾嘗觀漢初之事而疑世變升降之會決于此矣逺乎漢者為周為夏商上推而為五帝當是時天地之間無一物之不得其理也接乎漢者為秦為七國去而為春秋當是時天地之間微一物之不失其理也然則漢興之初其天地之再開闢歟動者欲靜勞者欲息躑躅而自奮者欲止為漢之君轉移闔闢上之則五帝下之則為秦一升一降宜于此決今也不治不亂以智力相扶持使三十餘年之世變不得遂決其治亂此無他未有一身任天下之責也髙帝草創何暇大體惠帝柔弱烏知大體彼方自守之不暇安敢以身任其責君子望漢僅僅止此而文帝繼興君子復以世變決焉父老嬉戲民物生息與往者德色誶語之風大徑庭焉當時世變不得謂之不升然而未也三代風俗不能無憾况五帝乎觀賈生痛哭之書可見矣豈帝之未知大體歟彼其來自代邸潛觀諦察閲天下之故審矣以安靜為心以和平為福胸中規模業已素定然此帝之所謂大體而非古也以身守天下之勢而得以自安帝之大體也以身任天下之責而善為斡旋古人之大體也彼誼號通達國體者痛哭當世之時事曽不以是告孰謂朝氏而能以五帝期其君乎五帝之治迂矣漢初議論不一及此國家大體之問蒞政之十五年也帝亦自顧其治效之已試而姑發諸一問膺對者百人而獨錯擢焉五帝之對異乎吾所聞寧能不駭然而動耶明者為日月和者為隂陽微而草蟲鳥獸之順適靈而神龍威鳳之翔止帝或心慕之而自疑其不能則亦不敢以彼易此然帝亦過疑矣資材不下錯非諛也非張皇誇大以竦動帝聽也誠見其負帝王之資乃屈而就後世之功向者十五年之治道而無一日之心術及此豈諸臣未有以五帝開廣其心者極言其大功而推本于親事其大體不過如是意者使吾君以五帝待其身以五帝之民待其民慨然任天下之事未央臨御之時宣室沈思之夜如臨乎法宫之中明堂之上轉移世變之機軸開闔造化之關鍵精神心術直可以上徹五帝使漢代之民復見天地之大全而錯亦自幸以其身見焉然錯言親事則可矣而極詆羣臣之不足與語者何哉誠以漢廷諸臣無逺大之見以安為幸使其聞帝欲親任天下之事而變更天下之風俗寧不駭然其聽必有持私説以撼帝心者絳灌之沮賈生是也故勉帝以親任其事而不自知其言之過錯勇而言之帝疑而難之疑信未決之頃而帝之念已矣錯與斯民之望帝亦已矣故自文帝之大體行之始而奢者朴強者柔馴而進之則夷狄知義諸侯畏分極而至于海內富庶黎民醇厚止矣不可以復加矣使其自五帝之大體行之飛鳥之被澤而草蟲之不及非功也風雨之既時而膏露之不降也非功也必至幽明萬彚無一物之不得其理而後聖人之能事始畢帝非不知此其所以不為者特疑其言之大而意其未必成而併與安靜者失之寧無慕于古而兢兢守吾之規模卒之能使黃龍之見而不能使靈鳳之來能使醴泉之湧而不能必甘露之降寶鼎則出于吾之世矣而河圖洛書未必呈也維持六十年之漢以貽後人帝亦何憾然五帝遺民展轉世變相激相推而後適至于文帝之時而猶不獲見五帝之功君子于此深惜之錯盛言其有大功者數十帝王功用無窮安有止于數十乎况所謂通關梁除肉刑之屬其功止于及民而已上不言天下不言地其不足於帝者多矣嗣是而武帝興仲舒傷漢無善政者七十年其説主于更化是亦錯親事之意也帝亦欲以身任天下之事慨然有懷于河圖洛書之世然轉移失其道而天地之間反為之紛紜而併失文帝之安靜則不若不任之為愈故嘗論之髙帝倥傯惠帝茍且皆不知有大體之功也雖知之未能為之其知之者自疑而不敢為文帝是已其知而為之者鋭意而不克成武帝是已噫其已試者又如此卒無以取驗朝錯之言矣然使文帝出而為之設施闔闢當必有道必無元狩以來之紛紛故為漢世四百年之民而無一日被五帝之功君子觀武帝為之之可恨深以文帝之不為尤可恨帝王本仁祖義人主有一旦之言而求復其初是必有所見而發也古之聖人與道周旋有終身履之而不自知者安有躍然一悟之頃而後求其要指者哉聖人安行之事不敢以望後世或者慨然有慕古之心而又竊聞吾道之名而嘉尚之遂欲借行道之名以遂其慕古之志然聖人之道安有一蹴可致之理用志愈力而去道愈逺終身馳騖而茫然莫得其指歸然後反而思聖人之于道殆不若是泛然也發之于心體之于身其要指若是而已使一念之加力則聖人之道未必不自躍然一悟者得之武帝元朔之詔曰帝王本仁祖義蓋十二年而有是言帝之見略定矣竊嘗求之古帝王矣有曰行仁者有曰性仁者無所謂本之名有曰由義者有曰遵義者無所謂祖之名武帝何見而創為此名耶豈萬世不傳之旨而帝驟得之耶然而帝外施仁義之主也外施者以名求仁義也本祖者以實求仁義也是二者正相戾也帝何以發此言哉噫孰知本祖之論正自外施者得之乎凡人之情趨向窮而後歸根之論興志慮衰而後悔悟之機動外施而不獲遂然後退思而求其內矣此理也亦勢也大抵後之人主有終身力行仁義者則本祖之論固隱于不言之中有素不留意于仁義者則本祖之論將置于念慮之外而未有名慕而實違外似而中不然如漢之武帝者蓋帝也見髙而意鋭見髙則不肯俯伏于帝王之下意鋭則不能舒徐以求仁義之實其所以為是崇儒重道者君子知其非出于本心使仁義之名可以求而得帝王之盛可以企而及則本祖之論不復見于元朔之初矣十二年間咸五登三之意無日無之非不知仁義之美皆自其內心以生然好名之念藴于其中而不暇屈意于踐履之地直欲乘方鋭之氣以外竊仁義之名而已雖嘗敬髙年恤孤寡然而仁之末也而非本也救東甌伐胸奴然而義之假也而非祖也執其小者末者而欲遂帝王逺大之事不獨羣臣疑之而不敢言即帝亦自疑之而姑庶幾其獲遂焉惟其不能遂也則本祖之論欲無發而不可得向者上嘉下樂之言不絶于口一旦乃能回思却顧而求帝王所由遵之道向者外施之意茫然無據一旦乃能探本尋源而求所謂本祖之地亦其世故熟而至理明鋭氣消而本心見脫去人欲而窺見帝王之本真君子亦幸其有歸宿之地矣前乎是者建元之䇿帝雖非以仁義問而或者覘大道要極之意帝其知之耶然仲舒歷舉仁義之端而勉之以加意言甚急而帝則緩是帝未知本祖也繼乎是者元光之䇿至有仁義何先之問帝若已知之矣然公孫分析仁義之條帝採其辭而略其意是帝猶未知本祖也欲效唐虞之昌言發于廷若將以是為臣下誇詫汲直外施一語深中帝病而艴然之色隨見是帝正在迷而未復之中也當是時志大氣剛謂帝王之道可立談而致雖使數子歷舉其所謂仁義者曰如是而為本如是而為祖其如帝之不聽何逮夫精神志慮鼓舞倦矣傍皇四顧莫得其指歸而後知疇昔艷慕之情皆不足據本祖之論不待人發之而帝則自發之元朔之初異乎前日之武帝矣雖然仁患于不知本義患于不知祖果知之矣則終身踐言可也由元朔之初觀之火然泉達之始也由元朔之後觀之蘧廬之一宿耳窮兵黷武仁者不為而帝為之神仙土木義者不為而帝為之帝豈忘向者本祖之論耶宣帝終身嚴毅而寬大一詔君子許之曽謂本仁祖義之言不足裨武帝之萬一然而有由也寬大之詔宣帝之末年也則一見而遂定本祖之言武帝之中年也見識髙明則有時而能悟信道未篤則未幾而轉移故始者之不念而元朔之詔是一悟也繼者之不力而輪臺之悔又再悟也帝方心平氣定以求歸根之地可以上追帝王無難也然而僅止是者故嘗論之元朔之詔此正回心以復仁義之機也而惜其不堅輪臺之詔此正虛心以行仁義之時也而惜其已晚遂使上嘉下樂之語徒為武帝之空言悲夫殷有三仁事有不同所處而同其心仁者為之聖人知之夫天下之變故無窮而仁人君子之用心無二道也間有當其會而際其窮茍無異道則所處者宜一而死生去就之不同是誠何心哉嗟乎無聖人之論仁人君子之心其誰知之彼其設心措慮夫豈素有所定而變故之來不獲盡如吾意要必有以處之其去就或異向死生不同道形迹疑似之間若不能以概定而仁人君子之所為揆之理而正質諸心而安百世以俟聖人而不惑是豈淺鮮者所能窺測哉知此則得孔子論三仁之旨矣殷有三仁焉請申夫子之意嘗聞夫子之言曰有殺身以成仁無求生以害仁則人必殺身然後為仁又曰可以死可以無死死非其地尤所不可由世俗之論則管仲之仁豈非所謂求生以害仁者乎伯夷之仁豈非所謂可以死可以無死者乎而夫子皆不以是論也况夫世變適有所遭而仁人君子之心隨遇而隨定柏舟之仁人不能奮飛羔裘之大夫以道去國乘舟之二子爭相為死一死一生或去或就無非行此心之正以達天下之變非曰茍同茍異也誠使天下有道君臣同心則斯人也為皋夔為稷契為伊傅周召雍容進退以其君顯吾身無仁人之名而天下享仁人之福曽謂世變不可概定耶故周公之心不見于左右輔王之日而見于跋前疐後之時屈原之志不見于議國是出號令之時而見于憔悴江濵之日仁人君子每于危疑變故之際見之知此則知夫子論三仁之旨矣夫王之懿親恩莫隆焉國之元老位莫崇焉方殷之將喪自夫人言之固已不勝其中心之哀况休戚相關耶即三子之時以逆三子之志察其所處之異以求其所同則知三子不公言于朝而私議于家不顯謀于國而隂計其身三子所處誠有大不獲已者向使牧野之師一舉殷家之鼎遂移而相顧痛嗟繼之以死則六百載之宗祀絶矣而三子何忍以死邀名耶死生去就要必有道而三仁之稱非夫子其誰知之且夫微子之去也非棄其君也非愛其身也而成湯之不祀有深懼焉讀吾家耄遜于荒之言寧忍負君不忍負宗社恝然而去人其謂吾何而王子出迪之語箕子雖深信之而復不同所趨焉諫而不聽或得一當以自勉何至佯狂以辱其身意者天啓其衷君之惡不稔而猶足與為善其所以隱忍于此者不以語諸人而自靖一語天地鬼神實臨之此王子所以決于行遁而比干亦自知所處矣存亡繼絶微子任其責傍皇俟命箕子當其事故惟終始忠諫以盡吾臣節所當為其濟社稷之靈不濟死不敢惜是豈匹夫匹婦之為諒哉不原其心則三子之事吾恐後世以異觀之非夫子誰知其心之共歸于仁乎雖然三子豈樂有此名也天不殄商王速念亂則吾之仁何自見去就之決死生之審終無救商之亡而既獲仁人焚炙忠良適以為奉辭伐罪者所藉口則吾何以仁名為哉或者猶謂囚奴橫死為三子之不幸而他日禮訪褒封為三子之幸嗟乎若三子者其可以幸不幸論哉天不祚殷固三子之所甚戚而天命有歸吾心亦釋焉此其所以為仁雖夫子不能以語人吾何以論其幸不幸云居重馭輕之意不觀後世維持之無術無以知賢君立國之深意夫後世之為國誠不能舍所恃而自立者然舉天下之大而曉然示之以制馭之術則其立國之道亦淺矣英明之君潛察天下之勢而隂執其機雖吾之立國不能無恃于此而亦未嘗明示所以恃之之迹其強本弱枝常隱然于經營區畫之中而世不獲知後世一失其法而天下之變隨見彼固非求戾前人之法也往往其變更之時昧其始初之意而謂強弱有不係此自儒者之言一出而昔人立國之意灼然于輕重之間凡向之所以隱而不欲言者始大明白于天下蓋舉世相與歎其用意之深逺而其子孫曽不之悟也居重馭輕之意如何此太宗之意不以語人者而宣公得之于數傳之後示天下以公而不倚物以為重者古也握天下之勢而不明示以其迹者此其事則後世而其意則亦古也古者不必假兵以為重後世不得不假兵以為重要其立國之道雖異而其所以安蒼生之慮則同一軌轍也王畿之地千里而為軍者六大國百里而為軍者三以王國之大而其兵不足以敵侯國之二此其意果將以自衛耶天下亦明知先王立國之意有不在此而天下之變亦無自而生秦人聚天下之兵于咸陽未害其為慮天下也而銷鋒鏑殺豪傑所以號召一世者則非矣故章邯一提重兵以渡河而漢髙已掉臂而入關蓋天下知秦將所恃者在此一失其恃則豪傑並起而乘之矣嗟乎倚兵以為重而挾之以馭天下之術甚非古意矣况又顯然以示人耶英明之主知天下之所恃在兵而不欲以意告天下故常隂用其實而陽諱其名兵罷歸休有警則調發此髙帝語天下以休息之意也而京師南北軍之屯未嘗無罷郡國材官屬守尉此光武曉天下以不用兵之意也而京師之𨽻兵則如故實則弱天下之勢而託之以公天下之名此其意獨何為耶而天下亦相與奔走于下而不自知于此可以見賢君運用海宇之妙孰謂太宗而無是意乎府兵之制雖曰接隋之緒而帝則曲加其思慮焉置府八百而在關中者大半劍南等路蓋無幾焉以宣公之言質太宗之制其輕重之意易見也顧其當時區畫布置繩繩井井要以為兵民既分之後茍可以寓兵于農而無擾也孰知防患之意有大于此者乎上畨宿衛以逺近分給人皆知其均勞意也兵歸于府將還于朝人皆知其消握兵之患也無事耜耒有事干戈人皆知其無養兵之費也而所謂強幹弱枝重內輕外之意則默寓于經畫之外雖智者有不能知宜舉世享安寧之福而未嘗詰其所以然者吾觀太宗之世凡所謂政刑禮樂與諸臣議論悉矣以為不談兵耶則與英惠問答無慮百千言而府兵多寡之制特泯然于言論之間豈其駕馭天下之意有不免後世之私而實難以語諸人曰不井田不足以復周官制度故府兵作焉今觀府兵之制亦何嘗得井田之萬一哉帝之言得無以古人之公為後世之私耶帝豈不知堯舜之德三代之仁所以立國者不在此而自顧吾之所以治天下與古異誠未能捨兵以自固然以天子之尊而與天下較強弱帝誠恥有是名也使後世而默會此意終守其法而不變則吾之私心終無以見此太宗之本意也曽謂思慮及數百年之逺而不能保一再傳之暫耶彍騎之變藩鎮之變人皆咎後世之失䇿彼髙睿玄德諸君亦豈惡安而喜危者哉度其變法之時亦曰以彼易此求以固國耳而不知祖宗固國之意正在于此而不可易不然府兵天子所以自衛者舉而萃之范陽衛將京師所倚重者而空國以戍趙魏使其深見利害之實雖至庸之君亦豈肯舍所重而自居于輕哉是則太宗之意雖其子孫有不能知况當時乎宣公固諳于世故者使不歷嘗後世之變則居重馭輕之論亦無自而發今也既言其置府之多寡而繼曰此居重馭輕之意明矣觀明之一辭則是至德宗之時猶有未明太宗之意者嗚呼天下更變故搶攘之中而猶未知太宗之意則當時之慮密矣自宣公之言一發而議者紛然矣至指以為天下之大命凡向之所以隂用不言掩蓋護藏而惟恐天下知之者悉不能以自祕其機宣公誠見夫向也以天下之大不足以敵關中之半今也淮蔡小醜擁三四州之衆亦足以抗王師雖欲不白其意而不可得已使德宗因言而悟意潛收天下之權而無驟復之迹則亦太宗之意也豈謂一變而不遂復乎其後也一倚重于節度之兵而藩鎮之禍作一倚重于神䇿之軍而涇源之亂起彼其制國無術曉然示天下以所恃者在此使太宗以明示後世以重本之意則必悉舉天下之兵而聚之京師何以異于秦之季耶此尤太宗之所深慮也反復宣公之言而味其意蓋謂神䇿之六軍在外其勢不可以久然其後也六軍十二衛制于京師宜若重內勢矣而權出內臣祗以速唐于亡豈天下已明知其機而不可復用耶將制兵之非其人耶此固太宗之慮所不及而宣公亦豈料其至此也哉鐵菴集卷二十四
