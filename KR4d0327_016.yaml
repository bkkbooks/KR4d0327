body:
  text: 鐵菴集卷十六宋方大琮撰婚書聘顧鳬舄過家溫十年之舊話魚緘出嶺合二姓之新歡以我輩宦官之同為兒曹夤緣之幸伏承今女小娘素間針訓愛篤乃翁學生某粗力簡編拙如其父許修永好敬贄吉書矧遷喬木之新居真合比鄰之昔語向平婚嫁兩家交喜於及時洛社遊從二老相擕於他日亟馳菲幣具載别箋聘劉合婚好而成宗敬親為大擇行義而論世生子亦仁彼哉世俗之談直是禮經之外常持此説式契乃心惟文肅之與先公自淳熙以至今日婚姻不替忠厚相承壯矣吾兒正營求於中饋婉兮季女方肆習於少儀甫片語而遂成若宿緣之有待其自兩翁而下實寵嘉之既諧二姓之歡永為好也定陳入嶺聨司益隆交誼通家締好嘗請姻盟不待晉賢遣門生而求觀非如程録謂婦性之難擇僉云二美今可百年持書以溫前言欣焉報可望鄉而有喜色至則合并聘陳迭上要塗莫留長孺言旋舊里竊比子平合二姓之姻盟增兩翁之喜色庭趨詩禮敢言大方之家閨秀德容雅稱有媯之裔以身為教此意皆同非特嶺海之昨逢正契比鄰之初議命敬事了公兮盍簉於漢庭承宗禮成老者宜需於洛社方回顧通婚論譜文獻相輝聚族收科武陵最盛上則六鰲之成列近而一鳳之創飛既父兄之譽藹然知子弟之賢必矣舐犢夙憐於一女卜龜無易於此郎吉語入門喜聲滿室羣從曰我同盟之好伯姊曰姑有姪以從乃若衷祈非止恩澤侯之謂願言歡合式觀詩書種之昌方聘吳壯歲聚頭期身名之早遂中年回首覺兒債之相催本朋友之人倫亦婚姻之天合每庭趨而必戒鈍毋如翁藹閨秀之有聞訓間於姆承兹金諾敬以幣交矧慈親來從於一家宜喜色並見於二老具言飴弄諸孫突其成兮行拜冰清半子可以教矣鐵菴集卷十六
